name: Cloud Run Deploy (api-server)

# Phase 1A scaffold per docs/deploy.md.
# - build-and-push fires on every push to main, tags <sha> + latest, pushes
#   to Artifact Registry. Does NOT deploy.
# - deploy-canary is workflow_dispatch-only. Deploys a new revision with
#   --no-traffic (0%). Traffic shifts are manual via gcloud per the canary
#   runbook. NEVER add a traffic-shifting step here.
#
# Toolchain (pnpm 10, Node 20) intentionally mirrors .github/workflows/pr-checks.yml.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (sha preferred; 'latest' for the most recent build-and-push)"
        required: false
        default: latest
        type: string

env:
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY_REPO: apps
  IMAGE_NAME: api-server
  CLOUD_RUN_SERVICE: api-server

jobs:
  build-and-push:
    name: Build & push image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate required secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          : "${GCP_PROJECT_ID:?GCP_PROJECT_ID secret is required (see docs/deploy.md)}"
          : "${GCP_WORKLOAD_IDENTITY_PROVIDER:?GCP_WORKLOAD_IDENTITY_PROVIDER secret is required (see docs/deploy.md)}"
          : "${GCP_SERVICE_ACCOUNT:?GCP_SERVICE_ACCOUNT secret is required (see docs/deploy.md)}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}"
          docker build \
            -f Dockerfile \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            .

      - name: Push image (sha + latest)
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}"
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

  deploy-canary:
    name: Deploy 0% canary
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate required secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          : "${GCP_PROJECT_ID:?GCP_PROJECT_ID secret is required (see docs/deploy.md)}"
          : "${GCP_WORKLOAD_IDENTITY_PROVIDER:?GCP_WORKLOAD_IDENTITY_PROVIDER secret is required (see docs/deploy.md)}"
          : "${GCP_SERVICE_ACCOUNT:?GCP_SERVICE_ACCOUNT secret is required (see docs/deploy.md)}"
          : "${GCP_RUNTIME_SERVICE_ACCOUNT:?GCP_RUNTIME_SERVICE_ACCOUNT secret is required (see docs/deploy.md)}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy revision with --no-traffic (0% canary)
        # NOTE: gcloud run deploy treats --set-env-vars and --update-env-vars
        # as mutually exclusive; combined into one --set-env-vars list.
        # Mock-mode defaults are safe; real-mode env vars (CONVERTER_URL,
        # MNML_API_URL, etc.) are layered on later via gcloud run services
        # update once Nick confirms target endpoints. See docs/deploy.md
        # env-var inventory.
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --image="${IMAGE}" \
            --no-traffic \
            --port=8080 \
            --cpu=2 \
            --memory=2Gi \
            --min-instances=0 \
            --max-instances=10 \
            --concurrency=80 \
            --timeout=300 \
            --service-account=${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }} \
            --set-env-vars=NODE_ENV=production,LOG_LEVEL=info,AIR_FINDING_LLM_MODE=mock,BRIEFING_LLM_MODE=mock,MNML_RENDER_MODE=mock,DXF_CONVERTER_MODE=mock,AI_INTEGRATIONS_ANTHROPIC_BASE_URL=https://api.anthropic.com \
            --set-secrets=DATABASE_URL=DEPLOYMENT_DATABASE_URL:latest,AI_INTEGRATIONS_ANTHROPIC_API_KEY=AI_INTEGRATIONS_ANTHROPIC_API_KEY:latest,SESSION_SECRET=SESSION_SECRET:latest

      - name: Show new revision
        run: |
          gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.latestCreatedRevisionName,status.url,status.traffic)'
