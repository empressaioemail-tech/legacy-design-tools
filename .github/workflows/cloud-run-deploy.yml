name: Cloud Run Deploy (api-server)

# Phase 1A scaffold per docs/deploy.md.
# - build-and-push fires on every push to main, tags <sha> + latest, pushes
#   to Artifact Registry. Does NOT deploy.
# - deploy-canary is workflow_dispatch-only. Uses --tag=canary for a stable
#   smoke URL (https://canary---<service-host>/...). Adds --no-traffic only
#   when the Cloud Run service already exists (gcloud forbids --no-traffic on
#   the very first create). Traffic shifts are manual via gcloud per the
#   canary runbook. NEVER add an automatic traffic-shifting step here.
#
# Toolchain (pnpm 10, Node 20) intentionally mirrors .github/workflows/pr-checks.yml.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (sha preferred; 'latest' for the most recent build-and-push)"
        required: false
        default: latest
        type: string

env:
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY_REPO: apps
  IMAGE_NAME: api-server
  CLOUD_RUN_SERVICE: api-server

jobs:
  build-and-push:
    name: Build & push image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate required secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          : "${GCP_PROJECT_ID:?GCP_PROJECT_ID secret is required (see docs/deploy.md)}"
          : "${GCP_WORKLOAD_IDENTITY_PROVIDER:?GCP_WORKLOAD_IDENTITY_PROVIDER secret is required (see docs/deploy.md)}"
          : "${GCP_SERVICE_ACCOUNT:?GCP_SERVICE_ACCOUNT secret is required (see docs/deploy.md)}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}"
          docker build \
            -f Dockerfile \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            .

      - name: Push image (sha + latest)
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}"
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

  deploy-canary:
    name: Deploy 0% canary
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate required secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          : "${GCP_PROJECT_ID:?GCP_PROJECT_ID secret is required (see docs/deploy.md)}"
          : "${GCP_WORKLOAD_IDENTITY_PROVIDER:?GCP_WORKLOAD_IDENTITY_PROVIDER secret is required (see docs/deploy.md)}"
          : "${GCP_SERVICE_ACCOUNT:?GCP_SERVICE_ACCOUNT secret is required (see docs/deploy.md)}"
          : "${GCP_RUNTIME_SERVICE_ACCOUNT:?GCP_RUNTIME_SERVICE_ACCOUNT secret is required (see docs/deploy.md)}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy revision (canary tag; first create vs update)
        # NOTE: gcloud run deploy treats --set-env-vars and --update-env-vars
        # as mutually exclusive; combined into one --set-env-vars list.
        # Mock-mode defaults are safe; real-mode env vars (CONVERTER_URL,
        # MNML_API_URL, etc.) are layered on later via gcloud run services
        # update once Nick confirms target endpoints. See docs/deploy.md
        # env-var inventory.
        #
        # Object paths (artifacts/api-server/src/lib/objectStorage.ts):
        # parseObjectPath expects `/<bucket>/<prefix>`. PUBLIC entries must
        # not end with `/` — search joins `${searchPath}/${filePath}`.
        # PRIVATE_OBJECT_DIR is the prefix before the code-appended
        # `/uploads/<uuid>` (use `.../.private`, not `.../.private/uploads`).
        #
        # --allow-unauthenticated: CI is non-interactive; without an explicit
        # flag, gcloud prompts and fails. Phase 1A uses curl /api/healthz smoke;
        # tighten to --no-allow-unauthenticated + identity tokens before prod.
        run: |
          set -euo pipefail
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"
          SVC="${{ env.CLOUD_RUN_SERVICE }}"
          RGN="${{ env.GCP_REGION }}"

          DEPLOY_FLAGS=(--tag=canary)
          if gcloud run services describe "$SVC" --region="$RGN" >/dev/null 2>&1; then
            DEPLOY_FLAGS+=(--no-traffic)
            echo "Service exists: adding --no-traffic (new revision gets 0% default-route traffic)."
          else
            echo "::warning::First deploy for $SVC: Cloud Run does not support --no-traffic when creating the service. Default URL may route 100% to this revision until you adjust traffic; use the canary tag URL for smoke."
          fi

          gcloud run deploy "$SVC" \
            --region="$RGN" \
            --image="${IMAGE}" \
            "${DEPLOY_FLAGS[@]}" \
            --port=8080 \
            --cpu=2 \
            --memory=2Gi \
            --min-instances=0 \
            --max-instances=10 \
            --concurrency=80 \
            --timeout=300 \
            --service-account=${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }} \
            --allow-unauthenticated \
            --set-env-vars=NODE_ENV=production,LOG_LEVEL=info,AIR_FINDING_LLM_MODE=mock,BRIEFING_LLM_MODE=mock,MNML_RENDER_MODE=mock,DXF_CONVERTER_MODE=mock,AI_INTEGRATIONS_ANTHROPIC_BASE_URL=https://api.anthropic.com,PUBLIC_OBJECT_SEARCH_PATHS=/legacy-design-tools-prod-objects/public,PRIVATE_OBJECT_DIR=/legacy-design-tools-prod-objects/.private \
            --set-secrets=DATABASE_URL=DEPLOYMENT_DATABASE_URL:latest,AI_INTEGRATIONS_ANTHROPIC_API_KEY=AI_INTEGRATIONS_ANTHROPIC_API_KEY:latest,SESSION_SECRET=SESSION_SECRET:latest,BIM_MODEL_SHARED_SECRET=BIM_MODEL_SHARED_SECRET:latest,SNAPSHOT_SECRET=SNAPSHOT_SECRET:latest

      - name: Show new revision and canary smoke URL
        run: |
          set -euo pipefail
          SVC="${{ env.CLOUD_RUN_SERVICE }}"
          RGN="${{ env.GCP_REGION }}"
          REV=$(gcloud run services describe "$SVC" --region="$RGN" \
            --format='value(status.latestCreatedRevisionName)')
          echo "Latest created revision: ${REV}"
          gcloud run services describe "$SVC" --region="$RGN" \
            --format='value(status.url,status.traffic)'
          BASE_URL=$(gcloud run services describe "$SVC" --region="$RGN" \
            --format='value(status.url)')
          HOST="${BASE_URL#https://}"
          HOST="${HOST#http://}"
          echo ""
          echo "Canary tag URL (smoke /api/healthz here; after first deploy, default URL may share traffic — see job log above):"
          echo "  https://canary---${HOST}"
