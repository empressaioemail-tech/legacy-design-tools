name: Eval
on:
  pull_request:
    paths:
      - "lib/finding-engine/**"
      - "lib/briefing-engine/**"
      - "lib/codes/**"
      - "lib/eval/**"
      - "lib/db/src/schema/**"
      - ".github/workflows/eval.yml"
  push:
    branches:
      - main
    paths:
      - "lib/finding-engine/**"
      - "lib/briefing-engine/**"
      - "lib/codes/**"
      - "lib/eval/**"

# v1 scaffold: WARN-ONLY. The full eval workflow needs:
#   - The three eval tables created in CI's pgvector Postgres (push of
#     lib/db schema is part of the existing PR Checks job; once
#     evalRuns/evalScores/evalBaselines land + drift fixture refreshes,
#     this workflow can extend to `pnpm eval run --all --ci`).
#   - AI_INTEGRATIONS_ANTHROPIC_{API_KEY,BASE_URL} as repo secrets.
#   - At least one baseline captured per fixture so the PR comment has
#     a comparator. Until then this workflow runs only the rubric unit
#     tests and the eval-package typecheck.
#
# Once baselines exist, replace `Rubric unit tests` with the run +
# scorecard-comment step (commented at bottom).
jobs:
  rubric-tests:
    name: Rubric unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck eval package
        run: pnpm --filter @workspace/eval run typecheck
      - name: Run rubric unit tests
        run: pnpm --filter @workspace/eval run test

