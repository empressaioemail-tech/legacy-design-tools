name: PR Checks
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install ripgrep (used by import-boundary tests)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chrome via puppeteer postinstall
        # The workspace uses `puppeteer` (not puppeteer-core), which has
        # a postinstall script (`node install.mjs`) that downloads Chrome
        # to ~/.cache/puppeteer. `puppeteer` IS in onlyBuiltDependencies
        # in pnpm-workspace.yaml, but pnpm install --frozen-lockfile in
        # CI doesn't trigger the postinstall when packages come from cache.
        # `pnpm rebuild puppeteer` force-runs the postinstall, which
        # downloads Chrome at the version pinned by puppeteer's
        # bundled config (matches what puppeteer-core launches at runtime).
        run: pnpm rebuild puppeteer
      - name: Enable pgvector extension
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d test_db -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Push database schema
        run: pnpm --filter @workspace/db run push
      - name: Run tests
        run: pnpm test
