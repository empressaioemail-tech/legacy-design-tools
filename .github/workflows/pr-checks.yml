name: PR Checks
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install ripgrep (used by import-boundary tests)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chrome via puppeteer postinstall
        # `puppeteer` (not puppeteer-core) is a direct dep of
        # @workspace/api-server, with a postinstall script (install.mjs)
        # that downloads Chrome to ~/.cache/puppeteer. CI's pnpm install
        # --frozen-lockfile is NOT executing this postinstall (3.9s install
        # time, no Chrome download in logs), and `pnpm rebuild puppeteer`
        # in pnpm v10 only triggers native-compile rebuilds, not pure-JS
        # postinstalls. Workaround: run install.mjs directly. The script
        # is a real file at artifacts/api-server/node_modules/puppeteer/install.mjs
        # (not a pnpm symlink internal) because puppeteer is a direct dep.
        # Node's module resolution from that script's directory finds
        # @puppeteer/browsers in puppeteer's own node_modules subtree.
        run: |
          cd artifacts/api-server
          node node_modules/puppeteer/install.mjs
      - name: Enable pgvector extension
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d test_db -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Push database schema
        run: pnpm --filter @workspace/db run push
      - name: Check schema fixture drift
        # Guardrail: pg_dump the live (just-pushed) schema and diff it
        # against lib/db/src/__tests__/__fixtures__/schema.sql.template.
        # If a schema change was made without running
        # `pnpm --filter @workspace/db run test:fixture:schema`, the
        # checked-in fixture will be stale and integration tests would
        # silently miss new columns/tables. Fail the PR loudly instead.
        run: pnpm --filter @workspace/db run test:fixture:drift
      - name: Run tests
        run: pnpm test
