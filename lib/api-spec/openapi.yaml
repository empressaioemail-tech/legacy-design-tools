openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SmartCity OS Design Tools API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: engagements
    description: Engagement (project) operations
  - name: snapshots
    description: Revit model snapshot operations
  - name: chat
    description: Claude chat about an engagement
  - name: codes
    description: Atom-anchored municipal/building code knowledge
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /engagements:
    get:
      operationId: listEngagements
      tags: [engagements]
      summary: List engagements
      description: Returns all engagements ordered by updatedAt desc.
      responses:
        "200":
          description: Array of engagement summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EngagementSummary"

  /engagements/match:
    post:
      operationId: matchEngagement
      tags: [engagements]
      summary: Resolve a Revit file to an engagement (or signal create-new)
      description: |
        Called by the Revit add-in BEFORE uploading a snapshot, to decide which
        engagement (if any) the file belongs to. Auth: requires the same
        `x-snapshot-secret` header as POST /snapshots.

        Precedence (first hit wins):
          1. `revitCentralGuid` exact match → action="auto-bind".
          2. `revitDocumentPath` exact match → action="auto-bind".
          3. case-insensitive `projectName` collision → action="choose" with
             up to 10 candidates (newest first). The add-in MUST surface a
             dropdown in this case, regardless of GUID presence.
          4. nothing matched → action="create-new".

        Note: even when a GUID is supplied, a name collision still returns
        "choose" if neither GUID nor path matched — the user makes the final
        call. GUID is sticky on rebind: an engagement's stored GUID is never
        overwritten by a later snapshot from a different file.
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchEngagementBody"
      responses:
        "200":
          description: Match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchEngagementResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}:
    get:
      operationId: getEngagement
      tags: [engagements]
      summary: Get engagement detail with snapshot list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement detail (snapshots without payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEngagement
      tags: [engagements]
      summary: Update engagement details (intake / edit modal)
      description: |
        Partial update. Only fields present in the request body are changed.
        If `address` is included and differs from the current value, the
        server will geocode the new address synchronously (best-effort).
        On geocoding failure, the address is still saved but a warning is
        included in the response.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                jurisdiction:
                  type: string
                status:
                  $ref: "#/components/schemas/EngagementStatus"
                projectType:
                  $ref: "#/components/schemas/ProjectType"
                zoningCode:
                  type: string
                lotAreaSqft:
                  type: number
                  nullable: true
      responses:
        "200":
          description: Updated engagement detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/geocode:
    post:
      operationId: regeocodeEngagement
      tags: [engagements]
      summary: Re-run geocoding using the engagement's current address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement detail (possibly with warnings)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "400":
          description: Engagement has no address to geocode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots:
    get:
      operationId: listSnapshots
      tags: [snapshots]
      summary: List Revit snapshots across all engagements
      description: Returns all snapshots, newest first, joined with engagementName.
      responses:
        "200":
          description: Array of snapshot summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnapshotSummary"
    post:
      operationId: createSnapshot
      tags: [snapshots]
      summary: Receive a Revit snapshot from the add-in
      description: |
        Stores a snapshot from the Revit add-in. Requires the `x-snapshot-secret`
        header to match the configured `SNAPSHOT_SECRET` env var. If `projectName`
        matches an existing engagement (case-insensitive), the snapshot attaches
        to it. Otherwise a new engagement is auto-created.
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotPayload"
      responses:
        "201":
          description: Snapshot accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotReceipt"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}:
    get:
      operationId: getSnapshot
      tags: [snapshots]
      summary: Get the full snapshot record (with payload)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}/sheets:
    get:
      operationId: getSnapshotSheets
      tags: [snapshots]
      summary: List sheets uploaded for a snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of sheet summaries (no PNG bytes)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SheetSummary"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: uploadSnapshotSheets
      tags: [snapshots]
      summary: Upload sheets (multipart) for a snapshot
      description: |
        Multipart upload from the Revit add-in. Body must include a `metadata`
        text field containing JSON-encoded SheetMetadata[] plus per-sheet
        `sheet_{i}_thumb` and `sheet_{i}_full` PNG file fields. Idempotent on
        (snapshotId, sheetNumber) — re-uploading replaces existing rows.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                metadata:
                  type: string
                  description: JSON-encoded array of SheetMetadata
              required:
                - metadata
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetUploadResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: Wrong content-type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sheets/{id}/thumbnail.png:
    get:
      operationId: getSheetThumbnail
      tags: [snapshots]
      summary: Sheet thumbnail PNG (512px)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PNG image
          content:
            image/png: {}
        "404":
          description: Sheet not found

  /sheets/{id}/full.png:
    get:
      operationId: getSheetFull
      tags: [snapshots]
      summary: Sheet full-resolution PNG (~2048px)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PNG image
          content:
            image/png: {}
        "404":
          description: Sheet not found

  /codes/jurisdictions:
    get:
      operationId: listCodeJurisdictions
      tags: [codes]
      summary: List configured code jurisdictions and their atom counts
      responses:
        "200":
          description: Array of jurisdiction summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JurisdictionSummary"

  /codes/jurisdictions/{key}/atoms:
    get:
      operationId: listJurisdictionAtoms
      tags: [codes]
      summary: List atoms for a jurisdiction (paginated, newest first)
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: codeBook
          in: query
          required: false
          description: Optional filter — restrict to a single code book.
          schema:
            type: string
        - name: edition
          in: query
          required: false
          description: Optional filter — restrict to a single edition (use together with codeBook).
          schema:
            type: string
      responses:
        "200":
          description: Atom summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodeAtomSummary"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/atoms:
    get:
      operationId: listCodeAtoms
      tags: [codes]
      summary: List atoms across jurisdictions (operator/debug surface)
      description: |
        Operator-facing global atom list backing the `/dev/atoms` inspector
        page. Distinct from `/codes/jurisdictions/{key}/atoms` (consumer
        surface, scoped to one jurisdiction): exposes filters not present
        in the consumer view (sourceName, embedded vs raw, free-text q)
        and adds offset pagination with a server-computed `total` so the
        UI can render Prev/Next without overfetching.

        Stable order: (fetchedAt DESC, id DESC).
      parameters:
        - name: jurisdictionKey
          in: query
          required: false
          schema:
            type: string
        - name: codeBook
          in: query
          required: false
          schema:
            type: string
        - name: edition
          in: query
          required: false
          schema:
            type: string
        - name: sourceName
          in: query
          required: false
          description: Filter by `code_atom_sources.source_name` (e.g. `grand_county_html`).
          schema:
            type: string
        - name: embedded
          in: query
          required: false
          description: |
            Tri-state. `true` → only embedded atoms; `false` → only raw
            atoms; omitted → no filter. Strings (not JSON booleans) so the
            querystring round-trips cleanly.
          schema:
            type: string
            enum: ["true", "false"]
        - name: q
          in: query
          required: false
          description: |
            Case-insensitive substring match against `sectionNumber` OR
            `sectionTitle`. Trimmed; empty string is treated as no filter.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated atom list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeAtomListResponse"

  /codes/atoms/{id}:
    get:
      operationId: getCodeAtom
      tags: [codes]
      summary: Get a single code atom (full body + provenance)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Atom detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeAtomDetail"
        "404":
          description: Atom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/warmup-status/{key}:
    get:
      operationId: getWarmupStatus
      tags: [codes]
      summary: Live warmup queue state for a jurisdiction
      description: |
        Returns counts of `code_atom_fetch_queue` rows by status for the given
        jurisdiction, a derived `state`, and (when present) the most recent
        failed row's `lastError` text so failures are debuggable from the
        browser without server-log access.

        state derivation:
          - total === 0          → "idle"
          - pending > 0 OR
            processing > 0       → "running"
          - failed > 0 AND
            pending+processing=0 → "failed"
          - otherwise            → "completed"
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current warmup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupStatus"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/warmup/{key}:
    post:
      operationId: warmupJurisdiction
      tags: [codes]
      summary: Trigger discovery + queue drain for a jurisdiction
      description: |
        Idempotent. Inserts new TOC entries into the fetch queue (existing
        entries are skipped) and synchronously drains a small batch so the
        caller can confirm the pipeline is alive. Long-running fetches
        continue in the background queue worker.
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Warmup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupResult"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Ask Claude about an engagement (SSE stream)
      description: |
        Streams an assistant response over Server-Sent Events. Each event
        is `data: {"text": "..."}\n\n` followed by a final `data: [DONE]\n\n`.
        Grounds Claude on the latest snapshot for the given engagement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
        "400":
          description: Invalid request or no snapshots yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    EngagementStatus:
      type: string
      enum: [active, on_hold, archived]

    ProjectType:
      type: string
      enum: [new_build, renovation, addition, tenant_improvement, other]

    Geocode:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        jurisdictionCity:
          type: string
          nullable: true
        jurisdictionState:
          type: string
          nullable: true
        jurisdictionFips:
          type: string
          nullable: true
        source:
          type: string
          enum: [nominatim, manual]
        geocodedAt:
          type: string
          format: date-time
      required:
        - latitude
        - longitude
        - jurisdictionCity
        - jurisdictionState
        - jurisdictionFips
        - source
        - geocodedAt

    Site:
      type: object
      properties:
        address:
          type: string
          nullable: true
        geocode:
          oneOf:
            - $ref: "#/components/schemas/Geocode"
            - type: "null"
        projectType:
          oneOf:
            - $ref: "#/components/schemas/ProjectType"
            - type: "null"
        zoningCode:
          type: string
          nullable: true
        lotAreaSqft:
          type: number
          nullable: true
      required:
        - address
        - geocode
        - projectType
        - zoningCode
        - lotAreaSqft

    EngagementSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        jurisdiction:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/EngagementStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        snapshotCount:
          type: integer
        latestSnapshot:
          oneOf:
            - $ref: "#/components/schemas/SnapshotSummary"
            - type: "null"
        site:
          $ref: "#/components/schemas/Site"
        revitCentralGuid:
          type: string
          nullable: true
        revitDocumentPath:
          type: string
          nullable: true
      required:
        - id
        - name
        - jurisdiction
        - address
        - status
        - createdAt
        - updatedAt
        - snapshotCount
        - latestSnapshot
        - site
        - revitCentralGuid
        - revitDocumentPath

    EngagementDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        jurisdiction:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/EngagementStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        snapshotCount:
          type: integer
        latestSnapshot:
          oneOf:
            - $ref: "#/components/schemas/SnapshotSummary"
            - type: "null"
        snapshots:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotSummary"
        site:
          $ref: "#/components/schemas/Site"
        warnings:
          type: array
          items:
            type: string
        revitCentralGuid:
          type: string
          nullable: true
        revitDocumentPath:
          type: string
          nullable: true
      required:
        - id
        - name
        - jurisdiction
        - address
        - status
        - createdAt
        - updatedAt
        - snapshotCount
        - latestSnapshot
        - snapshots
        - site
        - revitCentralGuid
        - revitDocumentPath


    SnapshotSummary:
      type: object
      properties:
        id:
          type: string
        engagementId:
          type: string
        engagementName:
          type: string
        projectName:
          type: string
        sheetCount:
          type: integer
          nullable: true
        roomCount:
          type: integer
          nullable: true
        levelCount:
          type: integer
          nullable: true
        wallCount:
          type: integer
          nullable: true
        receivedAt:
          type: string
          format: date-time
      required:
        - id
        - engagementId
        - engagementName
        - projectName
        - sheetCount
        - roomCount
        - levelCount
        - wallCount
        - receivedAt

    SnapshotPayload:
      description: |
        A04.7 — discriminated union. Either bind to an existing engagement by
        id (typically returned by /engagements/match action="auto-bind" or
        chosen from action="choose"), or explicitly request a new engagement
        via createNewEngagement=true with the project metadata.
      oneOf:
        - $ref: "#/components/schemas/SnapshotPayloadExisting"
        - $ref: "#/components/schemas/SnapshotPayloadNew"

    SnapshotPayloadExisting:
      type: object
      properties:
        engagementId:
          type: string
      required:
        - engagementId
      additionalProperties: true

    SnapshotPayloadNew:
      type: object
      properties:
        createNewEngagement:
          type: boolean
          enum: [true]
          description: Discriminator literal — must be true to select this branch.
        projectName:
          type: string
        revitCentralGuid:
          type: string
          nullable: true
        revitDocumentPath:
          type: string
          nullable: true
      required:
        - createNewEngagement
        - projectName
      additionalProperties: true

    MatchEngagementBody:
      type: object
      properties:
        projectName:
          type: string
        revitCentralGuid:
          type: string
          nullable: true
        revitDocumentPath:
          type: string
          nullable: true
      required:
        - projectName

    EngagementCandidate:
      type: object
      description: Lean engagement summary for the add-in's "choose" dropdown.
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
          nullable: true
        jurisdiction:
          type: string
          nullable: true
        revitCentralGuid:
          type: string
          nullable: true
        revitDocumentPath:
          type: string
          nullable: true
        snapshotCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - address
        - jurisdiction
        - revitCentralGuid
        - revitDocumentPath
        - snapshotCount
        - updatedAt

    MatchEngagementResponse:
      oneOf:
        - $ref: "#/components/schemas/MatchAutoBindResult"
        - $ref: "#/components/schemas/MatchChooseResult"
        - $ref: "#/components/schemas/MatchCreateNewResult"
      discriminator:
        propertyName: action
        mapping:
          auto-bind: "#/components/schemas/MatchAutoBindResult"
          choose: "#/components/schemas/MatchChooseResult"
          create-new: "#/components/schemas/MatchCreateNewResult"

    MatchAutoBindResult:
      type: object
      properties:
        action:
          type: string
          enum: [auto-bind]
        engagementId:
          type: string
        engagementName:
          type: string
        matchedBy:
          type: string
          enum: [revitCentralGuid, revitDocumentPath]
      required:
        - action
        - engagementId
        - engagementName
        - matchedBy

    MatchChooseResult:
      type: object
      properties:
        action:
          type: string
          enum: [choose]
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/EngagementCandidate"
      required:
        - action
        - candidates

    MatchCreateNewResult:
      type: object
      properties:
        action:
          type: string
          enum: [create-new]
      required:
        - action

    SnapshotReceipt:
      type: object
      properties:
        id:
          type: string
        receivedAt:
          type: string
          format: date-time
        engagementId:
          type: string
        engagementName:
          type: string
        autoCreated:
          type: boolean
      required:
        - id
        - receivedAt
        - engagementId
        - engagementName
        - autoCreated

    SnapshotDetail:
      type: object
      properties:
        id:
          type: string
        engagementId:
          type: string
        engagementName:
          type: string
        projectName:
          type: string
        sheetCount:
          type: integer
          nullable: true
        roomCount:
          type: integer
          nullable: true
        levelCount:
          type: integer
          nullable: true
        wallCount:
          type: integer
          nullable: true
        receivedAt:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
        sheets:
          type: array
          items:
            $ref: "#/components/schemas/SheetSummary"
      required:
        - id
        - engagementId
        - engagementName
        - projectName
        - sheetCount
        - roomCount
        - levelCount
        - wallCount
        - receivedAt
        - payload
        - sheets

    SheetSummary:
      type: object
      properties:
        id:
          type: string
        snapshotId:
          type: string
        engagementId:
          type: string
        sheetNumber:
          type: string
        sheetName:
          type: string
        viewCount:
          type: integer
          nullable: true
        revisionNumber:
          type: string
          nullable: true
        revisionDate:
          type: string
          nullable: true
        thumbnailWidth:
          type: integer
        thumbnailHeight:
          type: integer
        fullWidth:
          type: integer
        fullHeight:
          type: integer
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - snapshotId
        - engagementId
        - sheetNumber
        - sheetName
        - viewCount
        - revisionNumber
        - revisionDate
        - thumbnailWidth
        - thumbnailHeight
        - fullWidth
        - fullHeight
        - sortOrder
        - createdAt

    SheetUploadResponse:
      type: object
      properties:
        uploaded:
          type: integer
        skipped:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
        - uploaded
        - skipped
        - failed
        - errors

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    ChatRequest:
      type: object
      properties:
        engagementId:
          type: string
        question:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        referencedSheetIds:
          type: array
          items:
            type: string
        referencedAtomIds:
          type: array
          description: |
            Optional list of code atom UUIDs the user has explicitly attached
            to this question. Capped server-side. Atoms are fetched, scoped
            to the engagement's jurisdiction, and injected into the system
            prompt alongside any retrieval-discovered atoms.
          items:
            type: string
      required:
        - engagementId
        - question

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ChatErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    JurisdictionSummary:
      type: object
      properties:
        key:
          type: string
        displayName:
          type: string
        atomCount:
          type: integer
        embeddedCount:
          type: integer
        lastFetchedAt:
          type: string
          format: date-time
          nullable: true
        books:
          type: array
          items:
            type: object
            properties:
              codeBook:
                type: string
              edition:
                type: string
              label:
                type: string
              sourceName:
                type: string
              atomCount:
                type: integer
            required:
              - codeBook
              - edition
              - label
              - sourceName
              - atomCount
      required:
        - key
        - displayName
        - atomCount
        - embeddedCount
        - lastFetchedAt
        - books

    CodeAtomSummary:
      type: object
      properties:
        id:
          type: string
        jurisdictionKey:
          type: string
        codeBook:
          type: string
        edition:
          type: string
        sectionNumber:
          type: string
          nullable: true
        sectionTitle:
          type: string
          nullable: true
        sourceName:
          type: string
        sourceUrl:
          type: string
        embedded:
          type: boolean
        fetchedAt:
          type: string
          format: date-time
        bodyPreview:
          type: string
      required:
        - id
        - jurisdictionKey
        - codeBook
        - edition
        - sectionNumber
        - sectionTitle
        - sourceName
        - sourceUrl
        - embedded
        - fetchedAt
        - bodyPreview

    CodeAtomListResponse:
      type: object
      description: |
        Paginated response for the global atom list endpoint
        (`GET /codes/atoms`). `total` reflects the count of atoms matching
        the filters before pagination; `limit` and `offset` echo the
        applied (clamped) request values so the UI can render correct
        Prev/Next state without re-deriving them.
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/CodeAtomSummary"
      required:
        - total
        - limit
        - offset
        - items

    CodeAtomDetail:
      allOf:
        - $ref: "#/components/schemas/CodeAtomSummary"
        - type: object
          properties:
            body:
              type: string
            bodyHtml:
              type: string
              nullable: true
            parentSection:
              type: string
              nullable: true
            embeddingModel:
              type: string
              nullable: true
            metadata:
              type: object
              additionalProperties: true
              nullable: true
          required:
            - body
            - bodyHtml
            - parentSection
            - embeddingModel
            - metadata

    WarmupResult:
      type: object
      properties:
        jurisdictionKey:
          type: string
        enqueued:
          type: integer
        skipped:
          type: integer
        drained:
          type: object
          properties:
            picked:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
            atomsWritten:
              type: integer
          required:
            - picked
            - completed
            - failed
            - atomsWritten
        discoveryErrors:
          type: array
          description: |
            Per-book discovery-phase failures (missing source row, listToc
            threw, etc). Empty array on success. Surfaced to the UI so the
            "warmup discovered nothing" silent-failure case is debuggable
            from the browser.
          items:
            type: object
            properties:
              sourceName:
                type: string
              error:
                type: string
            required:
              - sourceName
              - error
      required:
        - jurisdictionKey
        - enqueued
        - skipped
        - drained
        - discoveryErrors

    WarmupStatus:
      type: object
      description: |
        Live state of the code-atom fetch queue for a jurisdiction. The DB
        column `status` uses `in_progress`; this surface re-labels it as
        `processing` for clarity. `lastError` carries the most recent
        failed-row text (truncated to 1000 chars by the orchestrator) so
        warmup failures are debuggable from the browser.
      properties:
        jurisdictionKey:
          type: string
        state:
          type: string
          enum: [idle, running, completed, failed]
        pending:
          type: integer
        processing:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        total:
          type: integer
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        lastError:
          type: string
          nullable: true
      required:
        - jurisdictionKey
        - state
        - pending
        - processing
        - completed
        - failed
        - total
        - startedAt
        - completedAt
        - lastError
