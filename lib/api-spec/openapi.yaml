        - content

    ChatRequest:
      type: object
      properties:
        engagementId:
          type: string
        question:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        referencedSheetIds:
          type: array
          items:
            type: string
        referencedAtomIds:
          type: array
          description: |
            Optional list of code atom UUIDs the user has explicitly attached
            to this question. Capped server-side. Atoms are fetched, scoped
            to the engagement's jurisdiction, and injected into the system
            prompt alongside any retrieval-discovered atoms.
          items:
            type: string
        snapshotFocus:
          type: boolean
          description: |
            Opt this turn into "snapshot focus mode" against the
            engagement's *latest* snapshot. When true, the server loads
            the full structured `snapshots.payload` blob for that
            snapshot and injects it into the system prompt inside a
            dedicated `<snapshot_focus>` block, on top of the always-on
            snapshot atom summary. Use it for deep questions like
            "what's the area of room 204?" or "list every door schedule
            entry" — the cost stays bounded to the turns that need it.
            Equivalent to embedding a
            `{{atom|snapshot|<latestSnapshotId>|focus}}` inline
            reference in the question text. For comparison questions
            that need to look at *older* snapshots too, see
            `snapshotFocusIds`.
        snapshotFocusIds:
          type: array
          description: |
            Explicit list of snapshot ids to enter focus mode against
            for this turn (Task #44). Each id must belong to the same
            engagement; foreign ids cause a 400. The server emits one
            `<snapshot_focus snapshot_id="…">` block per id so the
            model can answer comparison-style questions that need to
            mine more than just the latest snapshot's payload (e.g.
            "how did the room schedule change between yesterday's push
            and today's?"). May be combined with `snapshotFocus: true`
            (the latest id is added if not already present). Capped
            server-side; ids are de-duplicated.
          items:
            type: string
      required:
        - engagementId
        - question

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    User:
      description: |
        A row in the `users` profile table — display name / email / avatar
        used to hydrate timeline actor labels. The `id` is the same opaque
        identifier the session layer carries (today: dev cookie ids like
        `u1`; once real auth lands: the verified subject id from the auth
        provider). See `lib/db/src/schema/users.ts` for the rationale on
        why this is intentionally NOT FK'd from `atom_events.actor.id`.

        `architectPdfHeader` is the per-architect override for the header
        text printed on the stakeholder-briefing PDF export. Null falls
        back to the default ("SmartCity Design Tools — Pre-Design
        Briefing"). Architects edit their own value via
        `PATCH /me/architect-pdf-header`; the admin `PATCH /users/{id}`
        route does not write the column today (the field is read-only on
        the admin "Users & Roles" surface).
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        email:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        architectPdfHeader:
          type: string
          nullable: true
          description: |
            Per-architect override for the briefing-export PDF header.
            Null → fall back to the default header. Trimmed empty
            strings are normalized to null on write.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - displayName
        - email
        - avatarUrl
        - architectPdfHeader
        - createdAt
        - updatedAt

    CreateUserBody:
      type: object
      properties:
        id:
          type: string
          minLength: 1
          description: |
            Opaque profile id. Must match whatever the session layer
            will surface for this user — for the dev cookie path that
            means values like `u1` / `u_abc123`; once real auth lands
            it should be the auth subject id.
        displayName:
          type: string
          minLength: 1
        email:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
      required:
        - id
        - displayName

    UpdateUserBody:
      type: object
      description: |
        Partial update. Omit a field to leave it unchanged. `email` and
        `avatarUrl` accept `null` to clear them; `displayName` is
        non-nullable so passing `null` is a 400.
      properties:
        displayName:
          type: string
          minLength: 1
        email:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true

    UpdateMyArchitectPdfHeaderBody:
      type: object
      description: |
        Body for `PATCH /me/architect-pdf-header`. The string is trimmed
        server-side; an empty / whitespace-only value (or explicit
        `null`) clears the override and the PDF route falls back to the
        default header. There is no length cap today — the briefing PDF
        layout truncates visually if the architect picks something
        absurdly long.
      properties:
        architectPdfHeader:
          type: string
          nullable: true
      required:
        - architectPdfHeader

    UpdateMyProfileBody:
      type: object
      description: |
        Body for `PATCH /me/profile`. Partial update: omit a field to
        leave it unchanged. `email` and `avatarUrl` accept `null` to
        clear the column; `displayName` is non-nullable, and an
        empty / whitespace-only value is a 400 server-side (we never
        silently demote an architect's name to "" or back to the
        opaque user id). `email` is trimmed; an empty / whitespace-
        only string normalises to `null` so the FE form can clear the
        column with a blank input.
      properties:
        displayName:
          type: string
          minLength: 1
        email:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true

    RequestUploadUrlBody:
      type: object
      description: |
        File metadata sent to obtain a presigned PUT URL. The file bytes
        themselves are NOT sent to this endpoint — they are PUT directly
        to the returned `uploadURL` (which targets GCS).

        `size` is capped at 2 MiB. The only consumer today is avatar
        uploads, and the Plan Review web UI client-side-resizes those to
        ~20 KB before requesting a URL. The server-side cap exists so a
        non-browser client (mobile app, curl, integration) can't ask for
        a URL for an arbitrarily large object and bloat storage. Requests
        that exceed the cap get a clear `413` from the route handler
        before the schema validation runs.

        `contentType` is restricted to image MIME types for the same
        reason: the only consumer today is the avatar uploader, so a
        non-browser client can't smuggle a non-image blob (e.g. a JSON
        dump) past the size cap. Requests with a disallowed content type
        get a clear `415` from the route handler before the schema
        validation runs.
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 0
          maximum: 2097152
        contentType:
          type: string
          enum:
            - image/jpeg
            - image/png
            - image/webp
            - image/gif
            - image/svg+xml
      required:
        - name
        - size
        - contentType

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
          description: Short-lived presigned PUT URL (uploads go directly to GCS).
        objectPath:
          type: string
          description: |
            Canonical `/objects/<id>` path to persist on the owning
            record. Serve the asset by prepending the storage mount
            (`/api/storage` + `objectPath`).
        metadata:
          $ref: "#/components/schemas/RequestUploadUrlBody"
      required:
        - uploadURL
        - objectPath
        - metadata

    SessionRequestor:
      type: object
      description: |
        The actor on whose behalf the request is being made. `kind`
        distinguishes a human user from a machine agent; `id` is opaque
        to the framework (today: dev cookie ids like `u1`; once real
        auth lands: the verified subject id from the auth provider).
      properties:
        kind:
          type: string
          enum: [user, agent]
        id:
          type: string
      required:
        - kind
        - id

    Session:
      type: object
      description: |
        The session attached to the current request by
        `middlewares/session.ts`. Frontends consume this to gate
        admin-only UI — e.g. the "Users & Roles" sidebar entry only
        renders for sessions whose `permissions` include
        `users:manage`. In production the server returns the
        anonymous-applicant default until a real auth layer lands.
      properties:
        audience:
          type: string
          enum: [internal, user, ai]
        requestor:
          $ref: "#/components/schemas/SessionRequestor"
        permissions:
          type: array
          items:
            type: string
      required:
        - audience
        - permissions

    AtomKeyMetric:
      description: One row of the atom `keyMetrics` layer.
      type: object
      properties:
        label:
          type: string
        value:
          oneOf:
            - type: string
            - type: number
        unit:
          type: string
      required:
        - label
        - value

    AtomReference:
      description: |
        Reference to another atom this one mentions. The framework keeps the
        shape narrow on purpose — a render binding only needs `slug` + `id`
        to fetch the referenced atom's own summary.
      type: object
      properties:
        slug:
          type: string
        id:
          type: string
      required:
        - slug
        - id

    AtomHistoryProvenance:
      description: |
        Provenance of the latest history event written through the atom's
        `EventAnchoringService`. `latestEventId` is `""` when the atom has
        no events yet — render bindings should treat that as "not tracked"
        rather than parsing the timestamp.
      type: object
      properties:
        latestEventId:
          type: string
        latestEventAt:
          type: string
          format: date-time
      required:
        - latestEventId
        - latestEventAt

    AtomEventActor:
      description: |
        Identity of the actor that produced an event. Mirrors the
        `EventActor` type in `@workspace/empressa-atom`. `id` is opaque
        to the framework; producers (e.g. snapshot ingest) choose the
        identity scheme.

        For `kind: user` actors the server hydrates the optional
        `displayName` (and, when available, `email` / `avatarUrl`) from
        the `users` profile table so timeline UIs can render
        "Jane Doe changed the address" instead of "user:u_abc123 …".
        These fields are absent when:
          - the actor kind is `agent` or `system` (those carry their
            own stable code-side label in `id`); or
          - the user-id has no matching profile row (deleted account,
            ad-hoc dev id, etc.) — UIs should fall back to "Unknown
            user" in that case.
      type: object
      properties:
        kind:
          type: string
          enum: [user, agent, system]
        id:
          type: string
        displayName:
          type: string
          description: "Hydrated profile display name. Only set for `kind: user` actors with a matching `users` row."
        email:
          type: string
          description: "Hydrated profile email. Only set for `kind: user` actors when present on the profile."
        avatarUrl:
          type: string
          description: "Hydrated profile avatar URL. Only set for `kind: user` actors when present on the profile."
      required:
        - kind
        - id

    AtomHistoryEvent:
      description: |
        One row from `atom_events` exposed over HTTP. Matches the public
        fields of `AtomEvent` from `@workspace/empressa-atom` minus the
        chain hashes (`prevHash`/`chainHash`), which are an implementation
        detail of the anchoring service and not useful to UI consumers.
      type: object
      properties:
        id:
          type: string
        eventType:
          type: string
        actor:
          $ref: "#/components/schemas/AtomEventActor"
        occurredAt:
          type: string
          format: date-time
        recordedAt:
          type: string
          format: date-time
      required:
        - id
        - eventType
        - actor
        - occurredAt
        - recordedAt

    AtomHistoryResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AtomHistoryEvent"
      required:
        - events

    SnapshotSheetHistoryEntry:
      description: |
        One sheet's recent history slice as returned by
        `GET /snapshots/{id}/sheet-history`. `events` is newest-first
        (matching the per-atom endpoint) and may be empty when the sheet
        has no recorded events yet.
      type: object
      properties:
        sheetId:
          type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/AtomHistoryEvent"
      required:
        - sheetId
        - events

    SnapshotSheetHistoryResponse:
      description: |
        Snapshot-scoped batch history response. `histories` contains one
        entry per sheet that belongs to the snapshot (one entry even when
        the sheet has no events), so the FE can render a stable shape
        without a second lookup.
      type: object
      properties:
        histories:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotSheetHistoryEntry"
      required:
        - histories

    AtomSummary:
      description: |
        Spec 20 §4 four-layer `ContextSummary` returned by an atom's
        `contextSummary(id, scope)` callback. `typed` is open-shaped
        because each atom narrows it differently (see e.g. `SheetTypedPayload`
        in the api-server `sheet.atom`).
      type: object
      properties:
        prose:
          type: string
        typed:
          type: object
          additionalProperties: true
        keyMetrics:
          type: array
          items:
            $ref: "#/components/schemas/AtomKeyMetric"
        relatedAtoms:
          type: array
          items:
            $ref: "#/components/schemas/AtomReference"
        historyProvenance:
          $ref: "#/components/schemas/AtomHistoryProvenance"
        scopeFiltered:
          type: boolean
      required:
        - prose
        - typed
        - keyMetrics
        - relatedAtoms
        - historyProvenance
        - scopeFiltered

    ChatErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    RetrievalProbeBody:
      type: object
      description: |
        Either `engagementId` OR `jurisdiction` must be set, but not both. The
        server validates this and returns 400 if violated. (Modeled as both
        optional rather than `oneOf` for codegen simplicity.)
      properties:
        engagementId:
          type: string
          nullable: true
          description: Engagement UUID. Server resolves jurisdiction from the engagement.
        jurisdiction:
          type: string
          nullable: true
          description: Literal jurisdiction key (e.g. `grand_county_ut`).
        query:
          type: string
          minLength: 1
          description: Natural-language question to embed and retrieve atoms for.
        topN:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
          description: |
            Number of top-ranked atoms to return. Defaults to 10 (wider than
            prod chat's MAX_RETRIEVED_ATOMS=8 to give the operator more
            below-the-fold context). The UI labels chat's actual cutoff.
      required:
        - query

    RetrievalProbeResultItem:
      type: object
      properties:
        rank:
          type: integer
          description: 1-indexed position by similarity DESC.
        atomId:
          type: string
        codeRef:
          type: string
          description: Display ref — sectionNumber ?? sectionTitle ?? codeBook.
        sectionTitle:
          type: string
          nullable: true
        bodyPreview:
          type: string
          description: Server-truncated body, ~120 chars at word boundary.
        similarity:
          type: number
          description: |
            Cosine similarity (vector path) or bag-of-words score (lexical
            fallback). Vector scores are in [0, 1]; lexical scores are raw
            integer match counts. The probe rounds vector scores to 4 decimal
            places.
        sourceBook:
          type: string
          description: codeBook from the atom (e.g. IRC_R301_2_1).
        sourceUrl:
          type: string
          nullable: true
        retrievalMode:
          type: string
          description: '"vector" or "lexical" — which retrieval path produced this row.'
      required:
        - rank
        - atomId
        - codeRef
        - sectionTitle
        - bodyPreview
        - similarity
        - sourceBook
        - sourceUrl
        - retrievalMode

    RetrievalProbeResponse:
      type: object
      properties:
        resolvedJurisdiction:
          type: string
          description: The jurisdiction key actually used for retrieval.
        resolvedFromEngagement:
          type: boolean
          description: True when jurisdiction was derived from engagementId path.
        query:
          type: string
        queryEmbedding:
          type: object
          properties:
            model:
              type: string
              description: Embedding model name (e.g. `text-embedding-3-small`).
            dimension:
              type: integer
              description: Embedding vector dimension (e.g. 1536).
            available:
              type: boolean
              description: |
                False if no OPENAI_API_KEY is configured (retrieval falls back
                to lexical bag-of-words; similarity scores are integer match
                counts, not cosine).
          required:
            - model
            - dimension
            - available
        inclusionThreshold:
          type: number
          format: float
          description: |
            The minimum cosine-similarity score the chat path requires for a
            vector-retrieved atom to be included in the LLM's reference block.
            The probe itself does NOT filter by this — it returns the full
            top-N — but echoes the value so the UI can render an accurate
            "above this line is what chat actually sends" divider. Has no
            meaning in lexical-fallback mode (`queryEmbedding.available =
            false`); the UI hides the divider in that case.
        results:
          type: array
          description: |
            ALL retrieved atoms (probe passes `applyMinScore: false`); rows
            below `inclusionThreshold` are still returned for diagnostic
            visibility.
          items:
            $ref: "#/components/schemas/RetrievalProbeResultItem"
        assembledPromptBlock:
          type: string
          description: |
            The literal `<reference_code_atoms>...</reference_code_atoms>` XML
            block that would be embedded in Claude's system prompt for this
            query. Empty string when results is empty (matches chat behavior).
      required:
        - resolvedJurisdiction
        - resolvedFromEngagement
        - query
        - queryEmbedding
        - inclusionThreshold
        - results
        - assembledPromptBlock

    JurisdictionSummary:
      type: object
      properties:
        key:
          type: string
        displayName:
          type: string
        atomCount:
          type: integer
        embeddedCount:
          type: integer
        lastFetchedAt:
          type: string
          format: date-time
          nullable: true
        books:
          type: array
          items:
            type: object
            properties:
              codeBook:
                type: string
              edition:
                type: string
              label:
                type: string
              sourceName:
                type: string
              atomCount:
                type: integer
            required:
              - codeBook
              - edition
              - label
              - sourceName
              - atomCount
      required:
        - key
        - displayName
        - atomCount
        - embeddedCount
        - lastFetchedAt
        - books

    CodeAtomSummary:
      type: object
      properties:
        id:
          type: string
        jurisdictionKey:
          type: string
        codeBook:
          type: string
        edition:
          type: string
        sectionNumber:
          type: string
          nullable: true
        sectionTitle:
          type: string
          nullable: true
        sourceName:
          type: string
        sourceUrl:
          type: string
        embedded:
          type: boolean
        fetchedAt:
          type: string
          format: date-time
        bodyPreview:
          type: string
      required:
        - id
        - jurisdictionKey
        - codeBook
        - edition
        - sectionNumber
        - sectionTitle
        - sourceName
        - sourceUrl
        - embedded
        - fetchedAt
        - bodyPreview

    CodeAtomListResponse:
      type: object
      description: |
        Paginated response for the global atom list endpoint
        (`GET /codes/atoms`). `total` reflects the count of atoms matching
        the filters before pagination; `limit` and `offset` echo the
        applied (clamped) request values so the UI can render correct
        Prev/Next state without re-deriving them.
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/CodeAtomSummary"
      required:
        - total
        - limit
        - offset
        - items

    CodeAtomDetail:
      allOf:
        - $ref: "#/components/schemas/CodeAtomSummary"
        - type: object
          properties:
            body:
              type: string
            bodyHtml:
              type: string
              nullable: true
            parentSection:
              type: string
              nullable: true
            embeddingModel:
              type: string
              nullable: true
            metadata:
              type: object
              additionalProperties: true
              nullable: true
          required:
            - body
            - bodyHtml
            - parentSection
            - embeddingModel
            - metadata

    WarmupResult:
      type: object
      properties:
        jurisdictionKey:
          type: string
        enqueued:
          type: integer
        skipped:
          type: integer
        drained:
          type: object
          properties:
            picked:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
            atomsWritten:
              type: integer
          required:
            - picked
            - completed
            - failed
            - atomsWritten
        discoveryErrors:
          type: array
          description: |
            Per-book discovery-phase failures (missing source row, listToc
            threw, etc). Empty array on success. Surfaced to the UI so the
            "warmup discovered nothing" silent-failure case is debuggable
            from the browser.
          items:
            type: object
            properties:
              sourceName:
                type: string
              error:
                type: string
            required:
              - sourceName
              - error
      required:
        - jurisdictionKey
        - enqueued
        - skipped
        - drained
        - discoveryErrors

    WarmupStatus:
      type: object
      description: |
        Live state of the code-atom fetch queue for a jurisdiction. The DB
        column `status` uses `in_progress`; this surface re-labels it as
        `processing` for clarity. `lastError` carries the most recent
        failed-row text (truncated to 1000 chars by the orchestrator) so
        warmup failures are debuggable from the browser.
      properties:
        jurisdictionKey:
          type: string
        state:
          type: string
          enum: [idle, running, completed, failed]
        pending:
          type: integer
        processing:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        total:
          type: integer
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        lastError:
          type: string
          nullable: true
      required:
        - jurisdictionKey
        - state
        - pending
        - processing
        - completed
        - failed
        - total
        - startedAt
        - completedAt
        - lastError

    MaterializableElementKind:
      type: string
      enum:
        - terrain
        - property-line
        - setback-plane
        - buildable-envelope
        - floodplain
        - wetland
        - neighbor-mass
      description: |
        DA-PI-5 / Spec 51a §2.4 — the seven element kinds the C# Revit
        add-in knows how to materialize. Mirrors `DXF_LAYER_KINDS` on
        the api-server `converterClient` so a materializable element
        sourced from a DXF round-trips through the same closed set.

    BimModelRefreshStatus:
      type: string
      enum: [current, stale, not-pushed]
      description: |
        DA-PI-5 / Spec 53 §3 — the three statuses the Site Context
        "Push to Revit" affordance can surface. See the
        `getBimModelRefresh` description for state semantics.

    BriefingDivergenceReason:
      type: string
      enum: [unpinned, geometry-edited, deleted, other]
      description: |
        DA-PI-5 / Spec 51a §2.2 — the closed set of reason buckets the
        C# Revit add-in is allowed to record when an architect
        modifies a locked materializable element.

    MaterializableElement:
      type: object
      description: |
        DA-PI-5 / Spec 51a §2.4 — one piece of geometry the C# Revit
        add-in materializes into the architect's active model. The
        `geometry` payload is discriminator-dependent (see the
        column docstring on `materializable_elements.geometry`).
      properties:
        id:
          type: string
        briefingId:
          type: string
        elementKind:
          $ref: "#/components/schemas/MaterializableElementKind"
        briefingSourceId:
          type: string
          nullable: true
        label:
          type: string
          nullable: true
        geometry:
          type: object
          additionalProperties: true
          description: Discriminator-dependent geometry payload; see schema docstring.
        glbObjectPath:
          type: string
          nullable: true
        locked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - briefingId
        - elementKind
        - briefingSourceId
        - label
        - geometry
        - glbObjectPath
        - locked
        - createdAt
        - updatedAt

    EngagementBimModel:
      type: object
      description: |
        DA-PI-5 — the engagement's bim-model row plus the
        materializable elements derived from its currently-active
        briefing.
      properties:
        id:
          type: string
        engagementId:
          type: string
        activeBriefingId:
          type: string
          nullable: true
        briefingVersion:
          type: integer
          minimum: 0
        materializedAt:
          type: string
          format: date-time
          nullable: true
        revitDocumentPath:
          type: string
          nullable: true
        refreshStatus:
          $ref: "#/components/schemas/BimModelRefreshStatus"
        elements:
          type: array
          items:
            $ref: "#/components/schemas/MaterializableElement"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - engagementId
        - activeBriefingId
        - briefingVersion
        - materializedAt
        - revitDocumentPath
        - refreshStatus
        - elements
        - createdAt
        - updatedAt

    EngagementBimModelResponse:
      type: object
      description: |
        Wire envelope for the bim-model read/push routes. `bimModel`
        is `null` when no push has happened yet for the engagement
        — the first call to `POST /engagements/{id}/bim-model` is
        what creates it.
      properties:
        bimModel:
          allOf:
            - $ref: "#/components/schemas/EngagementBimModel"
          nullable: true
      required:
        - bimModel

    PushBimModelBody:
      type: object
      description: |
        Request body for `POST /engagements/{id}/bim-model`. All
        fields are optional — the route resolves the engagement's
        currently-active briefing on the server side rather than
        trusting the client to name it.
      properties:
        revitDocumentPath:
          type: string
          maxLength: 1024
          nullable: true
          description: |
            Optional architect-supplied identifier of the Revit
            document the bim-model is bound to (operator visibility
            only).

    BimModelElementDiffStatus:
      type: string
      enum:
        - added
        - modified
        - unchanged
      description: |
        Per-element delta status returned in `BimModelRefreshResponse.diff.elements`.
        - `added`     — element was created on the briefing AFTER
          `bimModel.materializedAt` (the C# add-in has never seen it).
        - `modified`  — element existed at materialization time but
          its `updatedAt` is newer than `materializedAt` (geometry
          or label changed since the last push).
        - `unchanged` — element is older-or-equal to the
          materialization timestamp (still safe to leave in place).
        We deliberately do NOT include a `removed` status: api-server
        does not snapshot the materialized element set at push time,
        so deletions detected by the C# add-in are reported via
        `POST /bim-models/{id}/divergence` (`reason: "deleted"`)
        rather than inferred here.

    BimModelElementDiff:
      type: object
      description: |
        One row in the per-element diff returned by
        `getBimModelRefresh`. Mirrors the wire fields the C# add-in
        needs to decide whether to re-instance, re-place, or skip a
        given materializable element on refresh.
      properties:
        id:
          type: string
        elementKind:
          type: string
        label:
          type: string
          nullable: true
        diffStatus:
          $ref: "#/components/schemas/BimModelElementDiffStatus"
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - elementKind
        - label
        - diffStatus
        - updatedAt

    BimModelRefreshDiff:
      type: object
      description: |
        Element-level delta between the bim-model's last materialization
        and the briefing's current state. Always present (even when
        `refreshStatus === "current"`) so the C# add-in can iterate a
        single shape regardless of status.
      properties:
        elements:
          type: array
          items:
            $ref: "#/components/schemas/BimModelElementDiff"
        addedCount:
          type: integer
          minimum: 0
        modifiedCount:
          type: integer
          minimum: 0
        unchangedCount:
          type: integer
          minimum: 0
      required:
        - elements
        - addedCount
        - modifiedCount
        - unchangedCount

    BimModelRefreshResponse:
      type: object
      description: |
        DA-PI-5 / Spec 53 §3 — refresh diff payload. Carries the
        statuses the FE renders on the Site Context tab, the
        timestamps the C# add-in uses to decide whether to prompt
        the architect for a re-push, and the element-level `diff`
        the add-in iterates to plan its re-materialization protocol.
      properties:
        bimModelId:
          type: string
        engagementId:
          type: string
        refreshStatus:
          $ref: "#/components/schemas/BimModelRefreshStatus"
        materializedAt:
          type: string
          format: date-time
          nullable: true
        briefingVersion:
          type: integer
          minimum: 0
        activeBriefingId:
          type: string
          nullable: true
        activeBriefingUpdatedAt:
          type: string
          format: date-time
          nullable: true
        diff:
          $ref: "#/components/schemas/BimModelRefreshDiff"
      required:
        - bimModelId
        - engagementId
        - refreshStatus
        - materializedAt
        - briefingVersion
        - activeBriefingId
        - activeBriefingUpdatedAt
        - diff

    RecordBimModelDivergenceBody:
      type: object
      description: |
        Request body for `POST /bim-models/{id}/divergence`. The C#
        Revit add-in sends one row per detected override against a
        locked materializable element.
      properties:
        materializableElementId:
          type: string
          description: The locked element the architect modified.
        reason:
          $ref: "#/components/schemas/BriefingDivergenceReason"
        note:
          type: string
          maxLength: 2048
          nullable: true
          description: Optional architect-supplied explanation.
        detail:
          type: object
          additionalProperties: true
          description: |
            Free-form bag the C# side may attach (before/after
            geometry digests, the Revit element id that fired the
            trigger, etc). Defaults to an empty object on the wire
            when omitted.
      required:
        - materializableElementId
        - reason

    BriefingDivergence:
      type: object
      description: |
        DA-PI-5 / Spec 51a §2.2 — one append-only audit row produced
        when an architect modifies a locked materializable element.

        `resolvedAt` / `resolvedByRequestor` carry the operator
        acknowledgement (Task #191): null while the divergence is
        Open, populated once an architect-audience caller has called
        `POST /bim-models/{id}/divergences/{divergenceId}/resolve`.
        Resolution is a soft acknowledgement layered on top of the
        append-only record — a subsequent `POST /bim-models/{id}/divergence`
        for the same element lands as a fresh row.
      properties:
        id:
          type: string
        bimModelId:
          type: string
        materializableElementId:
          type: string
        briefingId:
          type: string
        reason:
          $ref: "#/components/schemas/BriefingDivergenceReason"
        note:
          type: string
          nullable: true
        detail:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        resolvedByRequestor:
          allOf:
            - $ref: "#/components/schemas/RequestorRef"
          nullable: true
      required:
        - id
        - bimModelId
        - materializableElementId
        - briefingId
        - reason
        - note
        - detail
        - createdAt
        - resolvedAt
        - resolvedByRequestor

    RequestorRef:
      type: object
      description: |
        Stable shape for a session-bound caller's identity, mirroring
        `SessionUser.requestor` on the api-server. `id` is the opaque
        identifier the upstream identity layer hands us — not an FK
        to anything, deliberately, so a swap of identity providers
        cannot retroactively break the audit trail (see
        `lib/db/src/schema/users.ts` for the rationale).

        `displayName` is an optional, best-effort hydration of the
        underlying `users.displayName` for `kind === "user"` actors
        (Task #212). It is populated for surfaces that join through
        the `users` table when the identity is known; consumers must
        fall back to the raw `id` when the field is absent so a
        missing or transiently-unavailable profile does not blank
        the audit trail.

        `avatarUrl` is the matching best-effort hydration of
        `users.avatarUrl` (Task #269) so audit-trail surfaces that
        already render an avatar/initials chip beside the name (e.g.
        the design-tools "Resolved by …" attribution on the Site
        Context divergence panel) can show the image when one is
        on file. Same fallback contract as `displayName`: absent on
        the wire when no profile is hydrated, and consumers must
        gracefully render an initials chip (or neutral system glyph)
        when missing.
      properties:
        kind:
          type: string
          enum: [user, agent]
        id:
          type: string
        displayName:
          type: string
          description: |
            Friendly label for the actor when one is known. Optional
            on the wire — surfaces that do not hydrate identities
            (e.g. service-to-service callbacks) omit it, and
            consumers must fall back to `id`.
        avatarUrl:
          type: string
          description: |
            Best-effort hydration of `users.avatarUrl` for
            `kind === "user"` actors. Optional on the wire — absent
            when no profile is hydrated or the user has no avatar
            on file. Consumers should fall back to an initials chip.
      required:
        - kind
        - id

    BimModelDivergenceResponse:
      type: object
      description: |
        Wire envelope for `POST /bim-models/{id}/divergence`.
      properties:
        divergence:
          $ref: "#/components/schemas/BriefingDivergence"
      required:
        - divergence

    BimModelDivergenceListEntry:
      type: object
      description: |
        DA-PI-5 / Spec 51a §2.2 — one row in the
        `listBimModelDivergences` response. Joins each divergence
        with the materializable element it diverged from so the
        design-tools Site Context tab can group rows by element
        kind/label without a follow-up fetch. `elementKind` and
        `elementLabel` are nullable: a divergence whose parent
        element has since been deleted out from under the bim-model
        still surfaces (the row is preserved) but with both fields
        null so the UI can render an "element no longer in briefing"
        fallback.
      properties:
        id:
          type: string
        bimModelId:
          type: string
        materializableElementId:
          type: string
        briefingId:
          type: string
        reason:
          $ref: "#/components/schemas/BriefingDivergenceReason"
        note:
          type: string
          nullable: true
        detail:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Set when an operator marks the divergence resolved via
            `POST /bim-models/{id}/divergences/{divergenceId}/resolve`.
            Null while the divergence is still Open.
        resolvedByRequestor:
          allOf:
            - $ref: "#/components/schemas/RequestorRef"
          nullable: true
          description: |
            The session-bound requestor that recorded the resolve.
            Null while the divergence is still Open, or when the
            resolve was performed without a session-bound caller (in
            which case `resolvedAt` is still set).
        elementKind:
          allOf:
            - $ref: "#/components/schemas/MaterializableElementKind"
          nullable: true
        elementLabel:
          type: string
          nullable: true
      required:
        - id
        - bimModelId
        - materializableElementId
        - briefingId
        - reason
        - note
        - detail
        - createdAt
        - resolvedAt
        - resolvedByRequestor
        - elementKind
        - elementLabel

    ResolveBimModelDivergenceResponse:
      type: object
      description: |
        Wire envelope for `POST /bim-models/{id}/divergences/{divergenceId}/resolve`.
        Carries the divergence row in the same shape the list endpoint
        returns so the FE can splice the response into the cached
        list without a follow-up fetch.
      properties:
        divergence:
          $ref: "#/components/schemas/BimModelDivergenceListEntry"
      required:
        - divergence

    ListBimModelDivergencesResponse:
      type: object
      description: |
        Wire envelope for `GET /bim-models/{id}/divergences`.
        Newest-first list of architect overrides the C# Revit add-in
        has reported back against locked materializable elements.
      properties:
        divergences:
          type: array
          items:
            $ref: "#/components/schemas/BimModelDivergenceListEntry"
      required:
        - divergences

    ReviewerAnnotationTargetType:
      type: string
      description: |
        Closed enum of target atom types a reviewer annotation may be
        anchored to. Mirrors `REVIEWER_ANNOTATION_TARGET_TYPES` in
        `lib/db/src/schema/reviewerAnnotations.ts` — adding a new
        target type requires updating both the DB-side tuple and this
        enum so the route validator and the atom composition list
        stay in sync.
      enum:
        - submission
        - briefing-source
        - materializable-element
        - briefing-divergence
        - sheet
        - parcel-briefing

    ReviewerAnnotationCategory:
      type: string
      description: |
        Closed enum of category buckets a reviewer may file an
        annotation under. Drives the side-panel badge and lets future
        promotion-side filtering (e.g. "promote all concerns") avoid
        relying on free-text classification.
      enum:
        - concern
        - question
        - note
        - requires-followup

    ReviewerAnnotation:
      type: object
      description: |
        One reviewer-annotation row. Threaded via the optional
        `parentAnnotationId`. `promotedAt` is null while the
        annotation is still reviewer-only; once non-null the row is
        immutable and the architect-side jurisdiction-response inbox
        picks it up.
      properties:
        id:
          type: string
        submissionId:
          type: string
        targetEntityType:
          $ref: "#/components/schemas/ReviewerAnnotationTargetType"
        targetEntityId:
          type: string
        reviewerId:
          type: string
        body:
          type: string
        category:
          $ref: "#/components/schemas/ReviewerAnnotationCategory"
        parentAnnotationId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        promotedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - submissionId
        - targetEntityType
        - targetEntityId
        - reviewerId
        - body
        - category
        - parentAnnotationId
        - createdAt
        - updatedAt
        - promotedAt

    CreateReviewerAnnotationBody:
      type: object
      description: |
        Request body for `POST /submissions/{submissionId}/reviewer-annotations`.
        Top-level annotations omit `parentAnnotationId`; replies set it
        to the root annotation id of the thread (single-level threading
        is the v1 contract).
      properties:
        targetEntityType:
          $ref: "#/components/schemas/ReviewerAnnotationTargetType"
        targetEntityId:
          type: string
          minLength: 1
          maxLength: 512
        body:
          type: string
          minLength: 1
          maxLength: 4096
        category:
          $ref: "#/components/schemas/ReviewerAnnotationCategory"
        parentAnnotationId:
          type: string
          nullable: true
      required:
        - targetEntityType
        - targetEntityId
        - body

    UpdateReviewerAnnotationBody:
      type: object
      description: |
        Request body for `PATCH /submissions/{submissionId}/reviewer-annotations/{annotationId}`.
        Either or both fields may be supplied; an empty body is a no-op
        (returns the unchanged row). Promoted annotations reject all
        updates with 409.
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 4096
        category:
          $ref: "#/components/schemas/ReviewerAnnotationCategory"

    PromoteReviewerAnnotationsBody:
      type: object
      description: |
        Request body for `POST /submissions/{submissionId}/reviewer-annotations/promote`.
        Multi-promote in a single call so the jurisdiction-response
        dialog can flip the selected annotations into architect
        visibility atomically. At least one id is required.
      properties:
        annotationIds:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
      required:
        - annotationIds

    ReviewerAnnotationResponse:
      type: object
      description: |
        Wire envelope for `POST` and `PATCH` reviewer-annotation
        endpoints. Carries the affected row in the same shape the
        list endpoint returns so the FE can splice the response into
        cached lists without a follow-up fetch.
      properties:
        annotation:
          $ref: "#/components/schemas/ReviewerAnnotation"
      required:
        - annotation

    ListReviewerAnnotationsResponse:
      type: object
      description: |
        Wire envelope for `GET /submissions/{submissionId}/reviewer-annotations`.
        Newest-first list, optionally filtered by target entity type +
        id query parameters.
      properties:
        annotations:
          type: array
          items:
            $ref: "#/components/schemas/ReviewerAnnotation"
      required:
        - annotations

    PromoteReviewerAnnotationsResponse:
      type: object
      description: |
        Wire envelope for the multi-promote endpoint. `promoted` carries
        every annotation row that flipped from reviewer-only to
        promoted on this call (idempotent: already-promoted ids land in
        `alreadyPromoted` instead). `unknown` reports any ids in the
        request body that did not resolve to an annotation under the
        submission so the caller can surface the mismatch.
      properties:
        promoted:
          type: array
          items:
            $ref: "#/components/schemas/ReviewerAnnotation"
        alreadyPromoted:
          type: array
          items:
            $ref: "#/components/schemas/ReviewerAnnotation"
        unknown:
          type: array
          items:
            type: string
      required:
        - promoted
        - alreadyPromoted
        - unknown

    SubmissionCommentAuthorRole:
      type: string
      enum: [architect, reviewer]
      description: |
        Closed enum of comment-author roles on the
        reviewer↔architect submission thread. `architect` rows are
        posted from design-tools; `reviewer` rows are posted from
        plan-review. The role is body-supplied (not session-derived)
        because both surfaces today share the same `internal`
        audience.

    SubmissionComment:
      type: object
      description: |
        One row in a submission's reviewer↔architect comment thread.
        The seed of the thread is the reviewer's comment carried on
        the parent `submissions.reviewer_comment` field — that seed is
        NOT a row in this response; only replies posted via this route
        are.
      properties:
        id:
          type: string
        submissionId:
          type: string
        authorRole:
          $ref: "#/components/schemas/SubmissionCommentAuthorRole"
        authorId:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - submissionId
        - authorRole
        - authorId
        - body
        - createdAt
        - updatedAt

    CreateSubmissionCommentBody:
      type: object
      description: |
        Request body for `POST /submissions/{submissionId}/comments`.
        `authorRole` is required because the architect and reviewer
        surfaces both run under the `internal` audience today — the
        role distinguishes which UI a row was posted from. `authorId`
        is server-derived from the session-bound requestor and is NOT
        part of the request body.
      properties:
        authorRole:
          $ref: "#/components/schemas/SubmissionCommentAuthorRole"
        body:
          type: string
          minLength: 1
          maxLength: 4096
      required:
        - authorRole
        - body

    SubmissionCommentResponse:
      type: object
      description: |
        Wire envelope for `POST /submissions/{submissionId}/comments`.
        Carries the affected row in the same shape the list endpoint
        returns so the FE can splice the new row into cached lists
        without a follow-up fetch.
      properties:
        comment:
          $ref: "#/components/schemas/SubmissionComment"
      required:
        - comment

    ListSubmissionCommentsResponse:
      type: object
      description: |
        Wire envelope for `GET /submissions/{submissionId}/comments`.
        Oldest-first chronological list (chat-transcript order).
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/SubmissionComment"
      required:
        - comments

    FindingSeverity:
      type: string
      enum: [blocker, concern, advisory]
      description: |
        AIR-1 severity rubric (locked v1, see findingsMock.ts:41):
          - blocker  — code violation requiring resolution before approval
          - concern  — ambiguity or risk
          - advisory — preference / coordination note

    FindingCategory:
      type: string
      enum:
        - setback
        - height
        - coverage
        - egress
        - use
        - overlay-conflict
        - divergence-related
        - other
      description: |
        FIXED v1 category enum (findingsMock.ts:48-56). Adding a
        category is an event-modeled schema change, not a silent
        extension — keep this in lock-step with the schema-side enum.

    FindingStatus:
      type: string
      enum: [ai-produced, accepted, rejected, overridden, promoted-to-architect]
      description: |
        Reviewer-state lifecycle. `ai-produced` is the engine's
        initial value; the accept / reject / override routes flip it.
        `promoted-to-architect` is reserved for a future "promote
        finding into a jurisdiction reply" endpoint.

    FindingActor:
      type: object
      description: |
        Stable actor envelope shared by reviewer-side audit surfaces
        (reviewer-requests, findings, eventually reviewer-annotations).

        `kind` distinguishes session-bound human actors (`user`) from
        AI/bot writes (`agent`) and infrastructure-stamped events
        (`system`). `id` is opaque to the framework — application code
        chooses its identity scheme (today: the upstream identity
        layer's stable user id). `displayName` is hydrated at write
        time so consumer surfaces (e.g. the architect's
        ReviewerRequestsStrip) can render "Requested by Alex" without
        a per-row roundtrip.

        Promoted to a shared schema in V1-2 — was previously only a
        TS interface in `artifacts/plan-review/src/lib/findingsMock.ts`.
        Both V1-1 (findings) and V1-2 (reviewer-requests) consume this
        envelope; future consumers (e.g. promoted reviewer-annotations
        when they pick up architect-visible attribution) should import
        from here rather than re-deriving the shape.
      properties:
        kind:
          type: string
          enum: [user, agent, system]
        id:
          type: string
        displayName:
          type: string
          nullable: true
      required:
        - kind
        - id

    FindingCodeCitation:
      type: object
      description: Inline citation referencing a code-section atom.
      properties:
        kind:
          type: string
          enum: [code-section]
        atomId:
          type: string
          description: |
            The atom id used in `[[CODE:<atomId>]]` tokens. Must
            resolve against the engine's reference block at
            generation time; unresolved tokens are stripped from
            `text` and reflected on the run row's
            `invalidCitationCount`.
      required:
        - kind
        - atomId

    FindingSourceCitation:
      type: object
      description: Inline citation referencing a briefing-source row.
      properties:
        kind:
          type: string
          enum: [briefing-source]
        id:
          type: string
        label:
          type: string
          description: |
            Human-readable label used inside the inline token
            `{{atom|briefing-source|<id>|<label>}}`. Echoed on the
            citation pill the FE renders.
      required:
        - kind
        - id
        - label

    FindingCitation:
      oneOf:
        - $ref: "#/components/schemas/FindingCodeCitation"
        - $ref: "#/components/schemas/FindingSourceCitation"
      discriminator:
        propertyName: kind

    FindingSourceRef:
      type: object
      description: |
        Pointer at the single backing briefing source for a finding.
        Distinct from the `citations` array (which can carry many).
      properties:
        id:
          type: string
        label:
          type: string
      required:
        - id
        - label

    Finding:
      type: object
      description: |
        One AIR-1 compliance finding. Wire shape mirrors
        `findingsMock.ts:82-103` so the V1-6 frontend swap is a
        single-file change. The `id` field is the public atom id
        (`finding:{submissionId}:{rowUuid}`) — see
        lib/db/src/schema/findings.ts column docs for the row pk vs
        atom id split.
      properties:
        id:
          type: string
          description: |
            Public atom id. Carries the prefix grammar
            `finding:{submissionId}:{ulid}` so URL deep-links can
            derive the parent submission without a server round-trip.
        submissionId:
          type: string
        severity:
          $ref: "#/components/schemas/FindingSeverity"
        category:
          $ref: "#/components/schemas/FindingCategory"
        status:
          $ref: "#/components/schemas/FindingStatus"
        text:
          type: string
          description: |
            Free-text body containing inline citation tokens. The
            engine's validator has already stripped any token whose
            id failed to resolve.
        citations:
          type: array
          items:
            $ref: "#/components/schemas/FindingCitation"
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        lowConfidence:
          type: boolean
          description: True iff the engine deemed this below the 0.6 threshold.
        reviewerStatusBy:
          oneOf:
            - $ref: "#/components/schemas/FindingActor"
          nullable: true
        reviewerStatusChangedAt:
          type: string
          format: date-time
          nullable: true
        reviewerComment:
          type: string
          nullable: true
        elementRef:
          type: string
          nullable: true
          description: |
            Opaque BIM-element pointer the FE drill-in resolves to
            a viewport selection (e.g. `wall:north-side-l2`).
        sourceRef:
          oneOf:
            - $ref: "#/components/schemas/FindingSourceRef"
          nullable: true
        aiGeneratedAt:
          type: string
          format: date-time
          description: |
            When the engine produced the finding. Stamped at engine
            time, not at row insert.
        revisionOf:
          type: string
          nullable: true
          description: |
            On override revisions, the original AI finding's atom id.
            Null on AI-produced and never-overridden rows.
      required:
        - id
        - submissionId
        - severity
        - category
        - status
        - text
        - citations
        - confidence
        - lowConfidence
        - reviewerStatusBy
        - reviewerStatusChangedAt
        - reviewerComment
        - elementRef
        - sourceRef
        - aiGeneratedAt
        - revisionOf

    FindingResponse:
      type: object
      description: |
        Single-finding wire envelope returned by accept / reject /
        override.
      properties:
        finding:
          $ref: "#/components/schemas/Finding"
      required:
        - finding

    ListSubmissionFindingsResponse:
      type: object
      description: |
        Wire envelope for `GET /submissions/{id}/findings`. Includes
        every row scoped to the submission — AI-produced, reviewer-
        actioned, and override revisions alike. Sorting is the FE's
        responsibility (severity then aiGeneratedAt; helper
        `compareFindings` in findingsMock.ts:533-538).
      properties:
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
      required:
        - findings

    GenerateSubmissionFindingsBody:
      type: object
      description: |
        Optional body for `POST /submissions/{id}/findings/generate`.
        Forward-looking — the V1-1 baseline ignores fields and always
        runs a fresh full generation. Documented here so callers can
        adopt the wire shape before regenerate semantics land.
      properties:
        regenerate:
          type: boolean
          description: |
            When true, signals an explicit redo. Currently
            informational — the route always runs a fresh generation.

    GenerateSubmissionFindingsResponse:
      type: object
      description: |
        202 envelope returned by `POST /submissions/{id}/findings/generate`.
        The job is identified by `generationId`; clients should poll
        `/findings/status` until `state` reaches a terminal value,
        then refetch `GET /findings` to read the persisted list.
      properties:
        generationId:
          type: string
          description: Opaque id for this generation job.
        state:
          type: string
          enum: [pending, completed, failed]
          description: Initial state — almost always `pending` on the 202.
      required:
        - generationId
        - state

    SubmissionFindingsGenerationStatusResponse:
      type: object
      description: |
        Wire envelope for `GET /submissions/{id}/findings/status`.
        State is persisted in `finding_runs`; the endpoint reads the
        most recent row by `submission_id` ordered by `started_at`
        DESC. Returns `idle` when no kickoff has ever run.
      properties:
        generationId:
          type: string
          nullable: true
        state:
          type: string
          enum: [idle, pending, completed, failed]
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
        invalidCitationCount:
          type: integer
          nullable: true
        invalidCitations:
          type: array
          nullable: true
          items:
            type: string
        discardedFindingCount:
          type: integer
          nullable: true
          description: |
            Number of findings the engine produced that the discard
            rule (no surviving citations + no elementRef OR text too
            short) dropped entirely. Distinct dimension from
            `invalidCitationCount` — see findingRuns.ts column docs.
            Null while pending.
      required:
        - generationId
        - state
        - startedAt
        - completedAt
        - error
        - invalidCitationCount
        - invalidCitations
        - discardedFindingCount

    SubmissionFindingsGenerationRun:
      type: object
      description: |
        One historical finding-generation attempt for a submission.
        Same shape as the status response minus the `idle` enum
        entry (idle = absence of a row, represented by omission).
      properties:
        generationId:
          type: string
        state:
          type: string
          enum: [pending, completed, failed]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
        invalidCitationCount:
          type: integer
          nullable: true
        invalidCitations:
          type: array
          nullable: true
          items:
            type: string
        discardedFindingCount:
          type: integer
          nullable: true
      required:
        - generationId
        - state
        - startedAt
        - completedAt
        - error
        - invalidCitationCount
        - invalidCitations
        - discardedFindingCount

    SubmissionFindingsGenerationRunsResponse:
      type: object
      description: |
        Wire envelope for `GET /submissions/{id}/findings/runs`.
        `runs` is the most recent attempts (newest first), capped by
        the sweep's per-submission keep value.
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/SubmissionFindingsGenerationRun"
      required:
        - runs

    OverrideFindingBody:
      type: object
      description: |
        Body for `POST /findings/{id}/override`. Mirrors
        `OverrideFindingPayload` at findingsMock.ts:409-415. Atomic:
        the route stamps the original `overridden` and inserts the
        new revision in one transaction.
      properties:
        text:
          type: string
          description: Reviewer-authored finding body.
        severity:
          $ref: "#/components/schemas/FindingSeverity"
        category:
          $ref: "#/components/schemas/FindingCategory"
        reviewerComment:
          type: string
          description: Optional explanation of why the AI's original was wrong.
      required:
        - text
        - severity
        - category
        - reviewerComment


    ReviewerRequestKind:
      type: string
      description: |
        Closed enum of reviewer-request action kinds. One-to-one with
        `ReviewerRequestTargetType` — each kind targets exactly one
        atom type (`refresh-briefing-source` → `briefing-source`,
        etc.), and the route layer enforces the pairing at validate
        time.
      enum:
        - refresh-briefing-source
        - refresh-bim-model
        - regenerate-briefing

    ReviewerRequestStatus:
      type: string
      description: |
        Closed enum of reviewer-request lifecycle states. `pending` is
        the initial state at insert; `dismissed` is the architect-
        explicit reject path (carries `dismissalReason`); `resolved` is
        set by the implicit-resolve hook when the matching domain
        action emits its event (carries `triggeredActionEventId`);
        `withdrawn` is the reviewer-explicit retract path (Task #443)
        for a reviewer to clear their own outstanding ask without
        architect involvement (carries `withdrawnBy` /
        `withdrawnAt` / optional `withdrawalReason`).
      enum:
        - pending
        - dismissed
        - resolved
        - withdrawn

    ReviewerRequestTargetType:
      type: string
      description: |
        Closed enum of target atom types a reviewer-request may anchor
        against. Mirrors `REVIEWER_REQUEST_TARGET_TYPES` in
        `lib/db/src/schema/reviewerRequests.ts` — adding a new target
        type requires updating both the DB-side tuple and this enum so
        the route validator and the atom composition list stay in sync.
      enum:
        - briefing-source
        - bim-model
        - parcel-briefing

    ReviewerRequest:
      type: object
      description: |
        One reviewer-request row. `dismissedBy` / `dismissedAt` /
        `dismissalReason` are populated only when `status` is
        `dismissed`; `resolvedAt` / `triggeredActionEventId` only when
        `status` is `resolved`.
      properties:
        id:
          type: string
        engagementId:
          type: string
        requestKind:
          $ref: "#/components/schemas/ReviewerRequestKind"
        targetEntityType:
          $ref: "#/components/schemas/ReviewerRequestTargetType"
        targetEntityId:
          type: string
        reason:
          type: string
        status:
          $ref: "#/components/schemas/ReviewerRequestStatus"
        requestedBy:
          $ref: "#/components/schemas/FindingActor"
        requestedAt:
          type: string
          format: date-time
        dismissedBy:
          allOf:
            - $ref: "#/components/schemas/FindingActor"
          nullable: true
        dismissedAt:
          type: string
          format: date-time
          nullable: true
        dismissalReason:
          type: string
          nullable: true
        withdrawnBy:
          allOf:
            - $ref: "#/components/schemas/FindingActor"
          nullable: true
        withdrawnAt:
          type: string
          format: date-time
          nullable: true
        withdrawalReason:
          type: string
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        triggeredActionEventId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - engagementId
        - requestKind
        - targetEntityType
        - targetEntityId
        - reason
        - status
        - requestedBy
        - requestedAt
        - dismissedBy
        - dismissedAt
        - dismissalReason
        - withdrawnBy
        - withdrawnAt
        - withdrawalReason
        - resolvedAt
        - triggeredActionEventId
        - createdAt
        - updatedAt

    CreateReviewerRequestBody:
      type: object
      description: |
        Request body for `POST /engagements/{id}/reviewer-requests`.
        The `(requestKind, targetEntityType)` pair must satisfy the
        kind-to-target-type contract defined in
        `REVIEWER_REQUEST_KIND_TO_TARGET_TYPE` — the route validator
        rejects mismatched pairings with 400.
      properties:
        requestKind:
          $ref: "#/components/schemas/ReviewerRequestKind"
        targetEntityType:
          $ref: "#/components/schemas/ReviewerRequestTargetType"
        targetEntityId:
          type: string
          minLength: 1
          maxLength: 512
        reason:
          type: string
          minLength: 1
          maxLength: 4096
      required:
        - requestKind
        - targetEntityType
        - targetEntityId
        - reason

    DismissReviewerRequestBody:
      type: object
      description: |
        Request body for `POST /reviewer-requests/{id}/dismiss`. The
        `dismissalReason` is required so the architect must commit to
        a written rationale — empty / whitespace bodies are rejected
        with 400.
      properties:
        dismissalReason:
          type: string
          minLength: 1
          maxLength: 4096
      required:
        - dismissalReason

    WithdrawReviewerRequestBody:
      type: object
      description: |
        Request body for `POST /reviewer-requests/{id}/withdraw`
        (Task #443). Reviewer-side retract path. Unlike
        `DismissReviewerRequestBody`, the `withdrawalReason` is
        OPTIONAL — withdrawing one's own ask is a low-friction
        triage action; if supplied, the reason is capped at 4 KB and
        rejected when whitespace-only.
      properties:
        withdrawalReason:
          type: string
          minLength: 1
          maxLength: 4096
          nullable: true

    ReviewerRequestResponse:
      type: object
      description: |
        Wire envelope for `POST /engagements/{id}/reviewer-requests`
        and `POST /reviewer-requests/{id}/dismiss`. Carries the
        affected row in the same shape the list endpoint returns so
        the FE can splice the response into cached lists without a
        follow-up fetch.
      properties:
        request:
          $ref: "#/components/schemas/ReviewerRequest"
      required:
        - request

    ListReviewerRequestsResponse:
      type: object
      description: |
        Wire envelope for `GET /engagements/{id}/reviewer-requests`.
        Newest-first list, optionally filtered by lifecycle state.
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/ReviewerRequest"
      required:
        - requests

    ReviewerRequestEngagementSummary:
      type: object
      description: |
        Engagement metadata joined onto each row of the cross-engagement
        "my outstanding requests" list (Reviewer V1-F / R13). Just the
        three fields the FE renders inline on each row — `id` for the
        deep-link target, `name` as the row's primary line,
        `jurisdiction` as the secondary chip. The full engagement
        envelope is not included; consumers that need it should follow
        the link to `/engagements/{id}`.
      properties:
        id:
          type: string
        name:
          type: string
        jurisdiction:
          type: string
          nullable: true
      required:
        - id
        - name
        - jurisdiction

    ReviewerRequestWithEngagement:
      type: object
      description: |
        Reviewer-request row plus a small engagement-context envelope.
        Returned only by the cross-engagement reviewer-side list at
        `GET /reviewer-requests`; the per-engagement architect-side
        list returns the bare `ReviewerRequest` shape because the
        engagement is implicit from the path.
      allOf:
        - $ref: "#/components/schemas/ReviewerRequest"
        - type: object
          properties:
            engagement:
              $ref: "#/components/schemas/ReviewerRequestEngagementSummary"
          required:
            - engagement

    ListMyReviewerRequestsResponse:
      type: object
      description: |
        Wire envelope for `GET /reviewer-requests`. Newest-first list of
        the calling reviewer's own reviewer-requests across every
        engagement, with engagement metadata joined onto each row so
        the FE can render without a follow-up fetch.
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/ReviewerRequestWithEngagement"
      required:
        - requests

    # Renders (V1-4 / DA-RP-1, Spec 54 v2)
    # ─────────────────────────────────────────────────────────────────

    Vec3:
      type: object
      description: |
        XYZ vector in world coordinates. Y-up, Z+ = north convention
        matches the FE BimViewer's three.js setup.
      properties:
        x:
          type: number
        y:
          type: number
        z:
          type: number
      required: [x, y, z]

    DomainRenderKind:
      type: string
      description: |
        API-server domain render taxonomy. Distinct from mnml-client's
        wire kind (`archdiffusion | video`) because `elevation-set` is
        a fan-out concept that lives in the route, not on the wire
        (Spec 54 v2 §6.2).
      enum: [still, elevation-set, video]

    RenderStatus:
      type: string
      description: |
        Render lifecycle. Codebase-internal vocabulary; mnml's wire
        statuses (`starting | processing | success | failed |
        canceled`) translate to this set inside HttpMnmlClient.
      enum: [queued, rendering, ready, failed, cancelled]

    RenderOutputRole:
      type: string
      description: |
        Persistence-layer role taxonomy. The route's elevation-set
        fan-out tags each output by which `camera_direction`
        produced it; the video-thumbnail role is server-synthesized
        via ffmpeg post-`ready` (mnml does not return a thumbnail).
      enum:
        - primary
        - elevation-n
        - elevation-e
        - elevation-s
        - elevation-w
        - video-primary
        - video-thumbnail

    RenderCostBreakdownEntry:
      type: object
      description: |
        One bucket of the cost breakdown. An elevation-set's
        breakdown has one entry with `count: 4` (four archdiffusion
        calls); a still's has `count: 1`. Future kinds (e.g. a
        compare-set of one archdiffusion + one video) would surface
        as multiple entries.
      properties:
        kind:
          type: string
          enum: [archdiffusion, video]
        count:
          type: integer
          minimum: 1
        creditsPerCall:
          type: integer
          minimum: 0
        subtotal:
          type: integer
          minimum: 0
      required: [kind, count, creditsPerCall, subtotal]

    RenderCostEstimate:
      type: object
      description: |
        Static cost estimate from `estimateRenderCost` in
        `@workspace/mnml-client`. Spec 54 v2 §4 names the per-
        operation credit costs as a static table — no quote call
        to mnml. The kickoff response surfaces this so the FE can
        render a "Render: N credits" chip without a second round-trip.
      properties:
        credits:
          type: integer
          minimum: 0
        breakdown:
          type: array
          items:
            $ref: "#/components/schemas/RenderCostBreakdownEntry"
      required: [credits, breakdown]

    KickoffRenderCommonFields:
      type: object
      description: Common kickoff fields shared across every render kind.
      properties:
        glbUrl:
          type: string
          format: uri
          description: |
            Absolute URL the headless capture browser fetches the GLB
            from. The FE provides this — typically a signed object-
            storage URL the FE already loaded into its viewer.
            Server-side resolution from the bim-model row is V1-5.
        prompt:
          type: string
          minLength: 1
          maxLength: 2000
          description: |
            Free-form prompt forwarded to mnml as the
            `archDiffusion-v43.prompt` (or `video-ai.prompt`) form
            field. Spec 54 v2 §2.1 caps at 2000 chars.
        expertName:
          type: string
          enum: [exterior, interior, masterplan, landscape, plan, product]
          description: mnml expert routing per Spec 54 v2 §2.1.
        renderStyle:
          type: string
          enum:
            - raw
            - photoreal
            - cgi_render
            - cad
            - freehand_sketch
            - clay_model
            - illustration
            - watercolor
        expertParams:
          type: object
          additionalProperties:
            type: string
          description: |
            Per-expert flat string-map. The api-server passes each
            entry through verbatim as a multipart field; mnml
            validates against per-expert allowed values.
      required: [glbUrl, prompt]

    KickoffRenderStillBody:
      allOf:
        - $ref: "#/components/schemas/KickoffRenderCommonFields"
        - type: object
          description: Single still image kickoff.
          properties:
            kind:
              type: string
              enum: [still]
            cameraPosition:
              $ref: "#/components/schemas/Vec3"
            cameraTarget:
              $ref: "#/components/schemas/Vec3"
            fov:
              type: number
              minimum: 10
              maximum: 120
              description: Field of view in degrees. Default 50 if omitted.
          required: [kind, cameraPosition, cameraTarget]

    KickoffRenderElevationSetBody:
      allOf:
        - $ref: "#/components/schemas/KickoffRenderCommonFields"
        - type: object
          description: |
            Cardinal-elevation set. The route fans out 4 separate
            archDiffusion-v43 calls (camera_direction front / right /
            back / left) and persists ONE viewpoint_renders parent
            row + 4 render_outputs children (one per cardinal role).
          properties:
            kind:
              type: string
              enum: [elevation-set]
            buildingCenter:
              $ref: "#/components/schemas/Vec3"
            cameraDistance:
              type: number
              exclusiveMinimum: 0
              description: |
                Meters from buildingCenter along each cardinal axis.
            cameraHeight:
              type: number
              description: Meters above ground for the camera origin.
            fov:
              type: number
              minimum: 10
              maximum: 120
          required: [kind, buildingCenter, cameraDistance, cameraHeight]

    KickoffRenderVideoBody:
      allOf:
        - $ref: "#/components/schemas/KickoffRenderCommonFields"
        - type: object
          description: |
            Single 5- or 10-second Kling clip. mnml's documented hard
            cap (Spec 54 v2 §2.2) — duration outside `{5, 10}` is
            rejected by validation.
          properties:
            kind:
              type: string
              enum: [video]
            cameraPosition:
              $ref: "#/components/schemas/Vec3"
            cameraTarget:
              $ref: "#/components/schemas/Vec3"
            duration:
              type: integer
              enum: [5, 10]
            cfgScale:
              type: number
              minimum: 0
              maximum: 1
            aspectRatio:
              type: string
              enum: ["16:9", "4:3", "1:1"]
            movementType:
              type: string
              enum: [horizontal, vertical, zoom_in, zoom_out, pan]
            direction:
              type: string
              enum: [left, right, up, down]
          required: [kind, cameraPosition, cameraTarget, duration]

    KickoffRenderBody:
      oneOf:
        - $ref: "#/components/schemas/KickoffRenderStillBody"
        - $ref: "#/components/schemas/KickoffRenderElevationSetBody"
        - $ref: "#/components/schemas/KickoffRenderVideoBody"
      discriminator:
        propertyName: kind
        mapping:
          still: "#/components/schemas/KickoffRenderStillBody"
          elevation-set: "#/components/schemas/KickoffRenderElevationSetBody"
          video: "#/components/schemas/KickoffRenderVideoBody"

    KickoffRenderResponse:
      type: object
      description: |
        202 envelope. The polling worker is fire-and-forget; clients
        observe state via `GET /renders/{renderId}`.
      properties:
        renderId:
          type: string
          description: Opaque render id (the `viewpoint_renders.id` PK).
        state:
          $ref: "#/components/schemas/RenderStatus"
        kind:
          $ref: "#/components/schemas/DomainRenderKind"
        cost:
          $ref: "#/components/schemas/RenderCostEstimate"
      required: [renderId, state, kind, cost]

    RenderOutputProjection:
      type: object
      description: |
        Subset of `render_outputs` columns the FE / chat needs to
        render the gallery row without a second round-trip. The full
        Layer 3 surface lives on the `render-output` atom's typed
        payload via `GET /atoms/render-output/{id}/summary`.
      properties:
        id:
          type: string
        role:
          $ref: "#/components/schemas/RenderOutputRole"
        format:
          type: string
          enum: [png, jpg, mp4, webm]
        resolution:
          type: string
          nullable: true
        sizeBytes:
          type: integer
          nullable: true
        durationSeconds:
          type: integer
          nullable: true
        mirroredObjectKey:
          type: string
          nullable: true
          description: |
            GCS key under our durable bucket. NULL during the brief
            unmirrored window between row insert and mirror
            completion (the route writes both `source_url` and
            `mirroredObjectKey` in the same transaction so a NULL
            here on a `ready` parent is an error condition the sweep
            surfaces).
        thumbnailUrl:
          type: string
          nullable: true
        previewUrl:
          type: string
          nullable: true
          description: |
            Relative path the FE hits to stream the durable mirrored
            asset back (`/api/render-outputs/{id}/file`). NULL while
            the row is still un-mirrored. Use this rather than
            `thumbnailUrl`, which is null on still and elevation
            outputs.
        downloadUrl:
          type: string
          nullable: true
          description: |
            Same endpoint as `previewUrl` with `?download=1` so the
            browser saves rather than navigates. NULL when
            `mirroredObjectKey` is NULL.
        seed:
          type: integer
          nullable: true
      required: [id, role, format, resolution, sizeBytes, durationSeconds, mirroredObjectKey, thumbnailUrl, previewUrl, downloadUrl, seed]

    ElevationSetJob:
      type: object
      description: |
        One in-flight per-direction job for an `elevation-set` parent.
        Stored as JSONB on `viewpoint_renders.mnml_jobs` while
        polling — render_outputs rows are inserted only when each
        child resolves to `ready` (Spec 54 v2 §6.2). Surfaced on the
        detail response so the FE can render a per-direction progress
        chip while the set is in-flight.
      properties:
        role:
          type: string
          enum: [elevation-n, elevation-e, elevation-s, elevation-w]
        cameraDirection:
          type: string
          enum: [front, back, right, left]
        mnmlJobId:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending-trigger, queued, rendering, ready, failed]
        error:
          type: object
          nullable: true
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]
        outputUrl:
          type: string
          nullable: true
          description: mnml CDN URL on `ready`, before mirror.
        mirroredObjectKey:
          type: string
          nullable: true
      required: [role, cameraDirection, mnmlJobId, status]

    RenderDetailResponse:
      type: object
      description: |
        Full row + child outputs projection for `GET /renders/{id}`.
        The `mnmlJobs` array is populated only for `elevation-set`
        kinds (in-flight per-direction tracking); `mnmlJobId` is the
        single mnml render id for `still` / `video`.
      properties:
        id:
          type: string
        engagementId:
          type: string
        kind:
          $ref: "#/components/schemas/DomainRenderKind"
        status:
          $ref: "#/components/schemas/RenderStatus"
        mnmlJobId:
          type: string
          nullable: true
        mnmlJobs:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ElevationSetJob"
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        errorDetails:
          type: object
          nullable: true
          additionalProperties: true
        requestedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/RenderOutputProjection"
      required:
        - id
        - engagementId
        - kind
        - status
        - mnmlJobId
        - mnmlJobs
        - errorCode
        - errorMessage
        - errorDetails
        - requestedBy
        - createdAt
        - updatedAt
        - completedAt
        - outputs

    RenderListItem:
      type: object
      description: |
        One row in the per-engagement render history. Slimmer than
        the detail shape — outputs are NOT included; clients fetch
        `GET /renders/{id}` for the gallery view.
      properties:
        id:
          type: string
        kind:
          $ref: "#/components/schemas/DomainRenderKind"
        status:
          $ref: "#/components/schemas/RenderStatus"
        errorCode:
          type: string
          nullable: true
        requestedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - kind
        - status
        - errorCode
        - requestedBy
        - createdAt
        - updatedAt
        - completedAt

    RenderListResponse:
      type: object
      description: |
        Wire envelope for `GET /engagements/{id}/renders`. Newest
        first. Capped at 100 items in V1-4; pagination is V1-5.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RenderListItem"
      required: [items]

    CancelRenderResponse:
      type: object
      description: |
        Wire envelope for `POST /renders/{id}/cancel`. The polling
        worker observes `status='cancelled'` on its next iteration
        and bails — there is no synchronous mnml call.
      properties:
        id:
          type: string
        status:
          type: string
          enum: [cancelled]
      required: [id, status]

    RendersSweepResponse:
      type: object
      description: |
        Wire envelope for `POST /admin/renders/sweep`. Counts surface
        for observability (paste into the operator's Cloud Scheduler
        log + dashboard); the sweep itself is idempotent so multiple
        invocations on the same minute produce the same end state.
      properties:
        rescuedStuck:
          type: integer
          minimum: 0
          description: |
            Rows in `queued`/`rendering` older than the rescue
            threshold (default 15 min) flipped to `failed` with
            `error_code='polling_timeout_sweep'`.
        reapedTerminal:
          type: integer
          minimum: 0
          description: |
            `failed`/`cancelled` rows older than the retention window
            (default 30 days) DELETEd. Cascade clears
            `render_outputs` children. `ready` rows are NEVER reaped.
        warnedIncompleteMirror:
          type: integer
          minimum: 0
          description: |
            `ready` rows whose `render_outputs` carry NULL
            `mirroredObjectKey`. Logged as warnings; no auto-heal in
            V1-4 (V1-5 follow-up).
        durationMs:
          type: integer
          minimum: 0
      required: [rescuedStuck, reapedTerminal, warnedIncompleteMirror, durationMs]

    NotificationItem:
      type: object
      description: |
        One row in the architect inbox. Materialised on the fly from
        an `atom_events` row; the `kind` discriminates how to render
        the title and what target the deep link should open.
      properties:
        id:
          type: string
          description: Stable atom-event id; safe to use as a React key.
        kind:
          type: string
          enum: [submission-status-changed, reviewer-request-filed]
        title:
          type: string
          description: |
            Human-readable headline pre-formatted server-side so the
            FE renders the same wording it logs (e.g. "Submission
            approved", "Reviewer requested briefing-source refresh").
        body:
          type: string
          nullable: true
          description: |
            Optional supporting text. For status-changes this is the
            reviewer's `note`; for reviewer-requests it is the
            `reason`. Null when the producing event carried no note.
        occurredAt:
          type: string
          format: date-time
        recordedAt:
          type: string
          format: date-time
        read:
          type: boolean
          description: |
            True when `occurredAt <= lastReadAt` for the calling
            architect. Stamped server-side so the FE doesn't have to
            re-derive the comparison.
        engagementId:
          type: string
          nullable: true
          description: |
            Engagement the event belongs to. Used as the deep-link
            target — the FE routes the row click to
            `/engagements/{engagementId}` (or the submission if
            present, but the engagement detail page is the canonical
            surface today).
        engagementName:
          type: string
          nullable: true
        submissionId:
          type: string
          nullable: true
        reviewerRequestId:
          type: string
          nullable: true
      required:
        - id
        - kind
        - title
        - body
        - occurredAt
        - recordedAt
        - read
        - engagementId
        - engagementName
        - submissionId
        - reviewerRequestId

    ListNotificationsResponse:
      type: object
      description: |
        Wire envelope for `GET /me/notifications`. The `unreadCount`
        feeds the side-nav badge directly so the FE doesn't have to
        re-tally `items` (and stays correct even when the page is
        capped by `limit`).
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NotificationItem"
        unreadCount:
          type: integer
          minimum: 0
        lastReadAt:
          type: string
          format: date-time
          nullable: true
          description: |
            The architect's persisted read-watermark, or null when
            they have never opened the inbox. The FE uses this for
            the "all caught up since …" subtitle.
      required: [items, unreadCount, lastReadAt]

    MarkNotificationsReadResponse:
      type: object
      description: |
        Wire envelope for `POST /me/notifications/mark-read`. Returns
        the new `lastReadAt` so the FE can splice it into the cached
        list response without a follow-up GET.
      properties:
        lastReadAt:
          type: string
          format: date-time
      required: [lastReadAt]
