openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SmartCity OS Design Tools API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: engagements
    description: Engagement (project) operations
  - name: snapshots
    description: Revit model snapshot operations
  - name: chat
    description: Claude chat about an engagement
  - name: codes
    description: Atom-anchored municipal/building code knowledge
  - name: users
    description: User profile administration (display names, emails, avatars)
  - name: storage
    description: Object storage (presigned uploads, file serving)
  - name: session
    description: Current session — audience, requestor, permission claims
  - name: reviewer-annotations
    description: |
      Reviewer-only scratch notes anchored to a target atom render
      inside a specific submission. Threaded via parentAnnotationId,
      promoted into architect visibility as part of a jurisdiction
      response (Wave 2 Sprint C / Spec 307).
  - name: submission-comments
    description: |
      Inline reviewer↔architect conversation hanging off a single
      plan-review submission (Task #431). Distinct from
      reviewer-annotations (which is reviewer-only scratch notes); this
      surface is the cross-audience reply channel architects post into
      from the submission detail modal.
  - name: reviewer
    description: |
      Cross-engagement reviewer surfaces — Plan Review's reviewer
      Inbox + KPI strip (Reviewer V1-B / Task #426). Reviewer-only
      (audience-gated to `internal`), reads across every engagement
      a reviewer can see in a single round-trip.
  - name: notifications
    description: |
      Architect-side in-app notification surface (Task #432). Newest-
      first list of submission status changes and reviewer-requests
      across every engagement, plus a per-architect read-watermark.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /engagements:
    get:
      operationId: listEngagements
      tags: [engagements]
      summary: List engagements
      description: Returns all engagements ordered by updatedAt desc.
      responses:
        "200":
          description: Array of engagement summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EngagementSummary"

  /engagements/match:
    post:
      operationId: matchEngagement
      tags: [engagements]
      summary: Resolve a Revit file to an engagement (or signal create-new)
      description: |
        Called by the Revit add-in BEFORE uploading a snapshot, to decide which
        engagement (if any) the file belongs to. Auth: requires the same
        `x-snapshot-secret` header as POST /snapshots.

        Precedence (first hit wins):
          1. `revitCentralGuid` exact match → action="auto-bind".
          2. `revitDocumentPath` exact match → action="auto-bind".
          3. case-insensitive `projectName` collision → action="choose" with
             up to 10 candidates (newest first). The add-in MUST surface a
             dropdown in this case, regardless of GUID presence.
          4. nothing matched → action="create-new".

        Note: even when a GUID is supplied, a name collision still returns
        "choose" if neither GUID nor path matched — the user makes the final
        call. GUID is sticky on rebind: an engagement's stored GUID is never
        overwritten by a later snapshot from a different file.
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchEngagementBody"
      responses:
        "200":
          description: Match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchEngagementResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}:
    get:
      operationId: getEngagement
      tags: [engagements]
      summary: Get engagement detail with snapshot list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement detail (snapshots without payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEngagement
      tags: [engagements]
      summary: Update engagement details (intake / edit modal)
      description: |
        Partial update. Only fields present in the request body are changed.
        If `address` is included and differs from the current value, the
        server will geocode the new address synchronously (best-effort).
        On geocoding failure, the address is still saved but a warning is
        included in the response.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                jurisdiction:
                  type: string
                status:
                  $ref: "#/components/schemas/EngagementStatus"
                projectType:
                  $ref: "#/components/schemas/ProjectType"
                zoningCode:
                  type: string
                lotAreaSqft:
                  type: number
                  nullable: true
                applicantFirm:
                  type: string
                  nullable: true
                  description: |
                    Free-text name of the applicant firm (architect /
                    designer of record). Pass `null` to clear an
                    existing value. Surfaced to reviewers in the Plan
                    Review Inbox row (Task #439).
      responses:
        "200":
          description: Updated engagement detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/geocode:
    post:
      operationId: regeocodeEngagement
      tags: [engagements]
      summary: Re-run geocoding using the engagement's current address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement detail (possibly with warnings)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "400":
          description: Engagement has no address to geocode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/submissions:
    get:
      operationId: listEngagementSubmissions
      tags: [engagements]
      summary: List prior plan-review submissions for an engagement
      description: |
        Returns the engagement's recorded plan-review submissions,
        newest-first. Each entry mirrors the row inserted by `POST
        /engagements/{id}/submissions` (id, submittedAt, jurisdiction
        labels captured at the moment of submission, optional note).

        The list is read-straight from the `submissions` table — there
        is no pagination today (engagements typically accumulate a
        handful of packages over their lifetime); when that assumption
        breaks, callers can adopt a `limit` / `cursor` extension
        without breaking existing consumers since the response is a
        bare array.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of submission summaries (newest-first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EngagementSubmissionSummary"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEngagementSubmission
      tags: [engagements]
      summary: Record a plan-review submission against an engagement
      description: |
        Records that a plan-review package has been submitted to the
        jurisdiction for this engagement. The submission flow is still a
        forward-ref child in the engagement atom's composition (no
        dedicated submissions table or catalog atom yet), so today's only
        side effect is appending an `engagement.submitted` event to the
        history chain. The returned `submissionId` is server-generated;
        when the catalog atom and table land it becomes the inserted
        row's id (the response shape stays stable).

        Best-effort emit by the same contract as the sibling lifecycle
        routes (`PATCH /engagements/{id}` address change,
        `POST /engagements/{id}/geocode`): a transient history outage
        cannot fail the submission HTTP request — the response 201s
        either way and the audit chain self-heals on the next successful
        append.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEngagementSubmissionBody"
      responses:
        "201":
          description: Submission recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionReceipt"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/submissions/{submissionId}/response:
    post:
      operationId: recordSubmissionResponse
      tags: [engagements]
      summary: Record the jurisdiction's response on a submission
      description: |
        Records the jurisdiction's reply against a previously-recorded
        plan-review submission. Updates the submission row's `status`,
        optional `reviewerComment`, and `respondedAt` columns, and
        emits a `submission.response-recorded` event scoped to the
        submission entity (so the back-and-forth shows up on the
        submission's own timeline rather than collapsing into the
        parent engagement's).

        The response body always reflects the submission row *after*
        the update — callers do not need a follow-up GET to see the
        new status. Calling this route a second time on the same
        submission is allowed and overwrites the prior response (the
        event chain on the submission preserves the full history).

        `respondedAt` must not be later than the server clock at
        request time. Future-dated values are rejected with a 400 so
        a non-browser caller cannot backfill a reply into the future
        and silently corrupt the engagement timeline. The same rule
        applies in the other direction: `respondedAt` must not be
        earlier than the submission row's own `submittedAt` (a reply
        cannot pre-date the package being sent), and pre-submission
        values are likewise rejected with a 400.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Engagement id (must own the submission).
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordSubmissionResponseBody"
      responses:
        "200":
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResponse"
        "400":
          description: Invalid request body or submission/engagement mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement or submission not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing:
    get:
      operationId: getEngagementBriefing
      tags: [engagements]
      summary: Get the engagement's parcel briefing and current sources
      description: |
        Returns the engagement's `parcel_briefings` row (if any) along
        with its current (non-superseded) `briefing_sources`. Returns
        `null` when no briefing has been created yet — i.e. before the
        first manual-QGIS upload or federal-adapter fetch (DA-PI-1B
        first-upload-creates-briefing pattern).

        Sources are listed newest-first by `createdAt`. Superseded rows
        are deliberately omitted; the timeline view (future sprint) is
        the surface that exposes the full per-layer history.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The engagement's briefing + current sources, or null when none exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBriefingResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing/sources:
    get:
      operationId: listEngagementBriefingSources
      tags: [engagements]
      summary: List briefing sources for one layer (history-aware)
      description: |
        Returns the briefing sources attached to an engagement for one
        `layerKind`, newest-first by `createdAt`. By default only the
        current (non-superseded) row is returned; pass
        `includeSuperseded=true` to also receive the prior history so
        the UI can render a per-layer "View history" panel and offer a
        "Restore this version" rollback action.

        Returns `{ sources: [] }` when the engagement has no briefing
        yet (the briefing row is created lazily on first upload). The
        endpoint requires the engagement to exist; a missing engagement
        is a 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: layerKind
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 64
          description: |
            The layer slug to scope the listing by. Required because
            history is meaningful per layer (the partial unique index
            on `briefing_sources` is keyed on `layer_kind`).
        - name: includeSuperseded
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: |
            When true the response includes superseded rows in addition
            to the current one. Defaults to false so callers that only
            want the current source do not need to filter client-side.
      responses:
        "200":
          description: Sources for the layer, newest-first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBriefingSourcesResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEngagementBriefingSource
      tags: [engagements]
      summary: Record a manually-uploaded QGIS layer as a briefing source
      description: |
        Records that a manually-exported QGIS overlay (or any other
        manually-uploaded layer file) has been attached to the
        engagement's parcel briefing. The first call creates the
        engagement's `parcel_briefings` row on demand
        (first-upload-creates-briefing); subsequent calls of the same
        `layerKind` supersede the prior row for that layer per Spec 51
        §4 (the prior row's `supersededById` points at the new row's
        id, both rows stay readable).

        The file bytes themselves are uploaded to object storage via
        the existing presigned-URL flow (`POST
        /storage/uploads/request-url` → PUT to the returned URL). This
        route only records the metadata + the canonical `/objects/...`
        path the bytes landed at.

        Emits `briefing-source.fetched` against the new row through the
        event-anchoring service. Best-effort: a transient history
        outage cannot fail the HTTP request — the row is the source of
        truth, the event chain is observability.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBriefingSourceBody"
      responses:
        "201":
          description: Briefing source recorded; updated briefing returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBriefingResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing/sources/{sourceId}/restore:
    post:
      operationId: restoreEngagementBriefingSource
      tags: [engagements]
      summary: Roll back to a previously-superseded briefing source
      description: |
        Restores a previously-superseded briefing source to be the
        current source for its `(briefing_id, layer_kind)` slot. The
        prior current row is stamped as superseded by the restored
        target (so its `supersededAt` is set and `supersededById`
        points at the restored row), and the restored row's
        `supersededAt` / `supersededById` are cleared so it owns the
        partial-unique "current per layer" slot again.

        Idempotent: when the target row is already current the
        endpoint returns the briefing unchanged. The endpoint never
        deletes data — every prior version remains in the table for
        replay through `GET /engagements/{id}/briefing/sources?layerKind=...&includeSuperseded=true`.

        Refuses to restore across engagements (the target must belong
        to the engagement's briefing) and refuses to restore a layer
        that has no current row (a defensive check; the supersession
        contract guarantees a row exists once any upload has happened).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Briefing source restored; updated briefing returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBriefingResponse"
        "400":
          description: Invalid request (e.g. source belongs to a different engagement)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement or briefing source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing/sources/{sourceId}/retry-conversion:
    post:
      operationId: retryBriefingSourceConversion
      tags: [engagements]
      summary: Re-run DXF→glb conversion for a briefing source
      description: |
        Re-runs the DXF→glb converter against the briefing source's
        already-stored DXF (`dxfObjectPath`) without forcing the
        architect to re-upload. Used when the original conversion
        landed in `failed` (or got stuck in `pending` / `converting`)
        and the architect wants to retry — typically after an upstream
        converter outage cleared.

        Refuses non-DXF rows (`conversionStatus` is null on the QGIS
        and adapter branches) and refuses rows that have no stored
        DXF. On success the row's `conversionStatus` flips back to
        `pending` → `ready` (or `failed`) inside the same request and
        the response carries the updated briefing.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversion retried; updated briefing returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBriefingResponse"
        "400":
          description: |
            Source does not own a DXF (e.g. it is a QGIS row, or
            `dxfObjectPath` is missing) or belongs to a different
            engagement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement or briefing source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/generate-layers:
    post:
      operationId: generateEngagementLayers
      tags: [engagements]
      summary: Run all applicable adapters and persist briefing-source rows
      description: |
        Runs every adapter that applies to the engagement's resolved
        jurisdiction (federal / state / local tiers — DA-PI-2 + DA-PI-4)
        in parallel, then persists each successful adapter result as a
        `briefing_sources` row using the same supersession contract the
        manual-upload route uses (`layer_kind` partial-unique index;
        prior current row is stamped `superseded_by_id` ← new row's id
        and stays readable for history replay). Per locked decision #4
        ("re-runs always supersede"), a fresh call always writes a new
        row per layer even when the upstream payload is byte-identical
        — the prior row remains queryable through the existing
        `?includeSuperseded=true` history path.

        The endpoint is best-effort at the adapter level: a single
        adapter failure (network blip, no-coverage at this lat/lng,
        upstream parse error) is surfaced in `outcomes[].status` /
        `outcomes[].error` rather than failing the whole batch. Only a
        request that resolves to a jurisdiction with zero applicable
        adapters returns 422.

        The first call creates the engagement's `parcel_briefings` row
        on demand (first-fetch-creates-briefing, mirroring the
        manual-upload route). Emits one
        `briefing-source.fetched` event per persisted row through the
        event-anchoring service; transient history outages cannot fail
        the HTTP request — the rows are the source of truth.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: forceRefresh
          in: query
          required: false
          description: |
            Task #204 — when `true`, bypass the federal-adapter response
            cache for this run. Every cacheable adapter is re-fetched
            live (still subject to the per-adapter timeout) and the
            fresh result is written back through the cache so the next
            non-forced run picks it up. Use this when an architect
            suspects the upstream feed has shifted (e.g. FEMA
            published a new flood-zone snapshot) and wants to confirm
            the current parcel reading is fresh.
          schema:
            type: boolean
            default: false
        - name: adapterKey
          in: query
          required: false
          description: |
            Task #228 — when present, scope this run to the single
            adapter whose `adapterKey` matches. The applicable-adapter
            filter (jurisdiction gate) is applied first, then narrowed
            to that one adapter. Use this with `?forceRefresh=true` to
            re-fetch a single layer (e.g. just FEMA flood zone) without
            paying the per-adapter timeout for every other layer in the
            engagement's jurisdiction.

            Returns 422 with `error: "unknown_adapter_key"` if the value
            does not match any adapter that applies to the engagement's
            resolved jurisdiction (so a stale UI bookmark or a typo
            cannot silently degrade to a no-op run that looks
            successful).
          schema:
            type: string
      responses:
        "200":
          description: Adapters dispatched; per-adapter outcomes + updated briefing returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateLayersResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            Either the engagement's jurisdiction did not resolve to any
            applicable adapter (e.g. an out-of-pilot state —
            `error: "no_applicable_adapters"`), or a `?adapterKey=…`
            scope did not match any of the applicable adapters
            (`error: "unknown_adapter_key"`). The response body still
            uses the standard error envelope so clients can render the
            message.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing/export.pdf:
    get:
      operationId: exportEngagementBriefingPdf
      tags: [engagements]
      summary: Render the engagement's A–G briefing as a stakeholder PDF
      description: |
        DA-PI-6 — synchronous PDF export of the persisted A–G briefing.
        Inline by default (`Content-Disposition: inline`) so the
        architect's "Export PDF" button can open the document in a
        browser tab; pass `?download=1` to flip the disposition to
        `attachment` for a save-to-disk flow.

        The response carries cover page, table of contents, the seven
        narrative sections with citation tokens flattened to inline
        plain-text labels, the citation appendix grouped by adapter
        tier (federal → state → local → manual → other), a map
        composite slot, and a briefing-source thumbnail grid slot.
        Header text defaults to "SmartCity Design Tools — Pre-Design
        Briefing" and is overridable per-architect via the
        `users.architect_pdf_header` column.

        Returns `422 no_briefing_to_export` when the engagement has no
        generated narrative yet — the FE button is gated on the same
        condition so this is defense-in-depth for a direct API call.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: download
          in: query
          required: false
          schema:
            type: string
            enum: ["1"]
          description: |
            When `1`, the response uses `Content-Disposition:
            attachment` so the browser saves the PDF instead of
            inlining it. Any other value (or omission) keeps the
            inline default.
      responses:
        "200":
          description: Rendered PDF document.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            Engagement exists but no briefing narrative has been
            generated yet. The error code is
            `no_briefing_to_export` so the FE can render a targeted
            "Generate the briefing first" message.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing/generate:
    post:
      operationId: generateEngagementBriefing
      tags: [engagements]
      summary: Kick off A–G briefing synthesis for an engagement
      description: |
        Asynchronously runs the briefing engine (Spec 51 §2): reads the
        engagement's current `briefing_sources`, calls the LLM (or the
        deterministic mock when `BRIEFING_LLM_MODE=mock`), validates
        every citation token resolves to a known source / code section,
        and persists the resulting seven-section narrative on the
        `parcel_briefings` row.

        First-generation calls populate `section_a`..`section_g` +
        `generated_at` + `generated_by`. Regeneration backs the prior
        narrative up into the `prior_section_*` columns so a redo can
        be compared against the previous draft.

        Returns `202 Accepted` with a `generationId`; clients poll
        `GET /engagements/{id}/briefing/status` until the job's
        `state` flips from `pending` to `completed` or `failed`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateBriefingBody"
      responses:
        "202":
          description: Generation kicked off; poll status for completion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateBriefingResponse"
        "400":
          description: |
            Engagement has no `briefing_sources` rows yet — generation
            is rejected because there is nothing to synthesize.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: |
            A generation for this engagement is already in flight.
            Poll `/briefing/status` and retry once it settles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing/runs:
    get:
      operationId: listEngagementBriefingGenerationRuns
      tags: [engagements]
      summary: List the most recent briefing-generation attempts
      description: |
        Returns the most recent briefing-generation job rows for the
        engagement, ordered by `startedAt` DESC. The response is
        capped at the same per-engagement keep value the sweep uses
        (default 5, overridable via
        `BRIEFING_GENERATION_JOB_KEEP_PER_ENGAGEMENT`) so the API and
        the sweep cannot drift — every row the sweep keeps is exactly
        the set the auditor sees here.

        Surfaces what `GET /briefing/status` deliberately collapses
        to a single row: an auditor investigating "the run before
        the bad one" needs the prior attempts' outcomes (state,
        timestamps, error, invalidCitationCount) without SSHing into
        the database. Returns an empty array when no generation has
        ever been kicked off for the engagement.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: |
            Recent generation attempts for the engagement, newest
            first. The array length is bounded by the sweep's
            keep-per-engagement cap (default 5).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefingGenerationRunsResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing/status:
    get:
      operationId: getEngagementBriefingGenerationStatus
      tags: [engagements]
      summary: Poll the most recent briefing-generation job
      description: |
        Returns the in-process generation job state for the engagement.
        `state` is `idle` when no generation has ever run on this
        process (the persisted briefing may still have a narrative
        from a previous process); `pending` while the engine is
        running; `completed` when the row's `section_a..g` columns
        have just been written; `failed` when the engine errored
        (the `error` field carries a short reason).

        Job state is process-local and best-effort — clients should
        treat the persisted briefing (`GET /engagements/{id}/briefing`)
        as the source of truth for the narrative itself.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current job state for the engagement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefingGenerationStatusResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /local/setbacks/{jurisdictionKey}:
    get:
      operationId: getLocalSetbackTable
      tags: [engagements]
      summary: Per-jurisdiction setback table for the Site Context expander
      description: |
        Thin HTTP shim over `lib/adapters/src/local/setbacks/<jurisdictionKey>.json`
        so the Site Context tab can render the matching front/rear/side/
        height/coverage row next to a local-tier zoning briefing source
        without forcing the design-tools artifact to depend on the
        adapters lib at build time.

        The path parameter is one of the keys exported by
        `SETBACK_JURISDICTION_KEYS` (e.g. `grand-county-ut`,
        `lemhi-county-id`, `bastrop-tx`, `utah-unincorporated`,
        `idaho-unincorporated`). 404 for any other key — the FE treats
        a 404 as "no codified table for this jurisdiction" and shows
        the bare adapter payload instead.
      parameters:
        - name: jurisdictionKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Setback table for the jurisdiction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalSetbackTable"
        "404":
          description: No setback table configured for this jurisdiction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /briefing-sources/{id}/glb:
    get:
      operationId: getBriefingSourceGlb
      tags: [engagements]
      summary: Stream the converted glb for one briefing source
      description: |
        Streams the binary glTF (`model/gltf-binary`) for a briefing
        source whose DXF→glb conversion has reached `ready`. The
        response body is the raw glb bytes (not JSON), with an ETag
        derived from a SHA-1 of the bytes so re-conversion of the
        same source busts cached entries even though the URL is
        unchanged.

        Honors `If-None-Match` with a 304 response. Cached for one
        day on intermediate proxies (`Cache-Control: public,
        max-age=86400, immutable`); the URL is content-addressed via
        the row id and a fresh conversion writes a new row, so the
        immutable hint is safe.

        404 when the row does not exist, when conversion is not yet
        `ready`, or when the row is on a non-DXF branch.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Glb bytes
          content:
            model/gltf-binary:
              schema:
                type: string
                format: binary
          headers:
            ETag:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
        "304":
          description: Cached copy still fresh
        "404":
          description: Briefing source not found, or no glb yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /materializable-elements/{id}/glb:
    get:
      operationId: getMaterializableElementGlb
      tags: [engagements]
      summary: Stream the converted glb for one materializable element
      description: |
        DA-PI-5 — Streams the binary glTF (`model/gltf-binary`) for a
        materializable element whose `glbObjectPath` points at a glb in
        object storage. Mirrors `GET /briefing-sources/{id}/glb` (same
        ETag / cache-header contract, same `model/gltf-binary` body,
        same `If-None-Match` 304 short-circuit) but is keyed by the
        materializable-element row id rather than its briefing-source
        parent — needed for elements whose mesh exists in the bucket
        but that don't carry a `briefingSourceId` (e.g. an architect-
        supplied mesh that didn't go through the briefing-source
        converter pipeline). The Plan Review BIM viewport falls back
        to this endpoint when the element row has a `glbObjectPath`
        but no `briefingSourceId`, so the reviewer can frame the
        camera onto a terrain / setback / neighbor-mass element the
        same way they do an inline-ring property line.

        404 when the row does not exist or when its `glbObjectPath`
        is null. 404 with `glb_bytes_missing` when the row points at
        a path the bucket no longer holds.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Glb bytes
          content:
            model/gltf-binary:
              schema:
                type: string
                format: binary
          headers:
            ETag:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
        "304":
          description: Cached copy still fresh
        "404":
          description: Materializable element not found, or no glb attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/bim-model:
    get:
      operationId: getEngagementBimModel
      tags: [engagements]
      summary: Get the engagement's bim-model + materializable elements
      description: |
        DA-PI-5 — read-side surface for the C# Revit add-in. Returns the
        engagement's `bim_models` row (or `null` when no push has
        happened yet) along with the `materializable_elements` rows
        derived from the currently-active briefing.

        The C# add-in calls this on app startup and on every
        engagement-binding change to discover what it should
        materialize. The wire envelope mirrors the briefing read shape
        so the FE can render a "Push to Revit" affordance against the
        same `null` / non-null discriminator.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The engagement's bim-model + materializable elements, or null when none exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBimModelResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: pushEngagementBimModel
      tags: [engagements]
      summary: Push the engagement's active briefing to Revit (idempotent)
      description: |
        DA-PI-5 — the "Push to Revit" affordance writes here. Records
        (or updates) the engagement's `bim_models` row to point at the
        engagement's currently-active parcel briefing and stamp
        `materializedAt` to now.

        Idempotent at the engagement-id level (the `bim_models` table
        has a unique constraint on `engagement_id`): a re-push for the
        same engagement updates the existing row's `activeBriefingId`
        / `materializedAt` rather than inserting a duplicate. Refuses
        when the engagement has no parcel briefing yet (the architect
        must upload a briefing source first).

        Emits `bim-model.materialized` against the row through the
        event-anchoring service. Best-effort: a transient history
        outage cannot fail the HTTP request — the row is the source
        of truth.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushBimModelBody"
      responses:
        "200":
          description: Bim-model push recorded; updated bim-model returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBimModelResponse"
        "400":
          description: Engagement has no active briefing yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bim-models/{id}/refresh:
    get:
      operationId: getBimModelRefresh
      tags: [engagements]
      summary: Compute the bim-model ↔ active-briefing refresh diff
      description: |
        DA-PI-5 / Spec 53 §3 — returns the refresh-diff between the
        bim-model's last materialization and the briefing's current
        state. The C# add-in polls this on focus to surface the
        "briefing has changed" badge in Revit; the design-tools FE
        uses the same shape to render the three statuses on the
        Site Context tab's "Push to Revit" affordance.

        Status semantics:
          - `current`     — bim-model is materialized and the briefing
            has not been regenerated since the push.
          - `stale`       — briefing has been regenerated since the
            last push; the architect's model is out of date.
          - `not-pushed`  — no push has happened yet (the row exists
            but `materializedAt` is null), or the briefing was
            deleted out from under the bim-model.

        Emits `bim-model.refreshed` against the row through the
        event-anchoring service so the timeline preserves a per-poll
        audit trail. Best-effort.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refresh diff result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BimModelRefreshResponse"
        "404":
          description: Bim-model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bim-models/{id}/divergences:
    get:
      operationId: listBimModelDivergences
      tags: [engagements]
      summary: List recorded briefing divergences for a bim-model
      description: |
        DA-PI-5 / Spec 51a §2.2 — returns the append-only audit
        trail of architect overrides recorded against locked
        materializable elements on this bim-model. Newest first.

        The design-tools Site Context tab reads this to surface the
        "what did the architect change inside Revit" feedback loop
        that closes the affordance opened by `POST /engagements/{id}/bim-model`.

        Each entry carries the parent materializable element's
        `elementKind` and `label` so the UI can group the rows by
        element without a follow-up fetch. Divergences against an
        element that has since been deleted out from under the
        bim-model are still returned (the cascade only fires when
        the element row itself is removed) and surface with a null
        `elementKind` / `label`.

        Engagement-scoped: requires the architect-audience guard the
        rest of the bim-model browser surface uses.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Newest-first list of recorded divergences.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBimModelDivergencesResponse"
        "403":
          description: Caller is not architect-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Bim-model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bim-models/{id}/divergences/{divergenceId}/resolve:
    post:
      operationId: resolveBimModelDivergence
      tags: [engagements]
      summary: Mark a recorded briefing divergence as resolved
      description: |
        Operators use this once a recorded architect override has been
        addressed (the briefing was updated to match Revit, the
        architect re-pinned, etc.) so the Site Context tab can move the
        row out of the "open overrides" list and stop nagging.

        Idempotent: re-resolving an already-resolved row is a no-op
        (returns 200 with the existing `resolvedAt` / `resolvedByRequestor`
        unchanged). The append-only history of *recorded* divergences
        is preserved — resolution is a soft acknowledgement that
        layers on top, not a delete.

        Engagement-scoped browser surface: same architect-audience
        guard the rest of the bim-model browser surface uses. The
        S2S record route remains the only HMAC-authenticated writer.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: divergenceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: |
            The divergence row, post-resolve. Same wire shape as
            `listBimModelDivergences` returns so the FE can splice the
            response into the list cache without a follow-up fetch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveBimModelDivergenceResponse"
        "403":
          description: Caller is not architect-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Bim-model or divergence not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bim-models/{id}/divergence:
    post:
      operationId: recordBimModelDivergence
      tags: [engagements]
      summary: Record an architect divergence against a locked element
      description: |
        DA-PI-5 / Spec 51a §2.2 — service-to-service surface the C#
        Revit add-in calls when its element-watcher detects an
        unpin / geometry edit / deletion against a locked
        materializable element.

        Authenticated via HMAC-SHA256 against `BIM_MODEL_SHARED_SECRET`
        (mirroring the DXF converter precedent in
        `converterClient.ts`): the request must carry both
        `x-bim-model-request-id` (a uuid the C# side mints) and
        `x-bim-model-signature` (the lowercase-hex HMAC of
        `requestId.bimModelId`). Engagement-scoped browser callers
        do NOT have access to this surface.

        Append-only: every divergence inserts a new row and emits
        `briefing-divergence.recorded` (against the divergence row)
        and `bim-model.diverged` (against the parent bim-model). A
        subsequent re-pin / unpin lands as a separate row.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-bim-model-request-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
        - name: x-bim-model-signature
          in: header
          required: true
          schema:
            type: string
            description: Lowercase-hex HMAC-SHA256 of `requestId.bimModelId`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordBimModelDivergenceBody"
      responses:
        "201":
          description: Divergence recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BimModelDivergenceResponse"
        "400":
          description: Invalid request body or signature headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing / invalid HMAC signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Bim-model or referenced materializable element not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots:
    get:
      operationId: listSnapshots
      tags: [snapshots]
      summary: List Revit snapshots across all engagements
      description: Returns all snapshots, newest first, joined with engagementName.
      responses:
        "200":
          description: Array of snapshot summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnapshotSummary"
    post:
      operationId: createSnapshot
      tags: [snapshots]
      summary: Receive a Revit snapshot from the add-in
      description: |
        Stores a snapshot from the Revit add-in. Requires the `x-snapshot-secret`
        header to match the configured `SNAPSHOT_SECRET` env var. If `projectName`
        matches an existing engagement (case-insensitive), the snapshot attaches
        to it. Otherwise a new engagement is auto-created.
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotPayload"
      responses:
        "201":
          description: Snapshot accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotReceipt"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}:
    get:
      operationId: getSnapshot
      tags: [snapshots]
      summary: Get the full snapshot record (with payload)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}/sheets:
    get:
      operationId: getSnapshotSheets
      tags: [snapshots]
      summary: List sheets uploaded for a snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of sheet summaries (no PNG bytes)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SheetSummary"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: uploadSnapshotSheets
      tags: [snapshots]
      summary: Upload sheets (multipart) for a snapshot
      description: |
        Multipart upload from the Revit add-in. Body must include a `metadata`
        text field containing JSON-encoded SheetMetadata[] plus per-sheet
        `sheet_{i}_thumb` and `sheet_{i}_full` PNG file fields. Idempotent on
        (snapshotId, sheetNumber) — re-uploading replaces existing rows.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                metadata:
                  type: string
                  description: JSON-encoded array of SheetMetadata
              required:
                - metadata
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetUploadResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: Wrong content-type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}/sheet-history:
    get:
      operationId: getSnapshotSheetHistory
      tags: [snapshots]
      summary: Recent atom_events for every sheet in a snapshot, in one batch
      description: |
        Batch variant of `GET /atoms/sheet/{id}/history` that returns the
        most-recent events for every sheet attached to a single snapshot
        in one round trip. Backed by a single SQL query (window function
        over `atom_events`), so the page-render cost is O(1) requests
        regardless of sheet count — the per-card endpoint stays as the
        single-sheet path.

        The `limit` query parameter caps the per-sheet page size (default
        5, max 50). Sheets with no recorded events appear as an empty
        `events` array so callers can render a stable shape without
        a second lookup. 404s when the snapshot id does not resolve.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max events per sheet (default 5, max 50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Per-sheet recent history, newest first per sheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotSheetHistoryResponse"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: History read failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sheets/{id}/thumbnail.png:
    get:
      operationId: getSheetThumbnail
      tags: [snapshots]
      summary: Sheet thumbnail PNG (512px)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PNG image
          content:
            image/png: {}
        "404":
          description: Sheet not found

  /sheets/{id}/full.png:
    get:
      operationId: getSheetFull
      tags: [snapshots]
      summary: Sheet full-resolution PNG (~2048px)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PNG image
          content:
            image/png: {}
        "404":
          description: Sheet not found

  /codes/jurisdictions:
    get:
      operationId: listCodeJurisdictions
      tags: [codes]
      summary: List configured code jurisdictions and their atom counts
      responses:
        "200":
          description: Array of jurisdiction summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JurisdictionSummary"

  /codes/jurisdictions/{key}/atoms:
    get:
      operationId: listJurisdictionAtoms
      tags: [codes]
      summary: List atoms for a jurisdiction (paginated, newest first)
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: codeBook
          in: query
          required: false
          description: Optional filter — restrict to a single code book.
          schema:
            type: string
        - name: edition
          in: query
          required: false
          description: Optional filter — restrict to a single edition (use together with codeBook).
          schema:
            type: string
      responses:
        "200":
          description: Atom summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodeAtomSummary"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/atoms:
    get:
      operationId: listCodeAtoms
      tags: [codes]
      summary: List atoms across jurisdictions (operator/debug surface)
      description: |
        Operator-facing global atom list backing the `/dev/atoms` inspector
        page. Distinct from `/codes/jurisdictions/{key}/atoms` (consumer
        surface, scoped to one jurisdiction): exposes filters not present
        in the consumer view (sourceName, embedded vs raw, free-text q)
        and adds offset pagination with a server-computed `total` so the
        UI can render Prev/Next without overfetching.

        Stable order: (fetchedAt DESC, id DESC).
      parameters:
        - name: jurisdictionKey
          in: query
          required: false
          schema:
            type: string
        - name: codeBook
          in: query
          required: false
          schema:
            type: string
        - name: edition
          in: query
          required: false
          schema:
            type: string
        - name: sourceName
          in: query
          required: false
          description: Filter by `code_atom_sources.source_name` (e.g. `grand_county_html`).
          schema:
            type: string
        - name: embedded
          in: query
          required: false
          description: |
            Tri-state. `true` → only embedded atoms; `false` → only raw
            atoms; omitted → no filter. Strings (not JSON booleans) so the
            querystring round-trips cleanly.
          schema:
            type: string
            enum: ["true", "false"]
        - name: q
          in: query
          required: false
          description: |
            Case-insensitive substring match against `sectionNumber` OR
            `sectionTitle`. Trimmed; empty string is treated as no filter.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated atom list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeAtomListResponse"

  /codes/atoms/{id}:
    get:
      operationId: getCodeAtom
      tags: [codes]
      summary: Get a single code atom (full body + provenance)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Atom detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeAtomDetail"
        "404":
          description: Atom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/warmup-status/{key}:
    get:
      operationId: getWarmupStatus
      tags: [codes]
      summary: Live warmup queue state for a jurisdiction
      description: |
        Returns counts of `code_atom_fetch_queue` rows by status for the given
        jurisdiction, a derived `state`, and (when present) the most recent
        failed row's `lastError` text so failures are debuggable from the
        browser without server-log access.

        state derivation:
          - total === 0          → "idle"
          - pending > 0 OR
            processing > 0       → "running"
          - failed > 0 AND
            pending+processing=0 → "failed"
          - otherwise            → "completed"
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current warmup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupStatus"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/warmup/{key}:
    post:
      operationId: warmupJurisdiction
      tags: [codes]
      summary: Trigger discovery + queue drain for a jurisdiction
      description: |
        Idempotent. Inserts new TOC entries into the fetch queue (existing
        entries are skipped) and synchronously drains a small batch so the
        caller can confirm the pipeline is alive. Long-running fetches
        continue in the background queue worker.
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Warmup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupResult"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dev/atoms/retrieve:
    post:
      operationId: retrieveAtomsProbe
      tags: [codes]
      summary: Retrieval probe — preview what /api/chat would inject for a given query
      description: |
        Operator-facing diagnostic backing the `/dev/atoms/probe` page. Runs the
        SAME retrieval module (`retrieveAtomsForQuestion` in `@workspace/codes`)
        that `/api/chat` uses, with the SAME jurisdiction-resolution logic
        (`keyFromEngagement`), and assembles the SAME `<reference_code_atoms>`
        XML block (`formatReferenceCodeAtoms`) that gets sent to Claude. No
        threshold filter is applied server-side — ALL retrieved atoms are
        returned and the UI renders the 0.6 threshold line visually.

        Either `engagementId` (server resolves jurisdiction from the engagement
        address using the same logic chat does) OR `jurisdiction` (a literal
        jurisdiction key like `grand_county_ut`) must be provided — exactly one.

        Header-gated by `x-snapshot-secret` to match the rest of the
        operator-facing surfaces (POST /snapshots, POST /engagements/match).
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrievalProbeBody"
      responses:
        "200":
          description: Retrieval probe result (all atoms returned, threshold UI-side)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalProbeResponse"
        "400":
          description: Missing query or both/neither of engagementId/jurisdiction provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found (engagementId path)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Engagement found but jurisdiction could not be resolved from address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /atoms/{slug}/{id}/summary:
    get:
      operationId: getAtomSummary
      tags: [atoms]
      summary: Resolve an atom's four-layer ContextSummary
      description: |
        Looks up an atom in the process-wide registry by `slug` (its
        `entityType`) and returns the typed `ContextSummary` produced by
        the registration's `contextSummary(id, scope)` callback. The
        `scope` query parameter is optional URL-encoded JSON using the
        compact wire format produced by `httpContextSummary` in
        `@workspace/empressa-atom`; decode failures fall back to the
        default scope rather than 400ing.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: false
          description: URL-encoded JSON scope object (compact form `{a,r,t,p}`).
          schema:
            type: string
      responses:
        "200":
          description: Four-layer context summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomSummary"
        "404":
          description: Atom type not registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: contextSummary callback threw
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /atoms/{slug}/{id}/history:
    get:
      operationId: getAtomHistory
      tags: [atoms]
      summary: Read recent history events for an atom
      description: |
        Returns the most recent atom_events for the given atom, newest first.
        Backed by the same `EventAnchoringService` the registration's
        `contextSummary` reads through for `historyProvenance`, so this
        endpoint complements (does not replace) the four-layer summary —
        callers that only need the latest provenance can keep using
        `getAtomSummary`.

        Requires a registered atom slug (404 otherwise). The `limit`
        query parameter caps the page size (default 5, max 50). Events
        whose entity row has been deleted upstream still surface here:
        atom_events stores `(entity_type, entity_id)` as opaque text and
        is intentionally not FK'd to the entity table.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max events to return (default 5, max 50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Recent events, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryResponse"
        "404":
          description: Atom type not registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: History read failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Ask Claude about an engagement (SSE stream)
      description: |
        Streams an assistant response over Server-Sent Events. Each event
        is `data: {"text": "..."}\n\n` followed by a final `data: [DONE]\n\n`.
        Grounds Claude on the latest snapshot for the given engagement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
        "400":
          description: Invalid request or no snapshots yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/architect-pdf-header:
    patch:
      operationId: updateMyArchitectPdfHeader
      tags: [users]
      summary: Update the current architect's PDF-export header override
      description: |
        Lets the session's current `user`-kind requestor edit the
        `users.architect_pdf_header` column on their own profile row.
        Self-edit only — there is no `users:manage` admin gate, but
        the request must carry a `user`-kind requestor (anonymous /
        agent sessions get a 401).

        The header text feeds the briefing-export PDF
        (`GET /engagements/:id/briefing/export.pdf`); a null / empty
        / whitespace-only value clears the override and the PDF route
        falls back to the default header
        ("SmartCity Design Tools — Pre-Design Briefing").

        The user's profile row is upserted on the way in (mirroring the
        session-middleware backfill) so a freshly-seen architect editing
        their header on their first visit doesn't 404.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyArchitectPdfHeaderBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: |
            No `user`-kind requestor on the session — anonymous and
            agent callers cannot self-edit a profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/profile:
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update the current architect's own display name / email / avatar
      description: |
        Lets the session's current `user`-kind requestor edit their
        own `displayName`, `email`, and `avatarUrl` columns. The
        Settings page wires this up so an architect can fix the
        opaque user id that gets backfilled on first sign-in without
        having to ask an admin to PATCH `/users/{id}` (which requires
        the `users:manage` claim — architects do not have it).

        Self-edit only — there is no `users:manage` admin gate, but
        the request must carry a `user`-kind requestor (anonymous /
        agent sessions get a 401). The row id always comes from
        `req.session.requestor.id`, so a malicious payload that
        smuggles another user's id cannot reach `users.id = <other>`.

        Partial update: omit a field to leave it unchanged. `email`
        and `avatarUrl` accept `null` to clear the column;
        `displayName` is non-nullable, and an empty / whitespace-only
        value is a 400 (the architect's own name should never be
        silently demoted to "" or back to the opaque id). `email`
        is trimmed and an empty / whitespace-only string clears the
        column so the FE form can ship a single Save button.

        `avatarUrl` runs through the same per-asset size cap and
        image-bytes sniff as the admin `PATCH /users/{id}` route, and
        the freshly-uploaded blob is rolled back if the row never
        ends up pointing at it. The user's profile row is upserted on
        the way in so a freshly-seen architect editing their profile
        on their first visit doesn't 404.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyProfileBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: |
            Invalid request body, empty patch, empty `displayName`,
            or `avatarUrl` points at an object missing from storage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: |
            No `user`-kind requestor on the session — anonymous and
            agent callers cannot self-edit a profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: |
            Avatar object exceeds the per-asset size cap (the bytes
            were PUT directly to GCS via the presigned URL, then this
            route inspected the actual stored size before persisting
            `avatar_url`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: |
            Avatar bytes do not match a recognized image format (the
            declared `contentType` is checked at presigned-URL time,
            but a non-browser client can lie about it; this route
            sniffs the actual bytes before persisting `avatar_url`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/notifications:
    get:
      operationId: listMyNotifications
      tags: [notifications]
      summary: List the architect's recent inbox notifications
      description: |
        Task #432 — architect-wide in-app notification surface for the
        design-tools side-nav inbox.

        Newest-first list of recent submission status changes and
        reviewer-requests across every engagement. Each row carries a
        `read` flag derived from the architect's persisted
        `lastReadAt` watermark, plus the response envelope includes an
        aggregate `unreadCount` so the side-nav badge can render
        without a follow-up call.

        Architect-only — anonymous and agent callers get a 401. The
        `lastReadAt` watermark is per-requestor, persisted in
        `architect_notification_reads` keyed by
        `req.session.requestor.id`.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return. Capped server-side at
            200; defaults to 50 when omitted.
      responses:
        "200":
          description: Notification list with unread count and watermark
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNotificationsResponse"
        "401":
          description: |
            No `user`-kind requestor on the session — anonymous and
            agent callers cannot view the architect inbox.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/notifications/mark-read:
    post:
      operationId: markMyNotificationsRead
      tags: [notifications]
      summary: Bump the architect's "last viewed inbox" watermark
      description: |
        Task #432 — sets `architect_notification_reads.last_read_at`
        for the calling architect to "now". Subsequent
        `GET /me/notifications` calls report `unreadCount: 0` and
        flip every existing item to `read: true` until a fresh event
        lands.

        Idempotent — calling twice in quick succession just bumps the
        watermark twice. No request body is required.
      responses:
        "200":
          description: Updated watermark
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkNotificationsReadResponse"
        "401":
          description: |
            No `user`-kind requestor on the session — anonymous and
            agent callers cannot mark notifications as read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /session:
    get:
      operationId: getSession
      tags: [session]
      summary: Get current session
      description: |
        Returns whatever `req.session` the server has attached for the
        caller. Today this is derived from the dev `pr_session` cookie
        / `x-requestor` / `x-permissions` header overrides outside
        production, and is locked to the anonymous applicant default
        in production. Frontends use this to gate admin-only UI (e.g.
        the "Users & Roles" sidebar entry only renders when
        `permissions` contains `users:manage`).
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List user profiles
      description: |
        Returns every row in the `users` profile table, ordered by
        `displayName`. Used by the admin "Users & Roles" screen to
        manage the names/emails/avatars that hydrate timeline actor
        labels.
      responses:
        "200":
          description: Array of user profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user profile
      description: |
        Inserts a new row into the `users` profile table. Fails with 409
        if a row with the same `id` already exists — use PATCH to edit
        an existing profile instead. Requires the `users:manage`
        permission claim on the caller's session; anything else is
        rejected with 403.

        When `avatarUrl` references one of our `/objects/<id>` paths,
        the server inspects the actual stored object before the row is
        inserted: oversized blobs (above the
        `RequestUploadUrlBody.size` cap) get a 413, and a path that
        looks like ours but isn't actually present in the bucket gets
        a 400. External avatar URLs (pasted by the admin) skip the
        check.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: |
            Invalid request body — including the case where
            `avatarUrl` references an internal `/objects/...` path that
            doesn't exist in storage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller lacks the `users:manage` permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A profile with this id already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: |
            `avatarUrl` references a stored object whose actual byte
            size exceeds the per-asset cap. The orphan is best-effort
            cleaned up server-side.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a single user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user profile
      description: |
        Partial update — only the fields included in the request body are
        changed. Pass `null` for `email` or `avatarUrl` to clear them.
        `displayName` is non-nullable: omit it to leave it unchanged.
        Requires the `users:manage` permission claim; non-admin callers
        get 403.

        When `avatarUrl` is set to one of our `/objects/<id>` paths, the
        server inspects the actual stored object before the row update
        commits: oversized blobs (above the
        `RequestUploadUrlBody.size` cap) get a 413, and a path that
        looks like ours but isn't actually present in the bucket gets a
        400. The previous avatar on the row is left untouched on
        rejection. Clearing the avatar (`null`) and external URLs both
        skip the check.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: |
            Invalid request body — including the case where
            `avatarUrl` references an internal `/objects/...` path that
            doesn't exist in storage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller lacks the `users:manage` permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: |
            `avatarUrl` references a stored object whose actual byte
            size exceeds the per-asset cap. The orphan is best-effort
            cleaned up server-side and the row is left unchanged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user profile
      description: |
        Removes the profile row. Atom-event actor records are not
        cascaded — historical events keep the raw actor id and the
        timeline simply falls back to "Unknown user" for the deleted
        profile from then on. This matches the contract documented on
        `lib/db/src/schema/users.ts`. Requires the `users:manage`
        permission claim; non-admin callers get 403.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Caller lacks the `users:manage` permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      description: |
        Returns a short-lived presigned PUT URL the client uploads the
        file bytes to (directly to GCS — the file does NOT go through
        this server). The response also includes the canonical
        `objectPath` (`/objects/<id>`) the client should persist on the
        owning record once the PUT succeeds. Used by the admin Users
        screen to upload avatar images instead of pasting URLs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL + canonical object path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: |
            Requested upload exceeds the per-asset byte cap (see
            `RequestUploadUrlBody.size`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: |
            Requested `contentType` is not in the allow-list (see
            `RequestUploadUrlBody.contentType`). The avatar flow is the
            only consumer today; it always uploads `image/jpeg`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/{submissionId}/reviewer-annotations:
    get:
      operationId: listReviewerAnnotations
      tags: [reviewer-annotations]
      summary: List reviewer annotations on a submission
      description: |
        Returns every reviewer-annotation row anchored to the
        submission, in newest-first order. Reviewer-only — the
        endpoint requires the `internal` audience and 403s any
        non-reviewer caller. Architects must wait until annotations
        are *promoted* (via `POST .../{annotationId}/promote`) before
        they can see them in the architect-side jurisdiction-response
        inbox.

        Annotations are submission-scoped and never leak across
        submissions of the same engagement. Threading is preserved on
        the wire (each entry carries `parentAnnotationId`) so the
        side-panel can render a flat list as a thread tree without a
        follow-up query.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
          description: Submission id.
        - name: targetEntityType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReviewerAnnotationTargetType"
          description: |
            Optional filter — restrict the result to annotations
            anchored to this target type. Combine with `targetEntityId`
            for a single-target lookup (the affordance's read path).
        - name: targetEntityId
          in: query
          required: false
          schema:
            type: string
          description: |
            Optional filter — restrict the result to annotations
            anchored to this target entity id. Must be paired with
            `targetEntityType`.
      responses:
        "200":
          description: Newest-first list of reviewer annotations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReviewerAnnotationsResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Submission not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createReviewerAnnotation
      tags: [reviewer-annotations]
      summary: Create a reviewer annotation on a submission
      description: |
        Creates a top-level annotation, or a reply if
        `parentAnnotationId` is supplied. The route validates that the
        parent annotation (when present) belongs to the same submission
        and is itself a top-level annotation — single-level threading
        is the v1 contract.

        Emits `reviewer-annotation.created` for top-level annotations
        and `reviewer-annotation.replied` for replies, both anchored
        to the new annotation row's id.

        Reviewer-only — the endpoint requires the `internal` audience
        and 403s any non-reviewer caller.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewerAnnotationBody"
      responses:
        "201":
          description: Annotation created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewerAnnotationResponse"
        "400":
          description: Invalid request body or parent/submission mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Submission not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/{submissionId}/reviewer-annotations/{annotationId}:
    patch:
      operationId: updateReviewerAnnotation
      tags: [reviewer-annotations]
      summary: Edit a reviewer annotation
      description: |
        Edit the body and/or category of a non-promoted reviewer
        annotation. Promoted annotations (those with a non-null
        `promotedAt`) are immutable — a PATCH against one returns 409.

        Reviewer-only — the endpoint requires the `internal` audience.
        Today every reviewer in the same submission may edit any
        annotation; per-author lockdown is a follow-up for when the
        identity layer carries roles beyond `internal`.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
        - name: annotationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReviewerAnnotationBody"
      responses:
        "200":
          description: Annotation updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewerAnnotationResponse"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Submission or annotation not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Annotation has already been promoted (immutable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/{submissionId}/reviewer-annotations/promote:
    post:
      operationId: promoteReviewerAnnotations
      tags: [reviewer-annotations]
      summary: Promote one or more reviewer annotations
      description: |
        Stamps `promotedAt` on each annotation in the request body and
        emits a `reviewer-annotation.promoted` event per row. Idempotent
        per row — annotations that have already been promoted are
        silently skipped (their existing `promotedAt` is preserved and
        no second event is appended). At least one annotation in the
        request body must belong to the submission; ids that do not
        match the submission are reported back via the response's
        `unknown` array so the caller can surface the mismatch.

        Promotion is the only path that flips an annotation from
        reviewer-only into architect-visible. Once promoted, the row
        is immutable (PATCH returns 409, repeat promote is a no-op).

        Reviewer-only — the endpoint requires the `internal` audience.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoteReviewerAnnotationsBody"
      responses:
        "200":
          description: Promotion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoteReviewerAnnotationsResponse"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Submission not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/{submissionId}/comments:
    get:
      operationId: listSubmissionComments
      tags: [submission-comments]
      summary: List the reviewer↔architect comment thread for a submission
      description: |
        Returns every comment row anchored to the submission, in
        oldest-first chronological order so the thread reads
        top-to-bottom like a chat transcript. The thread is the
        reply surface for the seed reviewer comment carried on the
        `submissions.reviewer_comment` field — the seed itself is NOT
        repeated in this response.

        Both reviewer (plan-review) and architect (design-tools)
        callers may read. The endpoint requires `audience: "internal"`
        — both surfaces run under this audience today, so a single
        gate covers both. The response carries `authorRole` per row
        so the UI can color-code reviewer vs architect entries
        without a follow-up lookup.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
          description: Submission id.
      responses:
        "200":
          description: Oldest-first list of submission comments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubmissionCommentsResponse"
        "403":
          description: Caller is not internal-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Submission not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createSubmissionComment
      tags: [submission-comments]
      summary: Post a reply into a submission's comment thread
      description: |
        Inserts a new comment row under the submission. The body
        carries the `authorRole` field — `architect` from
        design-tools, `reviewer` from plan-review — which the route
        records verbatim alongside the session-bound author id.

        Both audiences may post; the endpoint requires `audience:
        "internal"`. The comment row is plain text (no threading,
        no promotion concept); the response splices the new row
        back into the same envelope shape `GET` returns so the FE
        can append without a follow-up fetch.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionCommentBody"
      responses:
        "201":
          description: Comment created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionCommentResponse"
        "400":
          description: Invalid request body or missing session requestor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not internal-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Submission not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/{submissionId}/findings:
    get:
      operationId: listSubmissionFindings
      tags: [findings]
      summary: List the AI-produced findings for a submission
      description: |
        Returns the current set of findings for a submission, newest
        first, after every reviewer mutation has been applied. The list
        includes overridden originals (status `overridden` with
        `revisionOf == null`) AND their revision rows
        (`revisionOf == originalAtomId`) so the FE drill-in can show
        the audit pair. AI-produced rows the engine emitted but a
        reviewer never touched carry status `ai-produced`.

        Reviewer-only — the endpoint requires the `internal` audience.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current findings list (may be empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubmissionFindingsResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Submission not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/{submissionId}/findings/generate:
    post:
      operationId: generateSubmissionFindings
      tags: [findings]
      summary: Kick off AI compliance-checker generation against a submission
      description: |
        Asynchronously runs the AIR-1 finding engine
        (`@workspace/finding-engine`): reads the submission's parent
        engagement's current `briefing_sources`, retrieves a
        jurisdiction-scoped top-K of `code_atoms`, calls the LLM (or
        the deterministic mock when `AIR_FINDING_LLM_MODE=mock`),
        validates every citation token resolves to a known atom, and
        persists the surviving findings into `findings` rows scoped to
        the submission.

        Returns `202 Accepted` with a `generationId`; clients poll
        `GET /submissions/{id}/findings/status` until the job's
        `state` flips from `pending` to `completed` or `failed`.

        Single-flight: a generation already in flight for this
        submission is a 409 — the caller should poll the in-flight
        job's id rather than queueing a fresh run.

        Reviewer-only — the endpoint requires the `internal` audience.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateSubmissionFindingsBody"
      responses:
        "202":
          description: Generation kicked off; poll status for completion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateSubmissionFindingsResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Submission not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: |
            A generation for this submission is already in flight.
            Poll `/findings/status` and retry once it settles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/{submissionId}/findings/status:
    get:
      operationId: getSubmissionFindingsGenerationStatus
      tags: [findings]
      summary: Poll the most recent finding-generation job
      description: |
        Returns the most recent generation job's outcome for the
        submission so the UI can poll until the run settles. Job state
        is persisted in `finding_runs` (one row per kickoff), so it
        survives api-server restarts and stays coherent across
        multiple instances. The persisted findings on
        `GET /submissions/{id}/findings` remain the source of truth
        for the list itself; this endpoint is the mechanism the UI
        uses to know when the list has landed.

        Reviewer-only — the endpoint requires the `internal` audience.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current job state for the submission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionFindingsGenerationStatusResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Submission not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/{submissionId}/findings/runs:
    get:
      operationId: listSubmissionFindingsGenerationRuns
      tags: [findings]
      summary: List the most recent finding-generation attempts
      description: |
        Returns the most recent finding-generation job rows for the
        submission, ordered by `startedAt` DESC. Capped at the same
        per-submission keep value the sweep uses (default 5,
        overridable via `FINDING_RUNS_KEEP_PER_SUBMISSION`) so the API
        and the sweep cannot drift.

        Surfaces what `GET /findings/status` deliberately collapses to
        a single row: an auditor investigating a regression needs the
        prior attempts' outcomes (state, timestamps, error,
        invalidCitationCount, discardedFindingCount) without SSHing
        into the database.

        Reviewer-only — the endpoint requires the `internal` audience.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recent generation attempts, newest first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionFindingsGenerationRunsResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Submission not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /findings/{findingId}/accept:
    post:
      operationId: acceptFinding
      tags: [findings]
      summary: Mark a finding as accepted by the reviewer
      description: |
        Stamps the finding's status to `accepted` plus the reviewer
        attribution (`reviewerStatusBy`, `reviewerStatusChangedAt`).
        The original AI-produced text is preserved in place — accept
        does not edit the body. Emits `finding.accepted` on the
        finding's history chain.

        Idempotent: re-accepting an already-accepted finding refreshes
        the reviewer attribution timestamp. Acceptance from the
        `overridden` or `rejected` state is a 409 — use override to
        change a previously-actioned finding.

        Reviewer-only — the endpoint requires the `internal` audience.
      parameters:
        - name: findingId
          in: path
          required: true
          description: The finding's atom id (`finding:{submissionId}:{ulid}`).
          schema:
            type: string
      responses:
        "200":
          description: Updated finding wire envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindingResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Finding not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Finding's current status forbids accepting.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /findings/{findingId}/reject:
    post:
      operationId: rejectFinding
      tags: [findings]
      summary: Mark a finding as rejected by the reviewer
      description: |
        Stamps the finding's status to `rejected` plus reviewer
        attribution. Emits `finding.rejected` on the finding's
        history chain.

        Idempotent: re-rejecting refreshes the reviewer timestamp.
        Rejection from `overridden` is a 409.

        Reviewer-only — the endpoint requires the `internal` audience.
      parameters:
        - name: findingId
          in: path
          required: true
          description: The finding's atom id (`finding:{submissionId}:{ulid}`).
          schema:
            type: string
      responses:
        "200":
          description: Updated finding wire envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindingResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Finding not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Finding's current status forbids rejecting.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /findings/{findingId}/override:
    post:
      operationId: overrideFinding
      tags: [findings]
      summary: Override a finding with a reviewer-authored revision
      description: |
        Creates a NEW finding row containing the reviewer's revised
        text/severity/category, with `revisionOf` pointing back at the
        original. The original is preserved in place with status
        `overridden` so the drill-in's "See AI's original" affordance
        keeps reading it. Both writes commit in one transaction.
        Emits `finding.overridden` on the original's history chain.

        Reviewer-only — the endpoint requires the `internal` audience.
      parameters:
        - name: findingId
          in: path
          required: true
          description: The finding's atom id (`finding:{submissionId}:{ulid}`).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OverrideFindingBody"
      responses:
        "200":
          description: |
            Updated finding wire envelope — the response carries the
            NEW revision row (with `revisionOf` set), not the
            superseded original. Callers refetch the list to see
            both rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindingResponse"
        "400":
          description: Invalid override body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Finding not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviewer/queue:
    get:
      operationId: listReviewerQueue
      tags: [reviewer]
      summary: List submissions awaiting reviewer attention across every engagement
      description: |
        Cross-engagement reviewer Inbox feed (Reviewer V1-B / Task
        #426). Returns the slice of `submissions` rows whose `status`
        matches the requested filter, joined to their parent
        engagement's metadata (`name`, `jurisdiction`, `address`) so
        the Plan Review Inbox can render a row per submission without
        a follow-up `GET /engagements/{id}` per row.

        Reviewer-only (`session.audience === "internal"`). Non-reviewer
        callers receive 403 with the
        `reviewer_queue_requires_internal_audience` error code; the
        gate mirrors `reviewerAnnotations` / `reviewerRequests`.

        The default filter is `pending,corrections_requested` — the
        two states a reviewer needs to act on. Pass `?status=` with a
        comma-separated subset of `SubmissionStatus` values to widen
        the cut (e.g. `?status=pending,corrections_requested,rejected`
        for a "what was just rejected" tab). An unrecognized status
        value is rejected with 400 rather than silently ignored so a
        typo does not return a misleading queue.

        Items are ordered by `submittedAt` DESC so the freshest
        package is at the top — matches the existing per-engagement
        list contract (`GET /engagements/{id}/submissions`).

        `counts` accompanies the items as a denormalized roll-up so
        the page's KPI strip and "X in review · Y awaiting AI ·
        Z rejected" header can render off the same response payload
        without a second round trip. Counts are computed *across the
        full submissions table* (not just the filtered slice) so the
        strip stays meaningful regardless of how the caller narrowed
        `status`.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: |
            Comma-separated list of `SubmissionStatus` values to
            include in `items`. Defaults to
            `pending,corrections_requested`. Unknown values cause a
            400 (no silent partial-match).
      responses:
        "200":
          description: Reviewer Inbox feed + denormalized counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewerQueueResponse"
        "400":
          description: Invalid `status` filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not a reviewer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/reviewer-requests:
    get:
      operationId: listEngagementReviewerRequests
      tags: [reviewer-requests]
      summary: List reviewer-requests on an engagement
      description: |
        Returns reviewer-requests filed against the engagement,
        newest-first by `requestedAt`. Architect AND reviewer audiences
        can both read this list — architect drives the
        `ReviewerRequestsStrip` open queue, reviewer (Task #429) binds
        the three Request-Refresh affordances to a "Refresh requested"
        pending state so a target with an open request disables the
        affordance rather than letting the reviewer file a duplicate.
        403s any other audience (e.g. agent traffic).

        Mutations stay split: only reviewers can create
        (`POST /engagements/{id}/reviewer-requests`) and only architects
        can dismiss (`POST /reviewer-requests/{id}/dismiss`).

        The optional `status` filter narrows the result to one
        lifecycle state. The strip queries `?status=pending` to render
        its open queue; auditors / debug tools can omit the filter to
        see the full history.

        Resolution is implicit — when an architect runs the matching
        domain action (refresh briefing-source / refresh bim-model /
        regenerate briefing) the post-action hook flips a pending
        request to `resolved` and stamps `triggeredActionEventId` to
        the action event's id. The architect never directly "marks
        resolved" — only `dismiss` is an explicit transition.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Engagement id.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReviewerRequestStatus"
          description: |
            Optional filter — restrict the result to requests in this
            lifecycle state. The architect strip queries `pending`
            for its open queue.
      responses:
        "200":
          description: Newest-first list of reviewer-requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReviewerRequestsResponse"
        "403":
          description: Caller is neither architect- nor reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEngagementReviewerRequest
      tags: [reviewer-requests]
      summary: File a reviewer-request against an engagement
      description: |
        Files a free-text request from the reviewer asking the
        architect to run one of three actions against a target atom
        on the engagement: refresh a briefing-source, refresh a
        bim-model, or regenerate the briefing.

        The route validates that `targetEntityType` matches the
        request kind (e.g. `refresh-briefing-source` must target a
        `briefing-source` atom) — a malformed pairing is rejected
        with 400 at the contract layer.

        Emits the matching `reviewer-request.<kind>.requested` event
        anchored to the new row's id. The row starts in `pending`
        status and moves to `resolved` (implicitly, via the
        post-action hook on the matching domain action) or
        `dismissed` (explicitly, via
        `POST /reviewer-requests/{id}/dismiss`).

        Reviewer-only — the endpoint requires the `internal`
        audience and 403s any non-reviewer caller.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Engagement id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewerRequestBody"
      responses:
        "201":
          description: Reviewer-request created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewerRequestResponse"
        "400":
          description: |
            Invalid request body — missing fields, oversize `reason`,
            or a `(kind, targetEntityType)` pairing that violates the
            kind-to-target-type contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviewer-requests:
    get:
      operationId: listMyReviewerRequests
      tags: [reviewer-requests]
      summary: List the calling reviewer's own reviewer-requests, across every engagement
      description: |
        Cross-engagement read for the reviewer-side "Outstanding
        Requests" page. Returns reviewer-requests authored by the
        *calling* reviewer — ownership is enforced server-side by
        filtering on the `requested_by` actor envelope against the
        session requestor; the client cannot widen the scope.

        Reviewer-only: requires the `internal` audience and 403s any
        non-reviewer caller. Newest-first by `requestedAt`, joined
        with each target engagement's id/name/jurisdiction.

        Status filter: defaults to `pending` when omitted. Pass
        `status=all` to return every lifecycle state, or one of the
        three specific states (`pending` / `dismissed` / `resolved`)
        to restrict the result.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, dismissed, resolved, all]
          description: |
            Lifecycle filter. Defaults to `pending` when omitted.
            Pass `all` to return every state.
      responses:
        "200":
          description: Newest-first list of the caller's reviewer-requests, with engagement context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMyReviewerRequestsResponse"
        "400":
          description: Caller has no session requestor (anonymous internal session).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not reviewer-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviewer-requests/{id}/dismiss:
    post:
      operationId: dismissReviewerRequest
      tags: [reviewer-requests]
      summary: Dismiss a pending reviewer-request with a reason
      description: |
        Architect-side explicit dismissal of a pending reviewer-request.
        Captures the architect's reason for not honoring the ask
        (`dismissalReason`) and emits a
        `reviewer-request.<kind>.dismissed` event anchored to the row.

        Idempotent in spirit — dismissing an already-dismissed row
        returns the existing dismissal envelope without re-emitting an
        event. Dismissing a row that is already `resolved` is a 409
        (the request was implicitly closed by a domain action; there
        is nothing left to dismiss).

        Architect-only — the endpoint requires the `architect`
        audience and 403s any non-architect caller.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Reviewer-request id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DismissReviewerRequestBody"
      responses:
        "200":
          description: Reviewer-request dismissed (or already dismissed).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewerRequestResponse"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not architect-audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Reviewer-request not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: |
            Request is already in a terminal state that bars dismissal
            (e.g. already `resolved` via a domain action).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviewer-requests/{id}/withdraw:
    post:
      operationId: withdrawReviewerRequest
      tags: [reviewer-requests]
      summary: Withdraw the caller's own pending reviewer-request
      description: |
        Reviewer-side retract path (Task #443). Lets the *original
        requester* clear their own outstanding ask without an
        architect context-switch — back-end mirror of the architect
        dismiss endpoint, but reserved to the row's author and gated
        on the reviewer audience.

        Stamps `withdrawnBy` / `withdrawnAt` (and optional
        `withdrawalReason` if the caller supplies one), flips
        `status` to `withdrawn`, and emits a
        `reviewer-request.<kind>.withdrawn` event anchored to the
        row. The `withdrawn` lifecycle event is deliberately distinct
        from the architect-side `.dismissed` event so the engagement
        timeline can tell apart "architect declined" from "reviewer
        changed their mind".

        Idempotent in spirit — withdrawing an already-withdrawn row
        returns the existing envelope without re-emitting an event.
        409s on `dismissed` (architect already closed the ask) and on
        `resolved` (a domain action already implicitly closed it).

        Reviewer-only: requires the `internal` audience and 403s any
        non-reviewer caller. Author-only: 403s when the calling
        reviewer is not the row's `requestedBy.id`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Reviewer-request id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawReviewerRequestBody"
      responses:
        "200":
          description: Reviewer-request withdrawn (or already withdrawn).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewerRequestResponse"
        "400":
          description: Invalid request body, or caller has no session requestor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: |
            Caller is not reviewer-audience, OR is reviewer but is not
            the row's original requester.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Reviewer-request not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: |
            Request is already in a terminal state that bars
            withdrawal (already `dismissed` by an architect, or
            already `resolved` by a domain action).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/renders:
    post:
      operationId: kickoffRender
      tags: [renders]
      summary: Kick off a mnml.ai render for an engagement
      description: |
        Synchronous up to row insert + 202 response; the polling
        worker (capture → trigger → poll → mirror → terminal) runs
        fire-and-forget. Body is a discriminated union by `kind`:

          - `still`         — single image. 1 archDiffusion-v43 call.
          - `elevation-set` — north / east / south / west. 4 archDiff
                              calls fanned out by the route, persisted
                              as ONE viewpoint_renders parent row +
                              4 render_outputs children.
          - `video`         — single 5- or 10-second Kling clip.

        Architect-audience-only. Behind `RENDERS_PROD_ENABLED` in
        production (returns 503 with `renders_preview_disabled` until
        the operator flips the flag). The body MUST include `glbUrl`
        — V1-4 does not resolve the bim-model row's GLB pointer
        server-side (V1-5 follow-up).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KickoffRenderBody"
      responses:
        "202":
          description: |
            Render kicked off; clients poll `GET /renders/{renderId}`
            until `status` reaches a terminal value. The response
            includes a static cost estimate (Spec 54 v2 §4) so the
            FE can render a "Render: N credits" chip without a
            second round-trip.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KickoffRenderResponse"
        "400":
          description: |
            Validation failure (invalid body / engagement id), OR
            engagement is missing a parcel-briefing or bim-model
            (both required upstreams per Spec 54 §3).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Audience is not architect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: |
            Production feature flag `RENDERS_PROD_ENABLED` is off.
            Mock mode is permissive in dev / CI / staging.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listEngagementRenders
      tags: [renders]
      summary: List renders for an engagement (newest first)
      description: |
        Returns up to 100 most-recent renders ordered by `createdAt`
        DESC. Architect-audience-only. No pagination in V1-4 — the
        architect's render history is small enough that the cap is
        not user-visible. Pagination is a V1-5 follow-up if the cap
        becomes a constraint.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Render list, newest first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderListResponse"
        "400":
          description: Invalid engagement id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Audience is not architect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /renders/{id}:
    get:
      operationId: getRender
      tags: [renders]
      summary: Get one render's status + outputs
      description: |
        Returns the row's status (`queued | rendering | ready |
        failed | cancelled`), the upstream-snapshot atom_event_ids
        (freshness anchors per Spec 54 §6), the per-direction
        in-flight tracking JSONB for `elevation-set` parents
        (`mnmlJobs`), and the child `render_outputs` rows projected
        for FE consumption. Architect-audience-only.

        No mnml call from this handler — the polling worker advances
        state. Clients poll this endpoint while non-terminal.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Render row + outputs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderDetailResponse"
        "400":
          description: Invalid render id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Audience is not architect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Render not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /renders/{id}/cancel:
    post:
      operationId: cancelRender
      tags: [renders]
      summary: Cancel a queued or rendering render
      description: |
        Server-side cancellation. mnml.ai has no public cancel API
        (Spec 54 v2 §6.1) — this endpoint flips the row status to
        `cancelled` and the polling worker checks status before each
        poll iteration and bails. Outputs already mirrored before
        cancellation persist as artifacts of the partial run.

        Returns 409 when the render is already in a terminal state
        (`ready | failed | cancelled`) — those cannot be re-cancelled.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Render flipped to `cancelled`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelRenderResponse"
        "400":
          description: Invalid render id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Audience is not architect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Render not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: |
            Render is already in a terminal state — cancellation has
            no effect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /render-outputs/{id}/file:
    get:
      operationId: getRenderOutputFile
      tags: [renders]
      summary: Stream a render output file
      description: |
        Streams the durable mirrored bytes for a single
        `render_outputs` row. mnml's CDN URLs expire within minutes;
        this endpoint is the only stable preview/download surface.
        `?download=1` adds a `Content-Disposition: attachment` header
        so the browser saves rather than navigates inline.
        Architect-audience-only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: download
          in: query
          required: false
          schema:
            type: string
            enum: ["1"]
      responses:
        "200":
          description: Mirrored file bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid render output id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Audience is not architect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Output row missing or its mirrored object is gone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Storage backend not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/renders/sweep:
    post:
      operationId: runRendersSweep
      tags: [renders]
      summary: Cron-invoked maintenance sweep over renders
      description: |
        Three buckets:

          1. Stuck-render rescue — rows in `queued`/`rendering`
             older than the rescue threshold are flipped to `failed`
             with `error_code='polling_timeout_sweep'`.
          2. Old terminal reap — `failed`/`cancelled` rows older
             than the retention window are DELETEd. `ready` rows
             are NEVER reaped.
          3. Incomplete-mirror warning — `ready` rows whose
             `render_outputs` carry NULL `mirroredObjectKey` are
             surfaced via warn logs (no auto-heal in V1-4).

        Auth: shared-secret header `x-renders-admin-secret` ↔
        `RENDERS_ADMIN_SECRET` env var. Cloud Scheduler / Replit
        cron / k8s CronJob configures the schedule outside the
        api-server. Returns 503 when the env var is unset (sweep
        is opt-in per environment).
      parameters:
        - name: x-renders-admin-secret
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sweep complete; counts surfaced for observability.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RendersSweepResponse"
        "401":
          description: Header secret missing or mismatched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Sweep crashed unexpectedly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: |
            `RENDERS_ADMIN_SECRET` is not configured; sweep is
            disabled in this environment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    EngagementStatus:
      type: string
      enum: [active, on_hold, archived]

    ProjectType:
      type: string
      enum: [new_build, renovation, addition, tenant_improvement, other]

    Geocode:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        jurisdictionCity:
          type: string
          nullable: true
        jurisdictionState:
          type: string
          nullable: true
        jurisdictionFips:
          type: string
          nullable: true
        source:
          type: string
          enum: [nominatim, manual]
        geocodedAt:
          type: string
          format: date-time
      required:
        - latitude
        - longitude
        - jurisdictionCity
        - jurisdictionState
        - jurisdictionFips
        - source
        - geocodedAt

    Site:
      type: object
      properties:
        address:
          type: string
          nullable: true
        geocode:
          oneOf:
            - $ref: "#/components/schemas/Geocode"
            - type: "null"
        projectType:
          oneOf:
            - $ref: "#/components/schemas/ProjectType"
            - type: "null"
        zoningCode:
          type: string
          nullable: true
        lotAreaSqft:
          type: number
          nullable: true
      required:
        - address
        - geocode
        - projectType
        - zoningCode
        - lotAreaSqft

    EngagementSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        jurisdiction:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/EngagementStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        snapshotCount:
          type: integer
        latestSnapshot:
          oneOf:
            - $ref: "#/components/schemas/SnapshotSummary"
            - type: "null"
        site:
          $ref: "#/components/schemas/Site"
        revitCentralGuid:
          type: string
          nullable: true
        revitDocumentPath:
          type: string
          nullable: true
        applicantFirm:
          type: string
          nullable: true
          description: |
            Free-text applicant firm (architect / designer of record)
            recorded against the engagement. Surfaced to reviewers in
            the Plan Review Inbox row (Task #439). Null when no firm
            has been recorded yet.
      required:
        - id
        - name
        - jurisdiction
        - address
        - status
        - createdAt
        - updatedAt
        - snapshotCount
        - latestSnapshot
        - site
        - revitCentralGuid
        - revitDocumentPath
        - applicantFirm

    EngagementDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        jurisdiction:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/EngagementStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        snapshotCount:
          type: integer
        latestSnapshot:
          oneOf:
            - $ref: "#/components/schemas/SnapshotSummary"
            - type: "null"
        snapshots:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotSummary"
        site:
          $ref: "#/components/schemas/Site"
        warnings:
          type: array
          items:
            type: string
        revitCentralGuid:
          type: string
          nullable: true
        revitDocumentPath:
          type: string
          nullable: true
        applicantFirm:
          type: string
          nullable: true
          description: |
            Free-text applicant firm (architect / designer of record)
            recorded against the engagement. Surfaced to reviewers in
            the Plan Review Inbox row (Task #439). Null when no firm
            has been recorded yet.
      required:
        - id
        - name
        - jurisdiction
        - address
        - status
        - createdAt
        - updatedAt
        - snapshotCount
        - latestSnapshot
        - snapshots
        - site
        - revitCentralGuid
        - revitDocumentPath
        - applicantFirm


    SnapshotSummary:
      type: object
      properties:
        id:
          type: string
        engagementId:
          type: string
        engagementName:
          type: string
        projectName:
          type: string
        sheetCount:
          type: integer
          nullable: true
        roomCount:
          type: integer
          nullable: true
        levelCount:
          type: integer
          nullable: true
        wallCount:
          type: integer
          nullable: true
        receivedAt:
          type: string
          format: date-time
      required:
        - id
        - engagementId
        - engagementName
        - projectName
        - sheetCount
        - roomCount
        - levelCount
        - wallCount
        - receivedAt

    CreateEngagementSubmissionBody:
      type: object
      description: |
        Request body for `POST /engagements/{id}/submissions`. The
        submission flow is currently a forward-ref child in the
        engagement atom's composition (no dedicated submissions table
        yet), so the body is intentionally narrow: an optional free-text
        `note` that lands in the `engagement.submitted` event payload.
        When the catalog atom and table land this schema can grow
        additional fields (package label, attached document refs, etc.)
        without breaking existing callers.
      properties:
        note:
          type: string
          maxLength: 2048
          description: |
            Optional free-text note about the submission (e.g. "Permit
            set v1, all sheets cleaned."). Capped at 2 KB to keep the
            event payload bounded — notes longer than 2048 chars are
            rejected with a 400 (the server does not silently truncate).
            An empty or whitespace-only string is coerced to null on
            the emitted event.

    SubmissionReceipt:
      type: object
      description: |
        Server response for a recorded plan-review submission. Today the
        `submissionId` is generated by the route handler (no submissions
        table yet); when the table lands it becomes the inserted row's
        id without changing the response shape.
      properties:
        submissionId:
          type: string
        engagementId:
          type: string
        submittedAt:
          type: string
          format: date-time
      required:
        - submissionId
        - engagementId
        - submittedAt

    EngagementSubmissionSummary:
      type: object
      description: |
        One past plan-review submission for an engagement, as returned
        by `GET /engagements/{id}/submissions`. The `jurisdiction`
        label is the denormalized snapshot captured at submission time
        (so a later jurisdiction change on the parent engagement does
        not retroactively rewrite the audit trail). `note` is the
        optional free-text note from the submission body, surfaced
        verbatim (capped to 2 KB by the create route's contract).

        `status`, `reviewerComment`, and `respondedAt` reflect the
        jurisdiction's recorded reply. `status` is always present and
        defaults to `pending` until a reviewer records a response via
        `POST /engagements/{id}/submissions/{submissionId}/response`,
        at which point `respondedAt` is set and `reviewerComment` may
        be populated. The fields stay null while the submission is
        still pending so consumers can drive a "no response yet" UI
        off `status === "pending"` without a presence check.
      properties:
        id:
          type: string
        submittedAt:
          type: string
          format: date-time
        jurisdiction:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/SubmissionStatus"
        reviewerComment:
          type: string
          nullable: true
        respondedAt:
          type: string
          format: date-time
          nullable: true
        responseRecordedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Wall-clock timestamp the server stamped when the response
            row was committed. Distinct from `respondedAt` so consumers
            can distinguish a backfilled reply (where `respondedAt`
            reflects when the jurisdiction actually replied) from a
            live one (where the two timestamps are essentially equal).
            Null while the submission is still pending; set to the
            server clock on every response update.
      required:
        - id
        - submittedAt
        - jurisdiction
        - note
        - status
        - reviewerComment
        - respondedAt
        - responseRecordedAt

    SubmissionStatus:
      type: string
      description: |
        Canonical jurisdiction-response status for a submission.
        `pending` is the default at insert (no response recorded yet);
        the other three are review outcomes the response route may
        transition the row into.
      enum:
        - pending
        - approved
        - corrections_requested
        - rejected

    ReviewerQueueItem:
      type: object
      description: |
        One submission row in the cross-engagement reviewer Inbox
        (`GET /reviewer/queue`). Joins the row to its parent
        engagement so the Inbox can render a row per submission
        without a follow-up `GET /engagements/{id}` per row.

        `engagementName` is denormalized off the engagement at
        read-time (not at submit-time, unlike `jurisdiction` which is
        snapshotted into the submission row by the create route) —
        the Inbox should reflect the current engagement name even if
        the project was renamed after the package was submitted.
        `applicantFirm` is read-through from the engagement's own
        `applicant_firm` column (Task #439). Null when the engagement
        has no recorded firm — legacy engagements that pre-date the
        column or new engagements where the field hasn't been filled
        in yet.
      properties:
        submissionId:
          type: string
        engagementId:
          type: string
        engagementName:
          type: string
        jurisdiction:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        applicantFirm:
          type: string
          nullable: true
        submittedAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/SubmissionStatus"
        note:
          type: string
          nullable: true
        reviewerComment:
          type: string
          nullable: true
      required:
        - submissionId
        - engagementId
        - engagementName
        - jurisdiction
        - address
        - applicantFirm
        - submittedAt
        - status
        - note
        - reviewerComment

    ReviewerQueueCounts:
      type: object
      description: |
        Cross-system roll-up counts the reviewer Inbox renders in its
        KPI strip / header summary line. Computed across the entire
        `submissions` table (NOT just the filtered queue items) so
        the strip stays meaningful regardless of the caller's
        `?status=` filter.

          - `awaitingAi` — submissions in `pending`. The mock surface
            called this "awaiting AI" because the AI reviewer engine
            is the next thing that should fire on a freshly-arrived
            package; the name is preserved here so the FE wording
            stays consistent.
          - `inReview` — submissions in `corrections_requested`.
          - `rejected` — submissions in `rejected`.
          - `backlog` — `awaitingAi + inReview`, i.e. the size of the
            default queue. Surfaced separately so the FE doesn't have
            to repeat the addition.
      properties:
        inReview:
          type: integer
        awaitingAi:
          type: integer
        rejected:
          type: integer
        backlog:
          type: integer
      required:
        - inReview
        - awaitingAi
        - rejected
        - backlog

    ReviewerKpiMetric:
      type: object
      description: |
        One KPI tile in the reviewer Inbox's KPI strip. `value` is
        null when there is not yet enough data to compute the metric
        (e.g. no submissions have been responded to in the trailing
        window); the FE renders the "—" placeholder in that case.
        `trend` / `trendLabel` are null when there is not enough data
        in the prior window to compute a delta — the FE then hides
        the trend chip.

        Concrete shapes per metric:
          - AVG REVIEW TIME — `value` is hours (float). Computed as
            the mean wall-clock gap between `submittedAt` and
            `respondedAt` over submissions whose response landed in
            the trailing 30-day window.
          - AI ACCURACY — `value` is a percentage 0-100. Computed as
            `accepted / (accepted + rejected + overridden)` over
            findings whose reviewer-status changed in the trailing
            30-day window. `promoted-to-architect` is bucketed with
            `accepted` (it's the reviewer agreeing the AI was right).
          - COMPLIANCE RATE — `value` is a percentage 0-100. Computed
            as `approved / (approved + corrections_requested +
            rejected)` over submissions whose response landed in the
            trailing 30-day window.

        Trend direction compares the current 30-day window against
        the prior 30-day window (i.e. days 31-60 ago). For AVG
        REVIEW TIME, "down" is the favorable direction (faster
        turn-around); for AI ACCURACY and COMPLIANCE RATE, "up" is
        favorable. The route does not encode "favorable" — it just
        reports whether the value moved up or down — so the FE can
        choose how to color the chip.
      properties:
        value:
          type: number
          nullable: true
        trend:
          type: string
          enum: [up, down]
          nullable: true
        trendLabel:
          type: string
          nullable: true
      required:
        - value
        - trend
        - trendLabel

    ReviewerQueueKpis:
      type: object
      description: |
        KPI tiles rendered above the reviewer Inbox queue. Computed
        across the full submissions / findings tables (NOT scoped to
        the caller's `?status=` filter) over a trailing 30-day window
        so the strip stays meaningful regardless of how the caller
        narrowed the queue.
      properties:
        avgReviewTime:
          $ref: "#/components/schemas/ReviewerKpiMetric"
        aiAccuracy:
          $ref: "#/components/schemas/ReviewerKpiMetric"
        complianceRate:
          $ref: "#/components/schemas/ReviewerKpiMetric"
      required:
        - avgReviewTime
        - aiAccuracy
        - complianceRate

    ReviewerQueueResponse:
      type: object
      description: |
        Response payload of `GET /reviewer/queue`. The `items` array
        is the filtered queue (newest-first); the `counts` object is
        a cross-system roll-up (NOT scoped to the filter) so the
        Inbox's KPI strip can render off the same response. `kpis`
        carries the trailing-window KPI metrics (avg review time, AI
        accuracy, compliance rate) the strip renders alongside the
        backlog count.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReviewerQueueItem"
        counts:
          $ref: "#/components/schemas/ReviewerQueueCounts"
        kpis:
          $ref: "#/components/schemas/ReviewerQueueKpis"
      required:
        - items
        - counts
        - kpis

    BriefingSourceKind:
      type: string
      description: |
        Producer flavor for a `briefing_sources` row. `manual-upload` is
        the DA-PI-1B sprint's manual-QGIS upload path; `federal-adapter`
        ships in DA-PI-2 when the federal-data adapters write into the
        same table; `state-adapter` and `local-adapter` (DA-PI-4) tag
        rows produced by the state-tier (UGRC / INSIDE Idaho / TCEQ)
        and local-tier (county GIS) adapters respectively. All four
        share the supersession contract so a consumer renders any kind
        without a producer-specific code path; the discriminator is
        purely informational and powers UI tier-grouping in the Site
        Context tab (federal / state / local).
      enum:
        - manual-upload
        - federal-adapter
        - state-adapter
        - local-adapter

    BriefingSourceConversionStatus:
      type: string
      description: |
        Lifecycle marker for the DXF→glb conversion pipeline (DA-MV-1).
        `pending` (queued / never attempted), `converting` (request in
        flight to the converter service), `ready` (glb available — the
        viewer can fetch bytes), `failed` (converter rejected — the UI
        surfaces a retry action), `dxf-only` (DXF stored but no
        conversion attempted, e.g. a legacy/imported row). Only set on
        the DXF branch — QGIS uploads and federal-adapter rows leave
        this field null.
      enum:
        - pending
        - converting
        - ready
        - failed
        - dxf-only

    BriefingSourceUploadKind:
      type: string
      description: |
        Discriminator for the upload modality on
        `POST /engagements/{id}/briefing/sources`. `qgis` (default)
        keeps the DA-PI-1B 2D overlay path; `dxf` selects the DA-MV-1
        DXF→glb conversion branch — the bytes are stored as the
        original DXF and the converter service is invoked synchronously
        before the row is committed.
      enum:
        - qgis
        - dxf

    LocalSetbackDistrict:
      type: object
      description: |
        One row of a per-jurisdiction setback table — front/rear/side/
        height/coverage in feet/percent for one zoning district.
        Schema mirrors `lib/adapters/src/local/setbacks/index.ts`'s
        `SetbackDistrict` so the FE can decode without depending on
        the adapters lib.
      properties:
        district_name:
          type: string
        front_ft:
          type: number
        rear_ft:
          type: number
        side_ft:
          type: number
        side_corner_ft:
          type: number
        max_height_ft:
          type: number
        max_lot_coverage_pct:
          type: number
        max_impervious_pct:
          type: number
        citation_url:
          type: string
      required:
        - district_name
        - front_ft
        - rear_ft
        - side_ft
        - side_corner_ft
        - max_height_ft
        - max_lot_coverage_pct
        - max_impervious_pct
        - citation_url

    LocalSetbackTable:
      type: object
      description: |
        Per-jurisdiction setback lookup served by
        `GET /local/setbacks/{jurisdictionKey}`. The `districts` array
        is the list the FE matches against the adapter's reported
        zoning district (case-insensitive on `district_name`).
      properties:
        jurisdictionKey:
          type: string
        jurisdictionDisplayName:
          type: string
        note:
          type: string
          nullable: true
          description: |
            Optional context note for fallback / statewide-default
            tables (e.g. "applies to unincorporated parcels only").
        districts:
          type: array
          items:
            $ref: "#/components/schemas/LocalSetbackDistrict"
      required:
        - jurisdictionKey
        - jurisdictionDisplayName
        - districts

    EngagementBriefingSource:
      type: object
      description: |
        One current (non-superseded) source attached to an engagement's
        parcel briefing. The `upload*` fields are populated only on
        `manual-upload` rows and describe the file the architect picked.
        `payload` is the structured data the producer wrote — for an
        adapter row it is the adapter's `AdapterResult.payload` (e.g.
        `{ kind: "zoning", zoning: { attributes: { ZONING: "RR-1" } } }`),
        for a manual upload it is `{}` until the briefing engine starts
        attaching its own metadata. The Site Context tab's "View layer
        details" expander reads from this field, so producers must keep
        the shape stable rather than substitute placeholders.
      properties:
        id:
          type: string
        layerKind:
          type: string
        sourceKind:
          $ref: "#/components/schemas/BriefingSourceKind"
        provider:
          type: string
          nullable: true
        snapshotDate:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
          description: |
            Structured producer payload — adapter rows write the raw
            `AdapterResult.payload` (a `{ kind, ... }` object whose
            shape depends on the adapter); manual-upload rows default
            to `{}`. Treat as opaque JSON on the wire — consumers
            (e.g. the Site Context "view layer details" expander)
            switch on `payload.kind` to decide how to render.
        uploadObjectPath:
          type: string
          nullable: true
        uploadOriginalFilename:
          type: string
          nullable: true
        uploadContentType:
          type: string
          nullable: true
        uploadByteSize:
          type: integer
          nullable: true
        dxfObjectPath:
          type: string
          nullable: true
          description: |
            DA-MV-1 — canonical `/objects/<id>` pointer of the original
            DXF when the row took the DXF→glb branch. Mirrors
            `uploadObjectPath` for the DXF case; null on the QGIS branch
            and on adapter rows. The viewer never reads this directly —
            it is the input the converter retry route re-runs against.
        glbObjectPath:
          type: string
          nullable: true
          description: |
            DA-MV-1 — canonical `/objects/<id>` pointer of the converted
            glb when conversion has succeeded (`conversionStatus =
            ready`). The viewer fetches the bytes via
            `GET /briefing-sources/{id}/glb` rather than this path
            directly so the response can carry the right
            `Content-Type` + caching headers.
        conversionStatus:
          allOf:
            - $ref: "#/components/schemas/BriefingSourceConversionStatus"
          nullable: true
          description: |
            DA-MV-1 — DXF→glb conversion lifecycle marker. Null on QGIS
            and adapter rows; populated on the DXF branch.
        conversionError:
          type: string
          nullable: true
          description: |
            DA-MV-1 — short human-readable error blurb stamped when
            conversion fails. Surfaced verbatim in the per-source
            status pill so the architect can decide whether to retry
            or re-export the DXF. Null on success and on non-DXF rows.
        supersededAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Stamped when the row is no longer the current source for its
            `(briefing_id, layer_kind)` slot — null while the row is
            current. Surfaced on the wire so the history view can
            distinguish current from superseded entries without an
            extra round-trip.
        supersededById:
          type: string
          nullable: true
          description: |
            Pointer to the briefing-source row that superseded this one,
            or null when this row is still current. Lets the UI
            reconstruct the per-layer chain (`prior → current`) without
            asking the server.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - layerKind
        - sourceKind
        - provider
        - snapshotDate
        - note
        - payload
        - uploadObjectPath
        - uploadOriginalFilename
        - uploadContentType
        - uploadByteSize
        - dxfObjectPath
        - glbObjectPath
        - conversionStatus
        - conversionError
        - supersededAt
        - supersededById
        - createdAt

    EngagementBriefing:
      type: object
      description: |
        The engagement's parcel briefing row plus its current sources
        and (when generated) the seven-section A–G narrative.
      properties:
        id:
          type: string
        engagementId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        sources:
          type: array
          items:
            $ref: "#/components/schemas/EngagementBriefingSource"
        narrative:
          allOf:
            - $ref: "#/components/schemas/EngagementBriefingNarrative"
          nullable: true
          description: |
            The latest generated A–G narrative for this engagement.
            `null` when the engine has never run on this row (the
            briefing exists but no `POST /briefing/generate` call has
            populated `section_a..g` yet).
      required:
        - id
        - engagementId
        - createdAt
        - updatedAt
        - sources
        - narrative

    EngagementBriefingNarrative:
      type: object
      description: |
        The seven-section A–G briefing produced by the briefing engine
        (Spec 51 §2). Each section is independently nullable so a
        partial rewrite (e.g. one section regenerated by a future
        per-section endpoint) can leave the others intact. In the
        DA-PI-3 baseline the engine writes all seven on every call
        and `generatedAt` / `generatedBy` are stamped together.
      properties:
        sectionA:
          type: string
          nullable: true
          description: A — Executive Summary (no citations).
        sectionB:
          type: string
          nullable: true
          description: B — Threshold Issues (heavy, citation-heavy).
        sectionC:
          type: string
          nullable: true
          description: C — Regulatory Gates (tight, citation-heavy).
        sectionD:
          type: string
          nullable: true
          description: D — Site Infrastructure (tight, citation-heavy).
        sectionE:
          type: string
          nullable: true
          description: E — Buildable Envelope (heavy, citation-heavy).
        sectionF:
          type: string
          nullable: true
          description: F — Neighboring Context (heavy, citation-heavy).
        sectionG:
          type: string
          nullable: true
          description: G — Next-Step Checklist (no citations).
        generatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            UTC timestamp of the most recent successful generation.
            Null on briefings that have never been generated.
        generatedBy:
          type: string
          nullable: true
          description: |
            Actor identity that triggered the generation — a user
            uuid for architect-initiated runs, `system:briefing-engine`
            for unattended runs.
        generationId:
          type: string
          nullable: true
          description: |
            Task #281 — id of the `briefing_generation_jobs` row that
            produced the current `section_a..g` body. Stamped inside
            the same transaction that overwrites the section columns
            so the UI can match the on-screen narrative to its
            producing run by id rather than inferring it from a
            timestamp window. Null on briefings that have never been
            generated (the engine has not run on this row), on legacy
            rows that pre-date this column and have not yet been
            backfilled, and on rows whose producing job has been
            pruned out of the sweep's keep window (the FK is
            `ON DELETE SET NULL`). The UI uses null to honestly
            render "no producing run on file" instead of mislabelling
            an unrelated row "Current".
      required:
        - sectionA
        - sectionB
        - sectionC
        - sectionD
        - sectionE
        - sectionF
        - sectionG
        - generatedAt
        - generatedBy
        - generationId

    GenerateBriefingBody:
      type: object
      description: |
        Optional body for `POST /engagements/{id}/briefing/generate`.
        Fields are forward-looking — the DA-PI-3 baseline ignores them
        and always runs a fresh full-A–G synthesis. The schema is
        documented here so callers can adopt the wire shape today and
        the engine can grow into per-section regeneration without a
        breaking change.
      properties:
        regenerate:
          type: boolean
          description: |
            When true, signals an explicit redo (the route persists the
            existing narrative into the `prior_section_*` backup
            columns before overwriting). The route auto-detects this
            from the persisted state today, so the flag is currently
            informational.

    GenerateBriefingResponse:
      type: object
      description: |
        202 envelope returned by `POST /engagements/{id}/briefing/generate`.
        The job is identified by `generationId` for the duration of the
        process; clients should poll `/briefing/status` until `state`
        reaches a terminal value, then re-fetch `GET /briefing` to read
        the persisted narrative.
      properties:
        generationId:
          type: string
          description: Opaque id for this generation job.
        state:
          type: string
          enum: [pending, completed, failed]
          description: Initial state — almost always `pending` on the 202.
      required:
        - generationId
        - state

    BriefingGenerationStatusResponse:
      type: object
      description: |
        Wire envelope for `GET /engagements/{id}/briefing/status`. Job
        state is process-local and best-effort; the persisted briefing
        narrative on `GET /briefing` is the source of truth.
      properties:
        generationId:
          type: string
          nullable: true
          description: |
            Id of the most recent generation tracked in this process.
            Null when no generation has run on this process for this
            engagement.
        state:
          type: string
          enum: [idle, pending, completed, failed]
          description: |
            `idle` when the process has no record of a generation;
            `pending` while the engine is running; `completed` after
            the row's `section_a..g` columns were written; `failed`
            when the engine errored.
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
          description: Short, human-readable error reason on `failed`.
        invalidCitationCount:
          type: integer
          nullable: true
          description: |
            On `completed`, the number of citation tokens the engine
            stripped because they pointed at unknown ids. A non-zero
            value is a model-quality regression and is logged
            server-side.
        invalidCitations:
          type: array
          nullable: true
          items:
            type: string
          description: |
            On `completed`, the exact citation token strings the engine
            stripped because they pointed at unknown ids. Used by the
            UI's invalid-citation warning to render each stripped
            token as a "broken" pill (Spec 51 traceability) so the
            architect can see which sources were referenced but no
            longer exist. Mirrors `invalidCitationCount` — the count
            equals the array length when both are present.
      required:
        - generationId
        - state
        - startedAt
        - completedAt
        - error
        - invalidCitationCount
        - invalidCitations

    BriefingGenerationRun:
      type: object
      description: |
        One historical briefing-generation attempt for an engagement.
        Mirrors the column subset auditors need on the "Recent runs"
        disclosure (no full narrative — that lives on the briefing
        row itself). Same field shapes as `BriefingGenerationStatusResponse`
        for the corresponding fields, just packaged for list iteration.
      properties:
        generationId:
          type: string
          description: |
            The job row's id. Doubles as the public `generationId`
            returned by `POST /briefing/generate`, so a stale poll
            with the old id can still be matched against this list.
        state:
          type: string
          enum: [pending, completed, failed]
          description: |
            `pending` while the engine is in flight; `completed` after
            the row's `section_a..g` columns were written; `failed`
            when the engine errored. Note: unlike
            `BriefingGenerationStatusResponse`, `idle` is not in the
            enum — `idle` represents the absence of a row, which the
            list represents by omission.
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Null while the job is still pending.
        error:
          type: string
          nullable: true
          description: Short, human-readable error reason on `failed`.
        invalidCitationCount:
          type: integer
          nullable: true
          description: |
            Number of citation tokens stripped because they pointed at
            unknown ids. A non-zero value is a model-quality
            regression auditors specifically want to spot when
            comparing recent runs. Null while pending.
      required:
        - generationId
        - state
        - startedAt
        - completedAt
        - error
        - invalidCitationCount

    BriefingGenerationRunsResponse:
      type: object
      description: |
        Wire envelope for `GET /engagements/{id}/briefing/runs`.
        `runs` is the most recent attempts (newest first), capped by
        the sweep's per-engagement keep value so what the API
        surfaces and what the sweep keeps cannot drift.

        `priorNarrative` is the section_a..g + generatedAt/generatedBy
        snapshot the briefing held *before* its current narrative was
        written — i.e. the contents of the `prior_section_*` /
        `prior_generated_at` backup columns on `parcel_briefings`,
        which the regeneration transaction populates atomically with
        the new narrative. The auditor uses this to read the prior
        body inline (in the Recent runs disclosure) so the side-by-
        side comparison with what is currently on screen does not
        require remembering or screenshotting the previous wording.
        Null when the briefing has never been regenerated (the first
        generation has no prior) or when no briefing row exists yet
        for the engagement. There is at most one prior narrative on
        the wire because only one set of backup columns is retained
        — the row whose [startedAt, completedAt] interval contains
        `priorNarrative.generatedAt` is the run that produced it;
        all other (older) rows' backups have already been overwritten
        and so cannot be surfaced from this envelope.
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/BriefingGenerationRun"
        priorNarrative:
          allOf:
            - $ref: "#/components/schemas/EngagementBriefingNarrative"
          nullable: true
          description: |
            Snapshot of the section_a..g body held by the briefing
            before its current narrative was written. Reuses the
            `EngagementBriefingNarrative` shape since the prior_*
            columns mirror the current ones one-for-one; the
            `generatedAt` field carries the *prior* generation's
            timestamp so the FE can match it against the run that
            produced it.
      required:
        - runs
        - priorNarrative

    EngagementBriefingResponse:
      type: object
      description: |
        Wire envelope for the briefing read/write routes. `briefing` is
        `null` when no briefing has been created yet for the engagement
        — the first call to `POST /engagements/{id}/briefing/sources`
        is what creates it. The envelope exists because OpenAPI 3.0's
        `nullable` modifier on a `$ref` to an object schema does not
        generate a clean `T | null` in our codegen toolchain.
      properties:
        briefing:
          allOf:
            - $ref: "#/components/schemas/EngagementBriefing"
          nullable: true
      required:
        - briefing

    GenerateLayersOutcome:
      type: object
      description: |
        Per-adapter outcome for one `POST /engagements/{id}/generate-layers`
        invocation. `status=ok` means the adapter ran and a row was
        persisted (the row is included in `briefing.sources`); `status=
        no-coverage` means the adapter ran (or was skipped because its
        jurisdiction gate did not match) and there is nothing to
        persist; `status=failed` means the adapter ran and threw — the
        `error` discriminates the reason so the UI can render an
        actionable message.
      properties:
        adapterKey:
          type: string
          description: |
            Stable adapter identifier in `<jurisdiction>:<source>` form
            (e.g. `bastrop-tx:floodplain`, `ugrc:parcels`). Same value
            the persisted row carries in `provider`.
        tier:
          type: string
          enum: [federal, state, local]
        sourceKind:
          $ref: "#/components/schemas/BriefingSourceKind"
        layerKind:
          type: string
        status:
          type: string
          enum: [ok, no-coverage, failed]
        error:
          type: object
          nullable: true
          description: Set only when `status=failed` (or `no-coverage`).
          properties:
            code:
              type: string
              enum:
                - no-coverage
                - timeout
                - network-error
                - upstream-error
                - parse-error
                - unknown
            message:
              type: string
          required: [code, message]
        sourceId:
          type: string
          nullable: true
          description: |
            The id of the persisted `briefing_sources` row, set only on
            `status=ok` outcomes. The row itself is also embedded in
            `briefing.sources` on the same response so clients usually
            don't need to follow up.
        fromCache:
          type: boolean
          default: false
          description: |
            Task #204 — `true` when the runner replayed a cached
            AdapterResult instead of re-fetching live from the upstream
            feed. Always `false` for non-`ok` outcomes and for live
            runs. The Site Context tab uses this (with `cachedAt`) to
            render a "cached <n>h ago" pill so an architect knows
            when to consider a "Force refresh".
        cachedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Task #204 — ISO8601 timestamp of when the cached row was
            written (i.e. when the underlying upstream lookup actually
            ran). Always `null` when `fromCache` is `false`.
        upstreamFreshness:
          type: object
          nullable: true
          description: |
            Task #227 — verdict from the adapter's optional
            `getUpstreamFreshness()` hook, populated only on
            `fromCache=true` outcomes whose adapter implements the
            hook (today: FEMA NFHL). `null` for live runs, for cache
            hits whose adapter doesn't implement the hook, and for
            non-`ok` outcomes. The Site Context tab uses the verdict
            to flip the existing "cached <n>h ago" pill to a "cache
            may be stale" warning variant when the upstream feed has
            published a newer revision since the cache was written.
          properties:
            status:
              type: string
              enum: [fresh, stale, unknown]
              description: |
                `fresh` — upstream confirms the cached snapshot is
                still current. `stale` — upstream has published a
                newer revision; force-refresh recommended. `unknown`
                — the freshness check itself failed (network blip,
                metadata missing, malformed response); UI surfaces it
                as a soft hint without escalating to a warning.
            reason:
              type: string
              nullable: true
              description: |
                Short human-readable phrase the FE folds into the
                pill's tooltip, e.g. "FEMA published a NFHL revision
                at <iso> after this cache row was written". Optional
                — implementations may omit it.
          required: [status]
      required: [adapterKey, tier, sourceKind, layerKind, status, fromCache, cachedAt]

    GenerateLayersResponse:
      type: object
      description: |
        Wire envelope for `POST /engagements/{id}/generate-layers`.
        Carries the post-run briefing (with the freshly-persisted rows
        already in `sources`) plus a per-adapter `outcomes` array so
        the UI can render success / failure state alongside the data.
      properties:
        briefing:
          allOf:
            - $ref: "#/components/schemas/EngagementBriefing"
          nullable: true
        outcomes:
          type: array
          items:
            $ref: "#/components/schemas/GenerateLayersOutcome"
      required: [briefing, outcomes]

    EngagementBriefingSourcesResponse:
      type: object
      description: |
        Wire envelope for `GET /engagements/{id}/briefing/sources`. The
        list is scoped to one `layerKind` and ordered newest-first by
        `createdAt`. When the engagement has no briefing yet (no
        upload has happened) `sources` is an empty array, never null.
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/EngagementBriefingSource"
      required:
        - sources

    CreateBriefingSourceBody:
      type: object
      description: |
        Request body for `POST /engagements/{id}/briefing/sources`. The
        bytes are uploaded to object storage out-of-band via the
        presigned-URL flow; this body only carries the metadata + the
        canonical `/objects/...` path the bytes landed at. `layerKind`
        is the supersession key — a second upload with the same value
        marks the prior row superseded.
      properties:
        layerKind:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            Slug identifying the overlay layer (e.g. `qgis-zoning`,
            `qgis-parcel`). Free-form text rather than a closed enum so
            new layer kinds can land without a schema change.
        provider:
          type: string
          maxLength: 256
          nullable: true
          description: Optional human-readable provider label.
        snapshotDate:
          type: string
          format: date-time
          nullable: true
          description: |
            Effective date for the data. Defaults to the server's clock
            at insert time when omitted or null.
        note:
          type: string
          maxLength: 2048
          nullable: true
          description: |
            Optional free-text note. Empty / whitespace-only strings are
            coerced to null on the row.
        upload:
          type: object
          description: Metadata for the file uploaded out-of-band to object storage.
          properties:
            kind:
              allOf:
                - $ref: "#/components/schemas/BriefingSourceUploadKind"
              description: |
                Selects the upload modality. Defaults to `qgis` so the
                pre-DA-MV-1 callers (which never sent this field) keep
                working unchanged. `dxf` selects the DXF→glb conversion
                branch — the route stores the bytes as the original
                DXF, calls the converter service, and stamps
                `conversionStatus` on the row.
            objectPath:
              type: string
              minLength: 1
              description: |
                Canonical `/objects/<id>` path returned by `POST
                /storage/uploads/request-url` and persisted on the row.
            originalFilename:
              type: string
              minLength: 1
              maxLength: 256
            contentType:
              type: string
              minLength: 1
              maxLength: 128
            byteSize:
              type: integer
              minimum: 0
          required:
            - objectPath
            - originalFilename
            - contentType
            - byteSize
      required:
        - layerKind
        - upload

    RecordSubmissionResponseBody:
      type: object
      description: |
        Request body for `POST /engagements/{id}/submissions/{submissionId}/response`.
        `status` is the new review state the jurisdiction has assigned;
        `pending` is intentionally not a valid response value (it is the
        starting state, not an outcome). `reviewerComment` is an optional
        free-text note from the reviewer (e.g. correction requests,
        approval conditions); empty / whitespace-only strings are
        coerced to null. `respondedAt` is optional and defaults to the
        server's clock at the moment the response is recorded — callers
        only need to supply it when backfilling a historical reply.
      properties:
        status:
          type: string
          enum:
            - approved
            - corrections_requested
            - rejected
          description: Jurisdiction's review outcome for the submission.
        reviewerComment:
          type: string
          maxLength: 4096
          description: |
            Optional free-text note from the reviewer. Capped at 4 KB
            so the event payload stays bounded. Empty / whitespace-only
            values are coerced to null on the stored row and event.
        respondedAt:
          type: string
          format: date-time
          description: |
            Optional explicit response timestamp. Defaults to the
            server clock when omitted; supply when backfilling a
            historical jurisdiction reply. Must not be later than the
            server clock at request time — future-dated values are
            rejected with a 400 (the in-browser dialog mirrors this).
      required:
        - status

    SubmissionResponse:
      type: object
      description: |
        Submission row reflecting the jurisdiction's recorded response.
        Returned by the response route so callers don't need a
        follow-up GET to see the new state. `respondedAt` is null
        only when the row is still pending (the response route always
        sets it, but the type allows null for the pre-response state
        in case a future GET shares this shape).
      properties:
        id:
          type: string
        engagementId:
          type: string
        status:
          $ref: "#/components/schemas/SubmissionStatus"
        reviewerComment:
          type: string
          nullable: true
        respondedAt:
          type: string
          format: date-time
          nullable: true
        responseRecordedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Wall-clock timestamp the server stamped when this response
            update was committed. Always non-null on the route's own
            return value (the response route stamps it on every call);
            kept nullable to mirror the `EngagementSubmissionSummary`
            shape used by the list endpoint, where rows still in the
            pending state never set the field.
        submittedAt:
          type: string
          format: date-time
      required:
        - id
        - engagementId
        - status
        - reviewerComment
        - respondedAt
        - responseRecordedAt
        - submittedAt

    SnapshotPayload:
      description: |
        A04.7 — discriminated union. Either bind to an existing engagement by
        id (typically returned by /engagements/match action="auto-bind" or
        chosen from action="choose"), or explicitly request a new engagement
