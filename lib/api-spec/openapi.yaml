openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SmartCity OS Design Tools API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: engagements
    description: Engagement (project) operations
  - name: snapshots
    description: Revit model snapshot operations
  - name: chat
    description: Claude chat about an engagement
  - name: codes
    description: Atom-anchored municipal/building code knowledge
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /engagements:
    get:
      operationId: listEngagements
      tags: [engagements]
      summary: List engagements
      description: Returns all engagements ordered by updatedAt desc.
      responses:
        "200":
          description: Array of engagement summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EngagementSummary"

  /engagements/match:
    post:
      operationId: matchEngagement
      tags: [engagements]
      summary: Resolve a Revit file to an engagement (or signal create-new)
      description: |
        Called by the Revit add-in BEFORE uploading a snapshot, to decide which
        engagement (if any) the file belongs to. Auth: requires the same
        `x-snapshot-secret` header as POST /snapshots.

        Precedence (first hit wins):
          1. `revitCentralGuid` exact match → action="auto-bind".
          2. `revitDocumentPath` exact match → action="auto-bind".
          3. case-insensitive `projectName` collision → action="choose" with
             up to 10 candidates (newest first). The add-in MUST surface a
             dropdown in this case, regardless of GUID presence.
          4. nothing matched → action="create-new".

        Note: even when a GUID is supplied, a name collision still returns
        "choose" if neither GUID nor path matched — the user makes the final
        call. GUID is sticky on rebind: an engagement's stored GUID is never
        overwritten by a later snapshot from a different file.
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchEngagementBody"
      responses:
        "200":
          description: Match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchEngagementResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}:
    get:
      operationId: getEngagement
      tags: [engagements]
      summary: Get engagement detail with snapshot list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement detail (snapshots without payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEngagement
      tags: [engagements]
      summary: Update engagement details (intake / edit modal)
      description: |
        Partial update. Only fields present in the request body are changed.
        If `address` is included and differs from the current value, the
        server will geocode the new address synchronously (best-effort).
        On geocoding failure, the address is still saved but a warning is
        included in the response.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                jurisdiction:
                  type: string
                status:
                  $ref: "#/components/schemas/EngagementStatus"
                projectType:
                  $ref: "#/components/schemas/ProjectType"
                zoningCode:
                  type: string
                lotAreaSqft:
                  type: number
                  nullable: true
      responses:
        "200":
          description: Updated engagement detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/geocode:
    post:
      operationId: regeocodeEngagement
      tags: [engagements]
      summary: Re-run geocoding using the engagement's current address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement detail (possibly with warnings)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "400":
          description: Engagement has no address to geocode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots:
    get:
      operationId: listSnapshots
      tags: [snapshots]
      summary: List Revit snapshots across all engagements
      description: Returns all snapshots, newest first, joined with engagementName.
      responses:
        "200":
          description: Array of snapshot summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnapshotSummary"
    post:
      operationId: createSnapshot
      tags: [snapshots]
      summary: Receive a Revit snapshot from the add-in
      description: |
        Stores a snapshot from the Revit add-in. Requires the `x-snapshot-secret`
        header to match the configured `SNAPSHOT_SECRET` env var. If `projectName`
        matches an existing engagement (case-insensitive), the snapshot attaches
        to it. Otherwise a new engagement is auto-created.
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotPayload"
      responses:
        "201":
          description: Snapshot accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotReceipt"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}:
    get:
      operationId: getSnapshot
      tags: [snapshots]
      summary: Get the full snapshot record (with payload)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}/sheets:
    get:
      operationId: getSnapshotSheets
      tags: [snapshots]
      summary: List sheets uploaded for a snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of sheet summaries (no PNG bytes)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SheetSummary"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: uploadSnapshotSheets
      tags: [snapshots]
      summary: Upload sheets (multipart) for a snapshot
      description: |
        Multipart upload from the Revit add-in. Body must include a `metadata`
        text field containing JSON-encoded SheetMetadata[] plus per-sheet
        `sheet_{i}_thumb` and `sheet_{i}_full` PNG file fields. Idempotent on
        (snapshotId, sheetNumber) — re-uploading replaces existing rows.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                metadata:
                  type: string
                  description: JSON-encoded array of SheetMetadata
              required:
                - metadata
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetUploadResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: Wrong content-type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}/sheet-history:
    get:
      operationId: getSnapshotSheetHistory
      tags: [snapshots]
      summary: Recent atom_events for every sheet in a snapshot, in one batch
      description: |
        Batch variant of `GET /atoms/sheet/{id}/history` that returns the
        most-recent events for every sheet attached to a single snapshot
        in one round trip. Backed by a single SQL query (window function
        over `atom_events`), so the page-render cost is O(1) requests
        regardless of sheet count — the per-card endpoint stays as the
        single-sheet path.

        The `limit` query parameter caps the per-sheet page size (default
        5, max 50). Sheets with no recorded events appear as an empty
        `events` array so callers can render a stable shape without
        a second lookup. 404s when the snapshot id does not resolve.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max events per sheet (default 5, max 50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Per-sheet recent history, newest first per sheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotSheetHistoryResponse"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: History read failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sheets/{id}/thumbnail.png:
    get:
      operationId: getSheetThumbnail
      tags: [snapshots]
      summary: Sheet thumbnail PNG (512px)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PNG image
          content:
            image/png: {}
        "404":
          description: Sheet not found

  /sheets/{id}/full.png:
    get:
      operationId: getSheetFull
      tags: [snapshots]
      summary: Sheet full-resolution PNG (~2048px)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PNG image
          content:
            image/png: {}
        "404":
          description: Sheet not found

  /codes/jurisdictions:
    get:
      operationId: listCodeJurisdictions
      tags: [codes]
      summary: List configured code jurisdictions and their atom counts
      responses:
        "200":
          description: Array of jurisdiction summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JurisdictionSummary"

  /codes/jurisdictions/{key}/atoms:
    get:
      operationId: listJurisdictionAtoms
      tags: [codes]
      summary: List atoms for a jurisdiction (paginated, newest first)
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: codeBook
          in: query
          required: false
          description: Optional filter — restrict to a single code book.
          schema:
            type: string
        - name: edition
          in: query
          required: false
          description: Optional filter — restrict to a single edition (use together with codeBook).
          schema:
            type: string
      responses:
        "200":
          description: Atom summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodeAtomSummary"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/atoms:
    get:
      operationId: listCodeAtoms
      tags: [codes]
      summary: List atoms across jurisdictions (operator/debug surface)
      description: |
        Operator-facing global atom list backing the `/dev/atoms` inspector
        page. Distinct from `/codes/jurisdictions/{key}/atoms` (consumer
        surface, scoped to one jurisdiction): exposes filters not present
        in the consumer view (sourceName, embedded vs raw, free-text q)
        and adds offset pagination with a server-computed `total` so the
        UI can render Prev/Next without overfetching.

        Stable order: (fetchedAt DESC, id DESC).
      parameters:
        - name: jurisdictionKey
          in: query
          required: false
          schema:
            type: string
        - name: codeBook
          in: query
          required: false
          schema:
            type: string
        - name: edition
          in: query
          required: false
          schema:
            type: string
        - name: sourceName
          in: query
          required: false
          description: Filter by `code_atom_sources.source_name` (e.g. `grand_county_html`).
          schema:
            type: string
        - name: embedded
          in: query
          required: false
          description: |
            Tri-state. `true` → only embedded atoms; `false` → only raw
            atoms; omitted → no filter. Strings (not JSON booleans) so the
            querystring round-trips cleanly.
          schema:
            type: string
            enum: ["true", "false"]
        - name: q
          in: query
          required: false
          description: |
            Case-insensitive substring match against `sectionNumber` OR
            `sectionTitle`. Trimmed; empty string is treated as no filter.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated atom list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeAtomListResponse"

  /codes/atoms/{id}:
    get:
      operationId: getCodeAtom
      tags: [codes]
      summary: Get a single code atom (full body + provenance)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Atom detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeAtomDetail"
        "404":
          description: Atom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/warmup-status/{key}:
    get:
      operationId: getWarmupStatus
      tags: [codes]
      summary: Live warmup queue state for a jurisdiction
      description: |
        Returns counts of `code_atom_fetch_queue` rows by status for the given
        jurisdiction, a derived `state`, and (when present) the most recent
        failed row's `lastError` text so failures are debuggable from the
        browser without server-log access.

        state derivation:
          - total === 0          → "idle"
          - pending > 0 OR
            processing > 0       → "running"
          - failed > 0 AND
            pending+processing=0 → "failed"
          - otherwise            → "completed"
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current warmup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupStatus"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/warmup/{key}:
    post:
      operationId: warmupJurisdiction
      tags: [codes]
      summary: Trigger discovery + queue drain for a jurisdiction
      description: |
        Idempotent. Inserts new TOC entries into the fetch queue (existing
        entries are skipped) and synchronously drains a small batch so the
        caller can confirm the pipeline is alive. Long-running fetches
        continue in the background queue worker.
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Warmup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupResult"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dev/atoms/retrieve:
    post:
      operationId: retrieveAtomsProbe
      tags: [codes]
      summary: Retrieval probe — preview what /api/chat would inject for a given query
      description: |
        Operator-facing diagnostic backing the `/dev/atoms/probe` page. Runs the
        SAME retrieval module (`retrieveAtomsForQuestion` in `@workspace/codes`)
        that `/api/chat` uses, with the SAME jurisdiction-resolution logic
        (`keyFromEngagement`), and assembles the SAME `<reference_code_atoms>`
        XML block (`formatReferenceCodeAtoms`) that gets sent to Claude. No
        threshold filter is applied server-side — ALL retrieved atoms are
        returned and the UI renders the 0.6 threshold line visually.

        Either `engagementId` (server resolves jurisdiction from the engagement
        address using the same logic chat does) OR `jurisdiction` (a literal
        jurisdiction key like `grand_county_ut`) must be provided — exactly one.

        Header-gated by `x-snapshot-secret` to match the rest of the
        operator-facing surfaces (POST /snapshots, POST /engagements/match).
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrievalProbeBody"
      responses:
        "200":
          description: Retrieval probe result (all atoms returned, threshold UI-side)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalProbeResponse"
        "400":
          description: Missing query or both/neither of engagementId/jurisdiction provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found (engagementId path)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Engagement found but jurisdiction could not be resolved from address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /atoms/{slug}/{id}/summary:
    get:
      operationId: getAtomSummary
      tags: [atoms]
      summary: Resolve an atom's four-layer ContextSummary
      description: |
        Looks up an atom in the process-wide registry by `slug` (its
        `entityType`) and returns the typed `ContextSummary` produced by
        the registration's `contextSummary(id, scope)` callback. The
        `scope` query parameter is optional URL-encoded JSON using the
        compact wire format produced by `httpContextSummary` in
        `@workspace/empressa-atom`; decode failures fall back to the
        default scope rather than 400ing.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: false
          description: URL-encoded JSON scope object (compact form `{a,r,t,p}`).
          schema:
            type: string
      responses:
        "200":
          description: Four-layer context summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomSummary"
        "404":
          description: Atom type not registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: contextSummary callback threw
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /atoms/{slug}/{id}/history:
    get:
      operationId: getAtomHistory
      tags: [atoms]
      summary: Read recent history events for an atom
      description: |
        Returns the most recent atom_events for the given atom, newest first.
        Backed by the same `EventAnchoringService` the registration's
        `contextSummary` reads through for `historyProvenance`, so this
        endpoint complements (does not replace) the four-layer summary —
        callers that only need the latest provenance can keep using
        `getAtomSummary`.

        Requires a registered atom slug (404 otherwise). The `limit`
        query parameter caps the page size (default 5, max 50). Events
        whose entity row has been deleted upstream still surface here:
        atom_events stores `(entity_type, entity_id)` as opaque text and
        is intentionally not FK'd to the entity table.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max events to return (default 5, max 50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Recent events, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryResponse"
        "404":
          description: Atom type not registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: History read failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Ask Claude about an engagement (SSE stream)
      description: |
        Streams an assistant response over Server-Sent Events. Each event
        is `data: {"text": "..."}\n\n` followed by a final `data: [DONE]\n\n`.
        Grounds Claude on the latest snapshot for the given engagement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
        "400":
          description: Invalid request or no snapshots yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    EngagementStatus:
      type: string
      enum: [active, on_hold, archived]

    ProjectType:
      type: string
      enum: [new_build, renovation, addition, tenant_improvement, other]

    Geocode:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        jurisdictionCity:
          type: string
          nullable: true
        jurisdictionState:
          type: string
          nullable: true
        jurisdictionFips:
          type: string
          nullable: true
        source:
          type: string
          enum: [nominatim, manual]
        geocodedAt:
          type: string
          format: date-time
      required:
        - latitude
        - longitude
        - jurisdictionCity
        - jurisdictionState
        - jurisdictionFips
        - source
        - geocodedAt

    Site:
      type: object
      properties:
        address:
          type: string
          nullable: true
        geocode:
          oneOf:
            - $ref: "#/components/schemas/Geocode"
            - type: "null"
        projectType:
          oneOf:
            - $ref: "#/components/schemas/ProjectType"
            - type: "null"
        zoningCode:
          type: string
          nullable: true
