    SnapshotSummary:
      type: object
      properties:
        id:
          type: string
        engagementId:
          type: string
        engagementName:
          type: string
        projectName:
          type: string
        sheetCount:
          type: integer
          nullable: true
        roomCount:
          type: integer
          nullable: true
        levelCount:
          type: integer
          nullable: true
        wallCount:
          type: integer
          nullable: true
        receivedAt:
          type: string
          format: date-time
      required:
        - id
        - engagementId
        - engagementName
        - projectName
        - sheetCount
        - roomCount
        - levelCount
        - wallCount
        - receivedAt

    CreateEngagementSubmissionBody:
      type: object
      description: |
        Request body for `POST /engagements/{id}/submissions`. The
        submission flow is currently a forward-ref child in the
        engagement atom's composition (no dedicated submissions table
        yet), so the body is intentionally narrow: an optional free-text
        `note` that lands in the `engagement.submitted` event payload.
        When the catalog atom and table land this schema can grow
        additional fields (package label, attached document refs, etc.)
        without breaking existing callers.
      properties:
        note:
          type: string
          maxLength: 2048
          description: |
            Optional free-text note about the submission (e.g. "Permit
            set v1, all sheets cleaned."). Capped at 2 KB to keep the
            event payload bounded — notes longer than 2048 chars are
            rejected with a 400 (the server does not silently truncate).
            An empty or whitespace-only string is coerced to null on
            the emitted event.

    SubmissionReceipt:
      type: object
      description: |
        Server response for a recorded plan-review submission. Today the
        `submissionId` is generated by the route handler (no submissions
        table yet); when the table lands it becomes the inserted row's
        id without changing the response shape.
      properties:
        submissionId:
          type: string
        engagementId:
          type: string
        submittedAt:
          type: string
          format: date-time
      required:
        - submissionId
        - engagementId
        - submittedAt

    EngagementSubmissionSummary:
      type: object
      description: |
        One past plan-review submission for an engagement, as returned
        by `GET /engagements/{id}/submissions`. The `jurisdiction`
        label is the denormalized snapshot captured at submission time
        (so a later jurisdiction change on the parent engagement does
        not retroactively rewrite the audit trail). `note` is the
        optional free-text note from the submission body, surfaced
        verbatim (capped to 2 KB by the create route's contract).

        `status`, `reviewerComment`, and `respondedAt` reflect the
        jurisdiction's recorded reply. `status` is always present and
        defaults to `pending` until a reviewer records a response via
        `POST /engagements/{id}/submissions/{submissionId}/response`,
        at which point `respondedAt` is set and `reviewerComment` may
        be populated. The fields stay null while the submission is
        still pending so consumers can drive a "no response yet" UI
        off `status === "pending"` without a presence check.
      properties:
        id:
          type: string
        submittedAt:
          type: string
          format: date-time
        jurisdiction:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/SubmissionStatus"
        reviewerComment:
          type: string
          nullable: true
        respondedAt:
          type: string
          format: date-time
          nullable: true
        responseRecordedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Wall-clock timestamp the server stamped when the response
            row was committed. Distinct from `respondedAt` so consumers
            can distinguish a backfilled reply (where `respondedAt`
            reflects when the jurisdiction actually replied) from a
            live one (where the two timestamps are essentially equal).
            Null while the submission is still pending; set to the
            server clock on every response update.
      required:
        - id
        - submittedAt
        - jurisdiction
        - note
        - status
        - reviewerComment
        - respondedAt
        - responseRecordedAt

    SubmissionStatus:
      type: string
      description: |
        Canonical jurisdiction-response status for a submission.
        `pending` is the default at insert (no response recorded yet);
        the other three are review outcomes the response route may
        transition the row into.
      enum:
        - pending
        - approved
        - corrections_requested
        - rejected

    BriefingSourceKind:
      type: string
      description: |
        Producer flavor for a `briefing_sources` row. `manual-upload` is
        the DA-PI-1B sprint's manual-QGIS upload path; `federal-adapter`
        ships in DA-PI-2 when the federal-data adapters write into the
        same table; `state-adapter` and `local-adapter` (DA-PI-4) tag
        rows produced by the state-tier (UGRC / INSIDE Idaho / TCEQ)
        and local-tier (county GIS) adapters respectively. All four
        share the supersession contract so a consumer renders any kind
        without a producer-specific code path; the discriminator is
        purely informational and powers UI tier-grouping in the Site
        Context tab (federal / state / local).
      enum:
        - manual-upload
        - federal-adapter
        - state-adapter
        - local-adapter

    BriefingSourceConversionStatus:
      type: string
      description: |
        Lifecycle marker for the DXF→glb conversion pipeline (DA-MV-1).
        `pending` (queued / never attempted), `converting` (request in
        flight to the converter service), `ready` (glb available — the
        viewer can fetch bytes), `failed` (converter rejected — the UI
        surfaces a retry action), `dxf-only` (DXF stored but no
        conversion attempted, e.g. a legacy/imported row). Only set on
        the DXF branch — QGIS uploads and federal-adapter rows leave
        this field null.
      enum:
        - pending
        - converting
        - ready
        - failed
        - dxf-only

    BriefingSourceUploadKind:
      type: string
      description: |
        Discriminator for the upload modality on
        `POST /engagements/{id}/briefing/sources`. `qgis` (default)
        keeps the DA-PI-1B 2D overlay path; `dxf` selects the DA-MV-1
        DXF→glb conversion branch — the bytes are stored as the
        original DXF and the converter service is invoked synchronously
        before the row is committed.
      enum:
        - qgis
        - dxf

    EngagementBriefingSource:
      type: object
      description: |
        One current (non-superseded) source attached to an engagement's
        parcel briefing. The `upload*` fields are populated only on
        `manual-upload` rows and describe the file the architect picked.
        `payload` is the structured data the briefing engine will read
        when DA-PI-3 ships; producers may store an empty object today.
      properties:
        id:
          type: string
        layerKind:
          type: string
        sourceKind:
          $ref: "#/components/schemas/BriefingSourceKind"
        provider:
          type: string
          nullable: true
        snapshotDate:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
        uploadObjectPath:
          type: string
          nullable: true
        uploadOriginalFilename:
          type: string
          nullable: true
        uploadContentType:
          type: string
          nullable: true
        uploadByteSize:
          type: integer
          nullable: true
        dxfObjectPath:
          type: string
          nullable: true
          description: |
            DA-MV-1 — canonical `/objects/<id>` pointer of the original
            DXF when the row took the DXF→glb branch. Mirrors
            `uploadObjectPath` for the DXF case; null on the QGIS branch
            and on adapter rows. The viewer never reads this directly —
            it is the input the converter retry route re-runs against.
        glbObjectPath:
          type: string
          nullable: true
          description: |
            DA-MV-1 — canonical `/objects/<id>` pointer of the converted
            glb when conversion has succeeded (`conversionStatus =
            ready`). The viewer fetches the bytes via
            `GET /briefing-sources/{id}/glb` rather than this path
            directly so the response can carry the right
            `Content-Type` + caching headers.
        conversionStatus:
          allOf:
            - $ref: "#/components/schemas/BriefingSourceConversionStatus"
          nullable: true
          description: |
            DA-MV-1 — DXF→glb conversion lifecycle marker. Null on QGIS
            and adapter rows; populated on the DXF branch.
        conversionError:
          type: string
          nullable: true
          description: |
            DA-MV-1 — short human-readable error blurb stamped when
            conversion fails. Surfaced verbatim in the per-source
            status pill so the architect can decide whether to retry
            or re-export the DXF. Null on success and on non-DXF rows.
        supersededAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Stamped when the row is no longer the current source for its
            `(briefing_id, layer_kind)` slot — null while the row is
            current. Surfaced on the wire so the history view can
            distinguish current from superseded entries without an
            extra round-trip.
        supersededById:
          type: string
          nullable: true
          description: |
            Pointer to the briefing-source row that superseded this one,
            or null when this row is still current. Lets the UI
            reconstruct the per-layer chain (`prior → current`) without
            asking the server.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - layerKind
        - sourceKind
        - provider
        - snapshotDate
        - note
        - uploadObjectPath
        - uploadOriginalFilename
        - uploadContentType
        - uploadByteSize
        - dxfObjectPath
        - glbObjectPath
        - conversionStatus
        - conversionError
        - supersededAt
        - supersededById
        - createdAt

    EngagementBriefing:
      type: object
      description: |
        The engagement's parcel briefing row plus its current sources.
      properties:
        id:
          type: string
        engagementId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        sources:
          type: array
          items:
            $ref: "#/components/schemas/EngagementBriefingSource"
      required:
        - id
        - engagementId
        - createdAt
        - updatedAt
        - sources

    EngagementBriefingResponse:
      type: object
      description: |
        Wire envelope for the briefing read/write routes. `briefing` is
        `null` when no briefing has been created yet for the engagement
        — the first call to `POST /engagements/{id}/briefing/sources`
        is what creates it. The envelope exists because OpenAPI 3.0's
        `nullable` modifier on a `$ref` to an object schema does not
        generate a clean `T | null` in our codegen toolchain.
      properties:
        briefing:
          allOf:
            - $ref: "#/components/schemas/EngagementBriefing"
          nullable: true
      required:
        - briefing

    GenerateLayersOutcome:
      type: object
      description: |
        Per-adapter outcome for one `POST /engagements/{id}/generate-layers`
        invocation. `status=ok` means the adapter ran and a row was
        persisted (the row is included in `briefing.sources`); `status=
        no-coverage` means the adapter ran (or was skipped because its
        jurisdiction gate did not match) and there is nothing to
        persist; `status=failed` means the adapter ran and threw — the
        `error` discriminates the reason so the UI can render an
        actionable message.
      properties:
        adapterKey:
          type: string
          description: |
            Stable adapter identifier in `<jurisdiction>:<source>` form
            (e.g. `bastrop-tx:floodplain`, `ugrc:parcels`). Same value
            the persisted row carries in `provider`.
        tier:
          type: string
          enum: [federal, state, local]
        sourceKind:
          $ref: "#/components/schemas/BriefingSourceKind"
        layerKind:
          type: string
        status:
          type: string
          enum: [ok, no-coverage, failed]
        error:
          type: object
          nullable: true
          description: Set only when `status=failed` (or `no-coverage`).
          properties:
            code:
              type: string
              enum:
                - no-coverage
                - timeout
                - network-error
                - upstream-error
                - parse-error
                - unknown
            message:
              type: string
          required: [code, message]
        sourceId:
          type: string
          nullable: true
          description: |
            The id of the persisted `briefing_sources` row, set only on
            `status=ok` outcomes. The row itself is also embedded in
            `briefing.sources` on the same response so clients usually
            don't need to follow up.
      required: [adapterKey, tier, sourceKind, layerKind, status]

    GenerateLayersResponse:
      type: object
      description: |
        Wire envelope for `POST /engagements/{id}/generate-layers`.
        Carries the post-run briefing (with the freshly-persisted rows
        already in `sources`) plus a per-adapter `outcomes` array so
        the UI can render success / failure state alongside the data.
      properties:
        briefing:
          allOf:
            - $ref: "#/components/schemas/EngagementBriefing"
          nullable: true
        outcomes:
          type: array
          items:
            $ref: "#/components/schemas/GenerateLayersOutcome"
      required: [briefing, outcomes]

    EngagementBriefingSourcesResponse:
      type: object
      description: |
        Wire envelope for `GET /engagements/{id}/briefing/sources`. The
        list is scoped to one `layerKind` and ordered newest-first by
        `createdAt`. When the engagement has no briefing yet (no
        upload has happened) `sources` is an empty array, never null.
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/EngagementBriefingSource"
      required:
        - sources

    CreateBriefingSourceBody:
      type: object
      description: |
        Request body for `POST /engagements/{id}/briefing/sources`. The
        bytes are uploaded to object storage out-of-band via the
        presigned-URL flow; this body only carries the metadata + the
        canonical `/objects/...` path the bytes landed at. `layerKind`
        is the supersession key — a second upload with the same value
        marks the prior row superseded.
      properties:
        layerKind:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            Slug identifying the overlay layer (e.g. `qgis-zoning`,
            `qgis-parcel`). Free-form text rather than a closed enum so
            new layer kinds can land without a schema change.
        provider:
          type: string
          maxLength: 256
          nullable: true
          description: Optional human-readable provider label.
        snapshotDate:
          type: string
          format: date-time
          nullable: true
          description: |
            Effective date for the data. Defaults to the server's clock
            at insert time when omitted or null.
        note:
          type: string
          maxLength: 2048
          nullable: true
          description: |
            Optional free-text note. Empty / whitespace-only strings are
            coerced to null on the row.
        upload:
          type: object
          description: Metadata for the file uploaded out-of-band to object storage.
          properties:
            kind:
              allOf:
                - $ref: "#/components/schemas/BriefingSourceUploadKind"
              description: |
                Selects the upload modality. Defaults to `qgis` so the
                pre-DA-MV-1 callers (which never sent this field) keep
                working unchanged. `dxf` selects the DXF→glb conversion
                branch — the route stores the bytes as the original
                DXF, calls the converter service, and stamps
                `conversionStatus` on the row.
            objectPath:
              type: string
              minLength: 1
              description: |
                Canonical `/objects/<id>` path returned by `POST
                /storage/uploads/request-url` and persisted on the row.
            originalFilename:
              type: string
              minLength: 1
              maxLength: 256
            contentType:
              type: string
              minLength: 1
              maxLength: 128
            byteSize:
              type: integer
              minimum: 0
          required:
            - objectPath
            - originalFilename
            - contentType
            - byteSize
      required:
        - layerKind
        - upload

    RecordSubmissionResponseBody:
      type: object
      description: |
        Request body for `POST /engagements/{id}/submissions/{submissionId}/response`.
        `status` is the new review state the jurisdiction has assigned;
        `pending` is intentionally not a valid response value (it is the
        starting state, not an outcome). `reviewerComment` is an optional
        free-text note from the reviewer (e.g. correction requests,
        approval conditions); empty / whitespace-only strings are
        coerced to null. `respondedAt` is optional and defaults to the
        server's clock at the moment the response is recorded — callers
        only need to supply it when backfilling a historical reply.
      properties:
        status:
          type: string
          enum:
            - approved
            - corrections_requested
            - rejected
          description: Jurisdiction's review outcome for the submission.
        reviewerComment:
          type: string
          maxLength: 4096
          description: |
            Optional free-text note from the reviewer. Capped at 4 KB
            so the event payload stays bounded. Empty / whitespace-only
            values are coerced to null on the stored row and event.
        respondedAt:
          type: string
          format: date-time
          description: |
            Optional explicit response timestamp. Defaults to the
            server clock when omitted; supply when backfilling a
            historical jurisdiction reply. Must not be later than the
            server clock at request time — future-dated values are
            rejected with a 400 (the in-browser dialog mirrors this).
      required:
        - status

    SubmissionResponse:
      type: object
      description: |
        Submission row reflecting the jurisdiction's recorded response.
        Returned by the response route so callers don't need a
        follow-up GET to see the new state. `respondedAt` is null
        only when the row is still pending (the response route always
        sets it, but the type allows null for the pre-response state
        in case a future GET shares this shape).
      properties:
        id:
          type: string
        engagementId:
          type: string
        status:
          $ref: "#/components/schemas/SubmissionStatus"
        reviewerComment:
          type: string
          nullable: true
        respondedAt:
          type: string
          format: date-time
          nullable: true
        responseRecordedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Wall-clock timestamp the server stamped when this response
            update was committed. Always non-null on the route's own
            return value (the response route stamps it on every call);
            kept nullable to mirror the `EngagementSubmissionSummary`
            shape used by the list endpoint, where rows still in the
            pending state never set the field.
        submittedAt:
          type: string
          format: date-time
      required:
        - id
        - engagementId
        - status
        - reviewerComment
        - respondedAt
        - responseRecordedAt
        - submittedAt

