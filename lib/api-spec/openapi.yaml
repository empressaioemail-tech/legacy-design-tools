openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SmartCity OS Design Tools API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: engagements
    description: Engagement (project) operations
  - name: snapshots
    description: Revit model snapshot operations
  - name: chat
    description: Claude chat about an engagement
  - name: codes
    description: Atom-anchored municipal/building code knowledge
  - name: users
    description: User profile administration (display names, emails, avatars)
  - name: storage
    description: Object storage (presigned uploads, file serving)
  - name: session
    description: Current session — audience, requestor, permission claims
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /engagements:
    get:
      operationId: listEngagements
      tags: [engagements]
      summary: List engagements
      description: Returns all engagements ordered by updatedAt desc.
      responses:
        "200":
          description: Array of engagement summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EngagementSummary"

  /engagements/match:
    post:
      operationId: matchEngagement
      tags: [engagements]
      summary: Resolve a Revit file to an engagement (or signal create-new)
      description: |
        Called by the Revit add-in BEFORE uploading a snapshot, to decide which
        engagement (if any) the file belongs to. Auth: requires the same
        `x-snapshot-secret` header as POST /snapshots.

        Precedence (first hit wins):
          1. `revitCentralGuid` exact match → action="auto-bind".
          2. `revitDocumentPath` exact match → action="auto-bind".
          3. case-insensitive `projectName` collision → action="choose" with
             up to 10 candidates (newest first). The add-in MUST surface a
             dropdown in this case, regardless of GUID presence.
          4. nothing matched → action="create-new".

        Note: even when a GUID is supplied, a name collision still returns
        "choose" if neither GUID nor path matched — the user makes the final
        call. GUID is sticky on rebind: an engagement's stored GUID is never
        overwritten by a later snapshot from a different file.
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchEngagementBody"
      responses:
        "200":
          description: Match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchEngagementResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}:
    get:
      operationId: getEngagement
      tags: [engagements]
      summary: Get engagement detail with snapshot list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement detail (snapshots without payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEngagement
      tags: [engagements]
      summary: Update engagement details (intake / edit modal)
      description: |
        Partial update. Only fields present in the request body are changed.
        If `address` is included and differs from the current value, the
        server will geocode the new address synchronously (best-effort).
        On geocoding failure, the address is still saved but a warning is
        included in the response.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                jurisdiction:
                  type: string
                status:
                  $ref: "#/components/schemas/EngagementStatus"
                projectType:
                  $ref: "#/components/schemas/ProjectType"
                zoningCode:
                  type: string
                lotAreaSqft:
                  type: number
                  nullable: true
      responses:
        "200":
          description: Updated engagement detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/geocode:
    post:
      operationId: regeocodeEngagement
      tags: [engagements]
      summary: Re-run geocoding using the engagement's current address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement detail (possibly with warnings)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "400":
          description: Engagement has no address to geocode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/submissions:
    get:
      operationId: listEngagementSubmissions
      tags: [engagements]
      summary: List prior plan-review submissions for an engagement
      description: |
        Returns the engagement's recorded plan-review submissions,
        newest-first. Each entry mirrors the row inserted by `POST
        /engagements/{id}/submissions` (id, submittedAt, jurisdiction
        labels captured at the moment of submission, optional note).

        The list is read-straight from the `submissions` table — there
        is no pagination today (engagements typically accumulate a
        handful of packages over their lifetime); when that assumption
        breaks, callers can adopt a `limit` / `cursor` extension
        without breaking existing consumers since the response is a
        bare array.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of submission summaries (newest-first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EngagementSubmissionSummary"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEngagementSubmission
      tags: [engagements]
      summary: Record a plan-review submission against an engagement
      description: |
        Records that a plan-review package has been submitted to the
        jurisdiction for this engagement. The submission flow is still a
        forward-ref child in the engagement atom's composition (no
        dedicated submissions table or catalog atom yet), so today's only
        side effect is appending an `engagement.submitted` event to the
        history chain. The returned `submissionId` is server-generated;
        when the catalog atom and table land it becomes the inserted
        row's id (the response shape stays stable).

        Best-effort emit by the same contract as the sibling lifecycle
        routes (`PATCH /engagements/{id}` address change,
        `POST /engagements/{id}/geocode`): a transient history outage
        cannot fail the submission HTTP request — the response 201s
        either way and the audit chain self-heals on the next successful
        append.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEngagementSubmissionBody"
      responses:
        "201":
          description: Submission recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionReceipt"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/submissions/{submissionId}/response:
    post:
      operationId: recordSubmissionResponse
      tags: [engagements]
      summary: Record the jurisdiction's response on a submission
      description: |
        Records the jurisdiction's reply against a previously-recorded
        plan-review submission. Updates the submission row's `status`,
        optional `reviewerComment`, and `respondedAt` columns, and
        emits a `submission.response-recorded` event scoped to the
        submission entity (so the back-and-forth shows up on the
        submission's own timeline rather than collapsing into the
        parent engagement's).

        The response body always reflects the submission row *after*
        the update — callers do not need a follow-up GET to see the
        new status. Calling this route a second time on the same
        submission is allowed and overwrites the prior response (the
        event chain on the submission preserves the full history).

        `respondedAt` must not be later than the server clock at
        request time. Future-dated values are rejected with a 400 so
        a non-browser caller cannot backfill a reply into the future
        and silently corrupt the engagement timeline. The same rule
        applies in the other direction: `respondedAt` must not be
        earlier than the submission row's own `submittedAt` (a reply
        cannot pre-date the package being sent), and pre-submission
        values are likewise rejected with a 400.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Engagement id (must own the submission).
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordSubmissionResponseBody"
      responses:
        "200":
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResponse"
        "400":
          description: Invalid request body or submission/engagement mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement or submission not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing:
    get:
      operationId: getEngagementBriefing
      tags: [engagements]
      summary: Get the engagement's parcel briefing and current sources
      description: |
        Returns the engagement's `parcel_briefings` row (if any) along
        with its current (non-superseded) `briefing_sources`. Returns
        `null` when no briefing has been created yet — i.e. before the
        first manual-QGIS upload or federal-adapter fetch (DA-PI-1B
        first-upload-creates-briefing pattern).

        Sources are listed newest-first by `createdAt`. Superseded rows
        are deliberately omitted; the timeline view (future sprint) is
        the surface that exposes the full per-layer history.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The engagement's briefing + current sources, or null when none exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBriefingResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing/sources:
    get:
      operationId: listEngagementBriefingSources
      tags: [engagements]
      summary: List briefing sources for one layer (history-aware)
      description: |
        Returns the briefing sources attached to an engagement for one
        `layerKind`, newest-first by `createdAt`. By default only the
        current (non-superseded) row is returned; pass
        `includeSuperseded=true` to also receive the prior history so
        the UI can render a per-layer "View history" panel and offer a
        "Restore this version" rollback action.

        Returns `{ sources: [] }` when the engagement has no briefing
        yet (the briefing row is created lazily on first upload). The
        endpoint requires the engagement to exist; a missing engagement
        is a 404.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: layerKind
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 64
          description: |
            The layer slug to scope the listing by. Required because
            history is meaningful per layer (the partial unique index
            on `briefing_sources` is keyed on `layer_kind`).
        - name: includeSuperseded
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: |
            When true the response includes superseded rows in addition
            to the current one. Defaults to false so callers that only
            want the current source do not need to filter client-side.
      responses:
        "200":
          description: Sources for the layer, newest-first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBriefingSourcesResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEngagementBriefingSource
      tags: [engagements]
      summary: Record a manually-uploaded QGIS layer as a briefing source
      description: |
        Records that a manually-exported QGIS overlay (or any other
        manually-uploaded layer file) has been attached to the
        engagement's parcel briefing. The first call creates the
        engagement's `parcel_briefings` row on demand
        (first-upload-creates-briefing); subsequent calls of the same
        `layerKind` supersede the prior row for that layer per Spec 51
        §4 (the prior row's `supersededById` points at the new row's
        id, both rows stay readable).

        The file bytes themselves are uploaded to object storage via
        the existing presigned-URL flow (`POST
        /storage/uploads/request-url` → PUT to the returned URL). This
        route only records the metadata + the canonical `/objects/...`
        path the bytes landed at.

        Emits `briefing-source.fetched` against the new row through the
        event-anchoring service. Best-effort: a transient history
        outage cannot fail the HTTP request — the row is the source of
        truth, the event chain is observability.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBriefingSourceBody"
      responses:
        "201":
          description: Briefing source recorded; updated briefing returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBriefingResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing/sources/{sourceId}/restore:
    post:
      operationId: restoreEngagementBriefingSource
      tags: [engagements]
      summary: Roll back to a previously-superseded briefing source
      description: |
        Restores a previously-superseded briefing source to be the
        current source for its `(briefing_id, layer_kind)` slot. The
        prior current row is stamped as superseded by the restored
        target (so its `supersededAt` is set and `supersededById`
        points at the restored row), and the restored row's
        `supersededAt` / `supersededById` are cleared so it owns the
        partial-unique "current per layer" slot again.

        Idempotent: when the target row is already current the
        endpoint returns the briefing unchanged. The endpoint never
        deletes data — every prior version remains in the table for
        replay through `GET /engagements/{id}/briefing/sources?layerKind=...&includeSuperseded=true`.

        Refuses to restore across engagements (the target must belong
        to the engagement's briefing) and refuses to restore a layer
        that has no current row (a defensive check; the supersession
        contract guarantees a row exists once any upload has happened).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Briefing source restored; updated briefing returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBriefingResponse"
        "400":
          description: Invalid request (e.g. source belongs to a different engagement)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement or briefing source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/briefing/sources/{sourceId}/retry-conversion:
    post:
      operationId: retryBriefingSourceConversion
      tags: [engagements]
      summary: Re-run DXF→glb conversion for a briefing source
      description: |
        Re-runs the DXF→glb converter against the briefing source's
        already-stored DXF (`dxfObjectPath`) without forcing the
        architect to re-upload. Used when the original conversion
        landed in `failed` (or got stuck in `pending` / `converting`)
        and the architect wants to retry — typically after an upstream
        converter outage cleared.

        Refuses non-DXF rows (`conversionStatus` is null on the QGIS
        and adapter branches) and refuses rows that have no stored
        DXF. On success the row's `conversionStatus` flips back to
        `pending` → `ready` (or `failed`) inside the same request and
        the response carries the updated briefing.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversion retried; updated briefing returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementBriefingResponse"
        "400":
          description: |
            Source does not own a DXF (e.g. it is a QGIS row, or
            `dxfObjectPath` is missing) or belongs to a different
            engagement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement or briefing source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/generate-layers:
    post:
      operationId: generateEngagementLayers
      tags: [engagements]
      summary: Run all applicable adapters and persist briefing-source rows
      description: |
        Runs every adapter that applies to the engagement's resolved
        jurisdiction (federal / state / local tiers — DA-PI-2 + DA-PI-4)
        in parallel, then persists each successful adapter result as a
        `briefing_sources` row using the same supersession contract the
        manual-upload route uses (`layer_kind` partial-unique index;
        prior current row is stamped `superseded_by_id` ← new row's id
        and stays readable for history replay). Per locked decision #4
        ("re-runs always supersede"), a fresh call always writes a new
        row per layer even when the upstream payload is byte-identical
        — the prior row remains queryable through the existing
        `?includeSuperseded=true` history path.

        The endpoint is best-effort at the adapter level: a single
        adapter failure (network blip, no-coverage at this lat/lng,
        upstream parse error) is surfaced in `outcomes[].status` /
        `outcomes[].error` rather than failing the whole batch. Only a
        request that resolves to a jurisdiction with zero applicable
        adapters returns 422.

        The first call creates the engagement's `parcel_briefings` row
        on demand (first-fetch-creates-briefing, mirroring the
        manual-upload route). Emits one
        `briefing-source.fetched` event per persisted row through the
        event-anchoring service; transient history outages cannot fail
        the HTTP request — the rows are the source of truth.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Adapters dispatched; per-adapter outcomes + updated briefing returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateLayersResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: |
            The engagement's jurisdiction did not resolve to any
            applicable adapter (e.g. an out-of-pilot state). The
            response body still uses the standard error envelope so
            clients can render the message.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /briefing-sources/{id}/glb:
    get:
      operationId: getBriefingSourceGlb
      tags: [engagements]
      summary: Stream the converted glb for one briefing source
      description: |
        Streams the binary glTF (`model/gltf-binary`) for a briefing
        source whose DXF→glb conversion has reached `ready`. The
        response body is the raw glb bytes (not JSON), with an ETag
        derived from a SHA-1 of the bytes so re-conversion of the
        same source busts cached entries even though the URL is
        unchanged.

        Honors `If-None-Match` with a 304 response. Cached for one
        day on intermediate proxies (`Cache-Control: public,
        max-age=86400, immutable`); the URL is content-addressed via
        the row id and a fresh conversion writes a new row, so the
        immutable hint is safe.

        404 when the row does not exist, when conversion is not yet
        `ready`, or when the row is on a non-DXF branch.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Glb bytes
          content:
            model/gltf-binary:
              schema:
                type: string
                format: binary
          headers:
            ETag:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
        "304":
          description: Cached copy still fresh
        "404":
          description: Briefing source not found, or no glb yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots:
    get:
      operationId: listSnapshots
      tags: [snapshots]
      summary: List Revit snapshots across all engagements
      description: Returns all snapshots, newest first, joined with engagementName.
      responses:
        "200":
          description: Array of snapshot summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnapshotSummary"
    post:
      operationId: createSnapshot
      tags: [snapshots]
      summary: Receive a Revit snapshot from the add-in
      description: |
        Stores a snapshot from the Revit add-in. Requires the `x-snapshot-secret`
        header to match the configured `SNAPSHOT_SECRET` env var. If `projectName`
        matches an existing engagement (case-insensitive), the snapshot attaches
        to it. Otherwise a new engagement is auto-created.
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotPayload"
      responses:
        "201":
          description: Snapshot accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotReceipt"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}:
    get:
      operationId: getSnapshot
      tags: [snapshots]
      summary: Get the full snapshot record (with payload)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}/sheets:
    get:
      operationId: getSnapshotSheets
      tags: [snapshots]
      summary: List sheets uploaded for a snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of sheet summaries (no PNG bytes)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SheetSummary"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: uploadSnapshotSheets
      tags: [snapshots]
      summary: Upload sheets (multipart) for a snapshot
      description: |
        Multipart upload from the Revit add-in. Body must include a `metadata`
        text field containing JSON-encoded SheetMetadata[] plus per-sheet
        `sheet_{i}_thumb` and `sheet_{i}_full` PNG file fields. Idempotent on
        (snapshotId, sheetNumber) — re-uploading replaces existing rows.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                metadata:
                  type: string
                  description: JSON-encoded array of SheetMetadata
              required:
                - metadata
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetUploadResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: Wrong content-type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}/sheet-history:
    get:
      operationId: getSnapshotSheetHistory
      tags: [snapshots]
      summary: Recent atom_events for every sheet in a snapshot, in one batch
      description: |
        Batch variant of `GET /atoms/sheet/{id}/history` that returns the
        most-recent events for every sheet attached to a single snapshot
        in one round trip. Backed by a single SQL query (window function
        over `atom_events`), so the page-render cost is O(1) requests
        regardless of sheet count — the per-card endpoint stays as the
        single-sheet path.

        The `limit` query parameter caps the per-sheet page size (default
        5, max 50). Sheets with no recorded events appear as an empty
        `events` array so callers can render a stable shape without
        a second lookup. 404s when the snapshot id does not resolve.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max events per sheet (default 5, max 50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Per-sheet recent history, newest first per sheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotSheetHistoryResponse"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: History read failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sheets/{id}/thumbnail.png:
    get:
      operationId: getSheetThumbnail
      tags: [snapshots]
      summary: Sheet thumbnail PNG (512px)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PNG image
          content:
            image/png: {}
        "404":
          description: Sheet not found

  /sheets/{id}/full.png:
    get:
      operationId: getSheetFull
      tags: [snapshots]
      summary: Sheet full-resolution PNG (~2048px)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PNG image
          content:
            image/png: {}
        "404":
          description: Sheet not found

  /codes/jurisdictions:
    get:
      operationId: listCodeJurisdictions
      tags: [codes]
      summary: List configured code jurisdictions and their atom counts
      responses:
        "200":
          description: Array of jurisdiction summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JurisdictionSummary"

  /codes/jurisdictions/{key}/atoms:
    get:
      operationId: listJurisdictionAtoms
      tags: [codes]
      summary: List atoms for a jurisdiction (paginated, newest first)
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: codeBook
          in: query
          required: false
          description: Optional filter — restrict to a single code book.
          schema:
            type: string
        - name: edition
          in: query
          required: false
          description: Optional filter — restrict to a single edition (use together with codeBook).
          schema:
            type: string
      responses:
        "200":
          description: Atom summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodeAtomSummary"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/atoms:
    get:
      operationId: listCodeAtoms
      tags: [codes]
      summary: List atoms across jurisdictions (operator/debug surface)
      description: |
        Operator-facing global atom list backing the `/dev/atoms` inspector
        page. Distinct from `/codes/jurisdictions/{key}/atoms` (consumer
        surface, scoped to one jurisdiction): exposes filters not present
        in the consumer view (sourceName, embedded vs raw, free-text q)
        and adds offset pagination with a server-computed `total` so the
        UI can render Prev/Next without overfetching.

        Stable order: (fetchedAt DESC, id DESC).
      parameters:
        - name: jurisdictionKey
          in: query
          required: false
          schema:
            type: string
        - name: codeBook
          in: query
          required: false
          schema:
            type: string
        - name: edition
          in: query
          required: false
          schema:
            type: string
        - name: sourceName
          in: query
          required: false
          description: Filter by `code_atom_sources.source_name` (e.g. `grand_county_html`).
          schema:
            type: string
        - name: embedded
          in: query
          required: false
          description: |
            Tri-state. `true` → only embedded atoms; `false` → only raw
            atoms; omitted → no filter. Strings (not JSON booleans) so the
            querystring round-trips cleanly.
          schema:
            type: string
            enum: ["true", "false"]
        - name: q
          in: query
          required: false
          description: |
            Case-insensitive substring match against `sectionNumber` OR
            `sectionTitle`. Trimmed; empty string is treated as no filter.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated atom list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeAtomListResponse"

  /codes/atoms/{id}:
    get:
      operationId: getCodeAtom
      tags: [codes]
      summary: Get a single code atom (full body + provenance)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Atom detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeAtomDetail"
        "404":
          description: Atom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/warmup-status/{key}:
    get:
      operationId: getWarmupStatus
      tags: [codes]
      summary: Live warmup queue state for a jurisdiction
      description: |
        Returns counts of `code_atom_fetch_queue` rows by status for the given
        jurisdiction, a derived `state`, and (when present) the most recent
        failed row's `lastError` text so failures are debuggable from the
        browser without server-log access.

        state derivation:
          - total === 0          → "idle"
          - pending > 0 OR
            processing > 0       → "running"
          - failed > 0 AND
            pending+processing=0 → "failed"
          - otherwise            → "completed"
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current warmup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupStatus"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/warmup/{key}:
    post:
      operationId: warmupJurisdiction
      tags: [codes]
      summary: Trigger discovery + queue drain for a jurisdiction
      description: |
        Idempotent. Inserts new TOC entries into the fetch queue (existing
        entries are skipped) and synchronously drains a small batch so the
        caller can confirm the pipeline is alive. Long-running fetches
        continue in the background queue worker.
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Warmup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmupResult"
        "404":
          description: Unknown jurisdiction key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dev/atoms/retrieve:
    post:
      operationId: retrieveAtomsProbe
      tags: [codes]
      summary: Retrieval probe — preview what /api/chat would inject for a given query
      description: |
        Operator-facing diagnostic backing the `/dev/atoms/probe` page. Runs the
        SAME retrieval module (`retrieveAtomsForQuestion` in `@workspace/codes`)
        that `/api/chat` uses, with the SAME jurisdiction-resolution logic
        (`keyFromEngagement`), and assembles the SAME `<reference_code_atoms>`
        XML block (`formatReferenceCodeAtoms`) that gets sent to Claude. No
        threshold filter is applied server-side — ALL retrieved atoms are
        returned and the UI renders the 0.6 threshold line visually.

        Either `engagementId` (server resolves jurisdiction from the engagement
        address using the same logic chat does) OR `jurisdiction` (a literal
        jurisdiction key like `grand_county_ut`) must be provided — exactly one.

        Header-gated by `x-snapshot-secret` to match the rest of the
        operator-facing surfaces (POST /snapshots, POST /engagements/match).
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrievalProbeBody"
      responses:
        "200":
          description: Retrieval probe result (all atoms returned, threshold UI-side)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalProbeResponse"
        "400":
          description: Missing query or both/neither of engagementId/jurisdiction provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Engagement not found (engagementId path)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Engagement found but jurisdiction could not be resolved from address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /atoms/{slug}/{id}/summary:
    get:
      operationId: getAtomSummary
      tags: [atoms]
      summary: Resolve an atom's four-layer ContextSummary
      description: |
        Looks up an atom in the process-wide registry by `slug` (its
        `entityType`) and returns the typed `ContextSummary` produced by
        the registration's `contextSummary(id, scope)` callback. The
        `scope` query parameter is optional URL-encoded JSON using the
        compact wire format produced by `httpContextSummary` in
        `@workspace/empressa-atom`; decode failures fall back to the
        default scope rather than 400ing.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: false
          description: URL-encoded JSON scope object (compact form `{a,r,t,p}`).
          schema:
            type: string
      responses:
        "200":
          description: Four-layer context summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomSummary"
        "404":
          description: Atom type not registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: contextSummary callback threw
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /atoms/{slug}/{id}/history:
    get:
      operationId: getAtomHistory
      tags: [atoms]
      summary: Read recent history events for an atom
      description: |
        Returns the most recent atom_events for the given atom, newest first.
        Backed by the same `EventAnchoringService` the registration's
        `contextSummary` reads through for `historyProvenance`, so this
        endpoint complements (does not replace) the four-layer summary —
        callers that only need the latest provenance can keep using
        `getAtomSummary`.

        Requires a registered atom slug (404 otherwise). The `limit`
        query parameter caps the page size (default 5, max 50). Events
        whose entity row has been deleted upstream still surface here:
        atom_events stores `(entity_type, entity_id)` as opaque text and
        is intentionally not FK'd to the entity table.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max events to return (default 5, max 50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Recent events, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryResponse"
        "404":
          description: Atom type not registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: History read failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Ask Claude about an engagement (SSE stream)
      description: |
        Streams an assistant response over Server-Sent Events. Each event
        is `data: {"text": "..."}\n\n` followed by a final `data: [DONE]\n\n`.
        Grounds Claude on the latest snapshot for the given engagement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
        "400":
          description: Invalid request or no snapshots yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /session:
    get:
      operationId: getSession
      tags: [session]
      summary: Get current session
      description: |
        Returns whatever `req.session` the server has attached for the
        caller. Today this is derived from the dev `pr_session` cookie
        / `x-requestor` / `x-permissions` header overrides outside
        production, and is locked to the anonymous applicant default
        in production. Frontends use this to gate admin-only UI (e.g.
        the "Users & Roles" sidebar entry only renders when
        `permissions` contains `users:manage`).
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List user profiles
      description: |
        Returns every row in the `users` profile table, ordered by
        `displayName`. Used by the admin "Users & Roles" screen to
        manage the names/emails/avatars that hydrate timeline actor
        labels.
      responses:
        "200":
          description: Array of user profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user profile
      description: |
        Inserts a new row into the `users` profile table. Fails with 409
        if a row with the same `id` already exists — use PATCH to edit
        an existing profile instead. Requires the `users:manage`
        permission claim on the caller's session; anything else is
        rejected with 403.

        When `avatarUrl` references one of our `/objects/<id>` paths,
        the server inspects the actual stored object before the row is
        inserted: oversized blobs (above the
        `RequestUploadUrlBody.size` cap) get a 413, and a path that
        looks like ours but isn't actually present in the bucket gets
        a 400. External avatar URLs (pasted by the admin) skip the
        check.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: |
            Invalid request body — including the case where
            `avatarUrl` references an internal `/objects/...` path that
            doesn't exist in storage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller lacks the `users:manage` permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A profile with this id already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: |
            `avatarUrl` references a stored object whose actual byte
            size exceeds the per-asset cap. The orphan is best-effort
            cleaned up server-side.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a single user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user profile
      description: |
        Partial update — only the fields included in the request body are
        changed. Pass `null` for `email` or `avatarUrl` to clear them.
        `displayName` is non-nullable: omit it to leave it unchanged.
        Requires the `users:manage` permission claim; non-admin callers
        get 403.

        When `avatarUrl` is set to one of our `/objects/<id>` paths, the
        server inspects the actual stored object before the row update
        commits: oversized blobs (above the
        `RequestUploadUrlBody.size` cap) get a 413, and a path that
        looks like ours but isn't actually present in the bucket gets a
        400. The previous avatar on the row is left untouched on
        rejection. Clearing the avatar (`null`) and external URLs both
        skip the check.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: |
            Invalid request body — including the case where
            `avatarUrl` references an internal `/objects/...` path that
            doesn't exist in storage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller lacks the `users:manage` permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: |
            `avatarUrl` references a stored object whose actual byte
            size exceeds the per-asset cap. The orphan is best-effort
            cleaned up server-side and the row is left unchanged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user profile
      description: |
        Removes the profile row. Atom-event actor records are not
        cascaded — historical events keep the raw actor id and the
        timeline simply falls back to "Unknown user" for the deleted
        profile from then on. This matches the contract documented on
        `lib/db/src/schema/users.ts`. Requires the `users:manage`
        permission claim; non-admin callers get 403.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Caller lacks the `users:manage` permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      description: |
        Returns a short-lived presigned PUT URL the client uploads the
        file bytes to (directly to GCS — the file does NOT go through
        this server). The response also includes the canonical
        `objectPath` (`/objects/<id>`) the client should persist on the
        owning record once the PUT succeeds. Used by the admin Users
        screen to upload avatar images instead of pasting URLs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL + canonical object path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: |
            Requested upload exceeds the per-asset byte cap (see
            `RequestUploadUrlBody.size`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: |
            Requested `contentType` is not in the allow-list (see
            `RequestUploadUrlBody.contentType`). The avatar flow is the
            only consumer today; it always uploads `image/jpeg`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    EngagementStatus:
      type: string
      enum: [active, on_hold, archived]

    ProjectType:
      type: string
      enum: [new_build, renovation, addition, tenant_improvement, other]

    Geocode:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        jurisdictionCity:
          type: string
          nullable: true
        jurisdictionState:
          type: string
          nullable: true
        jurisdictionFips:
          type: string
          nullable: true
        source:
          type: string
          enum: [nominatim, manual]
        geocodedAt:
          type: string
          format: date-time
      required:
        - latitude
        - longitude
        - jurisdictionCity
        - jurisdictionState
        - jurisdictionFips
        - source
        - geocodedAt

    Site:
      type: object
      properties:
        address:
          type: string
          nullable: true
        geocode:
          oneOf:
            - $ref: "#/components/schemas/Geocode"
            - type: "null"
        projectType:
          oneOf:
            - $ref: "#/components/schemas/ProjectType"
            - type: "null"
        zoningCode:
          type: string
          nullable: true
        lotAreaSqft:
          type: number
          nullable: true
      required:
        - address
        - geocode
        - projectType
        - zoningCode
        - lotAreaSqft

    EngagementSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        jurisdiction:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/EngagementStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        snapshotCount:
          type: integer
