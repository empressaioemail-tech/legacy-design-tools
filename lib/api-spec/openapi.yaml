openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SmartCity OS Design Tools API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: engagements
    description: Engagement (project) operations
  - name: snapshots
    description: Revit model snapshot operations
  - name: chat
    description: Claude chat about an engagement
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /engagements:
    get:
      operationId: listEngagements
      tags: [engagements]
      summary: List engagements
      description: Returns all engagements ordered by updatedAt desc.
      responses:
        "200":
          description: Array of engagement summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EngagementSummary"

  /engagements/{id}:
    get:
      operationId: getEngagement
      tags: [engagements]
      summary: Get engagement detail with snapshot list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement detail (snapshots without payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEngagement
      tags: [engagements]
      summary: Update engagement details (intake / edit modal)
      description: |
        Partial update. Only fields present in the request body are changed.
        If `address` is included and differs from the current value, the
        server will geocode the new address synchronously (best-effort).
        On geocoding failure, the address is still saved but a warning is
        included in the response.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                jurisdiction:
                  type: string
                status:
                  $ref: "#/components/schemas/EngagementStatus"
                projectType:
                  $ref: "#/components/schemas/ProjectType"
                zoningCode:
                  type: string
                lotAreaSqft:
                  type: number
                  nullable: true
      responses:
        "200":
          description: Updated engagement detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engagements/{id}/geocode:
    post:
      operationId: regeocodeEngagement
      tags: [engagements]
      summary: Re-run geocoding using the engagement's current address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement detail (possibly with warnings)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementDetail"
        "400":
          description: Engagement has no address to geocode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots:
    get:
      operationId: listSnapshots
      tags: [snapshots]
      summary: List Revit snapshots across all engagements
      description: Returns all snapshots, newest first, joined with engagementName.
      responses:
        "200":
          description: Array of snapshot summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnapshotSummary"
    post:
      operationId: createSnapshot
      tags: [snapshots]
      summary: Receive a Revit snapshot from the add-in
      description: |
        Stores a snapshot from the Revit add-in. Requires the `x-snapshot-secret`
        header to match the configured `SNAPSHOT_SECRET` env var. If `projectName`
        matches an existing engagement (case-insensitive), the snapshot attaches
        to it. Otherwise a new engagement is auto-created.
      parameters:
        - name: x-snapshot-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotPayload"
      responses:
        "201":
          description: Snapshot accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotReceipt"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid snapshot secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /snapshots/{id}:
    get:
      operationId: getSnapshot
      tags: [snapshots]
      summary: Get the full snapshot record (with payload)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Ask Claude about an engagement (SSE stream)
      description: |
        Streams an assistant response over Server-Sent Events. Each event
        is `data: {"text": "..."}\n\n` followed by a final `data: [DONE]\n\n`.
        Grounds Claude on the latest snapshot for the given engagement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
        "400":
          description: Invalid request or no snapshots yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatErrorResponse"
        "404":
          description: Engagement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    EngagementStatus:
      type: string
      enum: [active, on_hold, archived]

    ProjectType:
      type: string
      enum: [new_build, renovation, addition, tenant_improvement, other]

    Geocode:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        jurisdictionCity:
          type: string
          nullable: true
        jurisdictionState:
          type: string
          nullable: true
        jurisdictionFips:
          type: string
          nullable: true
        source:
          type: string
          enum: [nominatim, manual]
        geocodedAt:
          type: string
          format: date-time
      required:
        - latitude
        - longitude
        - jurisdictionCity
        - jurisdictionState
        - jurisdictionFips
        - source
        - geocodedAt

    Site:
      type: object
      properties:
        address:
          type: string
          nullable: true
        geocode:
          oneOf:
            - $ref: "#/components/schemas/Geocode"
            - type: "null"
        projectType:
          oneOf:
            - $ref: "#/components/schemas/ProjectType"
            - type: "null"
        zoningCode:
          type: string
          nullable: true
        lotAreaSqft:
          type: number
          nullable: true
      required:
        - address
        - geocode
        - projectType
        - zoningCode
        - lotAreaSqft

    EngagementSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        jurisdiction:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/EngagementStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        snapshotCount:
          type: integer
        latestSnapshot:
          oneOf:
            - $ref: "#/components/schemas/SnapshotSummary"
            - type: "null"
        site:
          $ref: "#/components/schemas/Site"
      required:
        - id
        - name
        - jurisdiction
        - address
        - status
        - createdAt
        - updatedAt
        - snapshotCount
        - latestSnapshot
        - site

    EngagementDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        jurisdiction:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/EngagementStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        snapshotCount:
          type: integer
        latestSnapshot:
          oneOf:
            - $ref: "#/components/schemas/SnapshotSummary"
            - type: "null"
        snapshots:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotSummary"
        site:
          $ref: "#/components/schemas/Site"
        warnings:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - jurisdiction
        - address
        - status
        - createdAt
        - updatedAt
        - snapshotCount
        - latestSnapshot
        - snapshots
        - site


    SnapshotSummary:
      type: object
      properties:
        id:
          type: string
        engagementId:
          type: string
        engagementName:
          type: string
        projectName:
          type: string
        sheetCount:
          type: integer
          nullable: true
        roomCount:
          type: integer
          nullable: true
        levelCount:
          type: integer
          nullable: true
        wallCount:
          type: integer
          nullable: true
        receivedAt:
          type: string
          format: date-time
      required:
        - id
        - engagementId
        - engagementName
        - projectName
        - sheetCount
        - roomCount
        - levelCount
        - wallCount
        - receivedAt

    SnapshotPayload:
      type: object
      properties:
        projectName:
          type: string
      required:
        - projectName
      additionalProperties: true

    SnapshotReceipt:
      type: object
      properties:
        id:
          type: string
        receivedAt:
          type: string
          format: date-time
        engagementId:
          type: string
        engagementName:
          type: string
        autoCreated:
          type: boolean
      required:
        - id
        - receivedAt
        - engagementId
        - engagementName
        - autoCreated

    SnapshotDetail:
      type: object
      properties:
        id:
          type: string
        engagementId:
          type: string
        engagementName:
          type: string
        projectName:
          type: string
        sheetCount:
          type: integer
          nullable: true
        roomCount:
          type: integer
          nullable: true
        levelCount:
          type: integer
          nullable: true
        wallCount:
          type: integer
          nullable: true
        receivedAt:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
      required:
        - id
        - engagementId
        - engagementName
        - projectName
        - sheetCount
        - roomCount
        - levelCount
        - wallCount
        - receivedAt
        - payload

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    ChatRequest:
      type: object
      properties:
        engagementId:
          type: string
        question:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - engagementId
        - question

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ChatErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
