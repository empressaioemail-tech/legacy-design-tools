        - projectName

    EngagementCandidate:
      type: object
      description: Lean engagement summary for the add-in's "choose" dropdown.
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
          nullable: true
        jurisdiction:
          type: string
          nullable: true
        revitCentralGuid:
          type: string
          nullable: true
        revitDocumentPath:
          type: string
          nullable: true
        snapshotCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - address
        - jurisdiction
        - revitCentralGuid
        - revitDocumentPath
        - snapshotCount
        - updatedAt

    MatchEngagementResponse:
      oneOf:
        - $ref: "#/components/schemas/MatchAutoBindResult"
        - $ref: "#/components/schemas/MatchChooseResult"
        - $ref: "#/components/schemas/MatchCreateNewResult"
      discriminator:
        propertyName: action
        mapping:
          auto-bind: "#/components/schemas/MatchAutoBindResult"
          choose: "#/components/schemas/MatchChooseResult"
          create-new: "#/components/schemas/MatchCreateNewResult"

    MatchAutoBindResult:
      type: object
      properties:
        action:
          type: string
          enum: [auto-bind]
        engagementId:
          type: string
        engagementName:
          type: string
        matchedBy:
