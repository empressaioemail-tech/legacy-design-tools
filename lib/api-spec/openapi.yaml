        total:
          type: integer
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        lastError:
          type: string
          nullable: true
      required:
        - jurisdictionKey
        - state
        - pending
        - processing
        - completed
        - failed
        - total
        - startedAt
        - completedAt
        - lastError
